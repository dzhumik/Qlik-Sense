T", "TYPE t_rows IS VARRAY(100000) OF staging_table%ROWTYPE — оптимально для BULK COLLECT, так как фиксирует размер буфера 8. Обработка исключений PL/SQL — проектирование стратегий обработки ошибок в процессах загрузки DWH: пользовательские исключения, PRAGMA EXCEPTION_INIT, логирование ошибок В процессе загрузки DWH через Informatica PC возникает ORA-00001 (нарушение уникальности). Как правильно перехватить эту ошибку в PL/SQL-процедуре и залогировать её без остановки всего пакета загрузки?"], "correct": 1, "explanation": "📦 TYPE t_rows IS TABLE OF staging_table%ROWTYPE создаёт тип 'коллекция строк как в staging_table'. BULK COLLECT INTO t_rows загружает все нужные строки в память разом. FORALL вставляет всю коллекцию за один DML-вызов. %ROWTYPE автоматически подстраивает структуру под таблицу.", "explanation_html": "<p><em class=\"analogy\">📦 TYPE t_rows IS TABLE OF staging_table%ROWTYPE создаёт тип 'коллекция строк как в staging_table'</em>. <strong>BULK COLLECT</strong> INTO t_rows загружает все нужные строки в память разом. <strong>FORALL</strong> вставляет всю коллекцию за один DML-вызов. %ROWTYPE автоматически подстраивает структуру под таблицу.</p>"}, {"id": 155, "topic": "SQL", "subtopic": "Динамический SQL в PL/SQL — использование EXECUTE IMMEDIATE и DBMS_SQL для построения гибкой метауправляемой ETL-логики загрузки таблиц Data Vault", "question": "Почему в метауправляемой ETL-логике Data Vault предпочтительнее использовать EXECUTE IMMEDIATE с bind variables вместо конкатенации значений прямо в SQL-строку?", "answers": ["Конкатенация открывает риск SQL-инъекций и исключает повторное использование курсора из shared pool. Bind variables позволяют Oracle переиспользовать parse-план (soft parse), снижая нагрузку на CPU и shared pool при массовой загрузке множества однотипных хабов/сателлитов через единый шаблон SQL.", "Конкатенация значений в SQL-строку работает быстрее при однократном выполнении, поэтому bind variables нужны только в циклах с тысячами итераций — для единичных загрузок хабов разницы нет.", "Использование bind variables вместо конкатенации в первую очередь решает проблему превышения лимита длины SQL-строки в 32767 байт при динамическом построении INSERT-запросов для широких сателлитов Data Vault, а не вопросы безопасности или производительности shared pool — те решаются отдельно через политики VPD и параметр CURSOR_SHARING=FORCE.", "Bind variables в EXECUTE IMMEDIATE необходимы исключительно для обеспечения совместимости с DBMS_SQL, поскольку конкатенация строк не поддерживается при параллельном выполнении ETL-потоков в Data Vault. Кроме того, bind variables автоматически экранируют специальные символы Oracle, что упрощает обработку суррогатных ключей хабов. 13. Последовательности (SEQUENCE) - создание и применение последовательностей для генерации суррогатных ключей в объектах хранилища данных В Data Vault хабе необходимо генерировать суррогатный ключ при вставке новых записей — какой DDL-синтаксис Oracle позволит привязать sequence к колонке хаба без использования триггера?"], "correct": 0, "explanation": "🔧 DBMS_SQL.BIND_VARIABLE позволяет добавлять переменные в цикле: for each column: DBMS_SQL.BIND_VARIABLE(cursor, ':col'||i, value). EXECUTE IMMEDIATE с USING требует явного перечисления: USING val1, val2, val3 — нельзя сделать это в цикле при переменном числе аргументов.", "explanation_html": "<p><em class=\"analogy\">🔧 DBMS_SQL.BIND_VARIABLE позволяет добавлять переменные в цикле: for each column: DBMS_SQL.BIND_VARIABLE(cursor, ':col'||i, value)</em>. EXECUTE IMMEDIATE с USING требует явного перечисления: USING val1, val2, val3 — нельзя сделать это в цикле при переменном числе аргументов.</p>"}, {"id": 156, "topic": "SQL", "subtopic": "Функции PL/SQL - создание пользовательских функций, возвращающих скалярные значения, для вычисления хэш-ключей и бизнес-атрибутов в маппингах", "question": "Почему пользовательские функции PL/SQL для вычисления хэш-ключей в Data Vault должны быть детерминированными?", "answers": ["Детерминированность необходима для повышения производительности: Oracle кэширует результаты детерминированных функций в рамках одного запроса, что ускоряет вычисление хэш-ключей при массовой загрузке миллионов записей в хранилище данных.", "Детерминированные функции обязательны, поскольку Oracle не допускает использование недетерминированных функций в индексах на основе функций, а хэш-ключи в Data Vault всегда индексируются для обеспечения быстрого поиска по первичным ключам хабов и линков.", "Детерминированность гарантирует уникальность хэш-значений: одинаковые входные данные не могут породить коллизии, что критично для Data Vault, так как хэш-ключ является единственным идентификатором сущности и не допускает дублирования записей в хабах и сателлитах.", "Детерминированность гарантирует, что одинаковые входные бизнес-ключи всегда дают одинаковый хэш, обеспечивая корректное связывание записей между хабами, линками и сателлитами при повторных загрузках. 15. Объектные типы Oracle - создание пользовательских типов (CREATE TYPE) для передачи структурированных данных между процедурами загрузки сателлитов Почему для передачи коллекции записей между процедурами загрузки сателлитов предпочтительнее использовать TABLE OF объектного типа, а не набор отдельных параметров?"], "correct": 2, "explanation": "🔐 Детерминированность ≠ уникальность. MD5 может выдать одинаковый хэш для разных входных данных (коллизия), но это крайне редко. Главное свойство: одинаковые входные данные → всегда одинаковый хэш → корректное связывание записей между Hub, Link и Satellite при повторных загрузках.", "explanation_html": "<p><em class=\"analogy\">🔐 Детерминированность ≠ уникальность</em>. MD5 может выдать одинаковый хэш для разных входных данных (коллизия), но это крайне редко. Главное свойство: одинаковые входные данные → всегда одинаковый хэш → корректное связывание записей между Hub, Link и Satellite при повторных загрузках.</p>"}, {"id": 157, "topic": "SQL", "subtopic": "Представления (VIEW) - разработка представлений на слоях Business Vault и Information Mart с инкапсуляцией логики преобразования данных Data Vault", "question": "Почему в слое Business Vault логику вычисляемых атрибутов рекомендуется инкапсулировать во VIEW, а не хранить физически в таблицах?", "answers": ["Чтобы сохранить принцип неизменности сырых данных Data Vault: VIEW позволяет добавлять бизнес-логику и дериваты без модификации исходных таблиц Hub/Link/Satellite, обеспечивая гибкость изменений без перезаписи исторических данных.", "VIEW быстрее разрабатывать.", "VIEW используется исключительно по соображениям производительности: Oracle материализует план выполнения представления один раз и переиспользует его, что критично для сложных агрегаций в Business Vault, а физические таблицы потребовали бы полного пересчёта при каждом обновлении данных в Satellite-слое.", "Физическое хранение вычисляемых атрибутов в таблицах Business Vault требует дополнительных ETL-процессов для синхронизации с источником, тогда как VIEW автоматически кэширует результаты вычислений в памяти Oracle, снижая нагрузку на дисковую подсистему и ускоряя выборки."], "correct": 3, "explanation": "🏗️ VIEW = логика без физического хранения. Если бизнес-правило изменится — меняешь VIEW, не трогая данные. Физическая таблица = нужен ETL для синхронизации при каждом изменении Satellite. VIEW в Business Vault: чистота сырых данных в Raw Vault + гибкость бизнес-логики в одном флаконе.", "explanation_html": "<p><em class=\"analogy\">🏗️ VIEW = логика без физического хранения</em>. Если бизнес-правило изменится — меняешь VIEW, не трогая данные. Физическая таблица = нужен ETL для синхронизации при каждом изменении Satellite. VIEW в Business Vault: чистота сырых данных в Raw Vault + гибкость бизнес-логики в одном флаконе.</p>"}, {"id": 158, "topic": "Модели данных DWH", "subtopic": "Surrogate Key в Data Vault - принципы формирования и использование в hub, link и satellite", "question": "Почему surrogate key в Data Vault генерируется на основе хеша бизнес-ключа, а не как автоинкремент?", "answers": ["Хеш используется для экономии места: он занимает меньше байт, чем автоинкремент, что ускоряет JOIN-операции и снижает нагрузку на индексы в больших таблицах.", "Автоинкремент не подходит, так как базы данных не поддерживают его в распределённых системах, а хеш генерируется встроенными функциями SQL без дополнительных настроек.", "Хеш выбран ради безопасности: он скрывает реальные бизнес-ключи от аналитиков, обеспечивая маскирование чувствительных данных согласно требованиям GDPR.", "Хеш обеспечивает детерминированность: один и тот же бизнес-ключ всегда даёт одинаковый surrogate key, что позволяет параллельно загружать данные из разных источников без конфликтов и без централизованного генератора ключей."], "correct": 3, "explanation": "🎯 Хэш детерминирован: любой источник, любое время, одинаковый бизнес-ключ → одинаковый суррогатный ключ. Это позволяет параллельно загружать данные из нескольких источников без центрального генератора ключей. Автоинкремент требует координации → узкое место при параллельности.", "explanation_html": "<p><em class=\"analogy\">🎯 Хэш детерминирован: любой источник, любое время, одинаковый <strong>бизнес-ключ</strong> → одинаковый <strong>суррогатный ключ</strong></em>. Это позволяет параллельно загружать данные из нескольких источников без центрального генератора ключей. Автоинкремент требует координации → узкое место при параллельности.</p>"}, {"id": 159, "topic": "Модели данных DWH", "subtopic": "Hub-таблицы Data Vault — определение business key и проектирование surrogate key для новых бизнес-доменов", "question": "Почему surrogate key в Hub-таблице генерируется на основе хэша business key, а не через автоинкремент?", "answers": ["Хэш от business key детерминирован: одинаковый ключ всегда даёт одинаковый surrogate key независимо от источника и среды загрузки, что позволяет безопасно параллельно загружать данные из нескольких источников без конфликтов и необходимости централизованной генерации ID.", "Хэш используется для экономии места: он занимает меньше байт, чем автоинкремент, что ускоряет индексирование и JOIN-операции в хранилище при больших объёмах данных.", "Хэш от business key гарантирует уникальность surrogate key: в отличие от автоинкремента, коллизии при хэшировании технически невозможны, поэтому такой подход считается более надёжным стандартом Data Vault.", "Автоинкремент не подходит, так как не поддерживается большинством современных DWH-платформ. Хэш — единственный способ генерировать уникальные ключи без привязки к конкретной СУБД. 11. Историчность данных в Data Vault - обеспечение целостности исторических записей satellite-таблиц при изменении структуры модели Почему при добавлении новой колонки в satellite-таблицу исторические записи не должны пересчитываться заново?"], "correct": 2, "explanation": "⚠️ Внимание: коллизии хэш-функции теоретически возможны, хотя и крайне редки. Правильный ответ на этот вопрос — детерминированность (одинаковые ключи = одинаковый хэш), а не 'гарантированная уникальность'. Hash гарантирует детерминированность, а уникальность — статистически высокая, не абсолютная.", "explanation_html": "<p><em class=\"analogy\">⚠️ Внимание: коллизии <strong>хэш</strong>-функции теоретически возможны, хотя и крайне редки</em>. Правильный ответ на этот вопрос — детерминированность (одинаковые ключи = одинаковый <strong>хэш</strong>), а не 'гарантированная уникальность'. Hash гарантирует детерминированность, а уникальность — статистически высокая, не абсолютная.</p>"}, {"id": 160, "topic": "Informatica PC", "subtopic": "Цепочка трансформаций для загрузки Data Vault Hub — построение последовательности Lookup → Expression → Aggregator → Router с дедупликацией бизнес-ключей и вычислением хэш-значений", "question": "В цепочке Lookup → Aggregator → Expression → Router для загрузки Hub какой компонент выполняет дедупликацию бизнес-ключей и какие требования к нему предъявляются?", "answers": ["Aggregator с GROUP BY по бизнес-ключу, с включённым Sorted Input (данные предварительно отсортированы). Expression вычисляет MD5/SHA1 хэш после дедупликации. Router разделяет новые и существующие записи.", "Дедупликацию бизнес-ключей выполняет Router с условием фильтрации по уникальности: он направляет дубликаты в отдельную группу Default, а уникальные записи — в целевую таблицу Hub. Aggregator при этом не используется, а Expression вычисляет MD5 хэш до Router на полном наборе данных включая дубликаты.", "Дедупликацию выполняет Aggregator с GROUP BY по бизнес-ключу, однако Sorted Input должен быть отключён — сортировка данных снижает производительность и не требуется, так как Aggregator самостоятельно кэширует все записи в памяти. MD5 хэш вычисляется до Aggregator в компоненте Expression, чтобы хэшировать каждую запись до группировки.", "Дедупликацию выполняет компонент Lookup, который сравнивает входящие бизнес-ключи с уже существующими в Hub и отфильтровывает дубликаты через условие No Match. Expression после Lookup вычисляет хэш, а Aggregator используется только для подсчёта статистики загрузки. 6. Трансформация Expression в Informatica PowerCenter — форматирование и преобразование полей при загрузке плоских файлов в таблицу-приёмник Почему трансформация Expression в Informatica PowerCenter не может изменить количество строк на выходе?"], "correct": 1, "explanation": "⚠️ Внимание: правильный ответ для дедупликации в Hub — Aggregator с GROUP BY по бизнес-ключу. Router разделяет потоки на новые/существующие (через Lookup), но не дедуплицирует внутри батча. Expression вычисляет хэш, Aggregator группирует, Router направляет.", "explanation_html": "<p><em class=\"analogy\">⚠️ Внимание: правильный ответ для дедупликации в Hub — <strong>Aggregator</strong> с GROUP BY по бизнес-ключу</em>. <strong>Router</strong> разделяет потоки на новые/существующие (через <strong>Lookup</strong>), но не дедуплицирует внутри батча. <strong>Expression</strong> вычисляет хэш, <strong>Aggregator</strong> группирует, <strong>Router</strong> направляет.</p>"}, {"id": 161, "topic": "SQL", "subtopic": "JOIN-ы — механика INNER, LEFT, FULL OUTER JOIN и корректное их применение при загрузке данных в DWH-слои", "question": "Почему при загрузке данных в hub-таблицу Data Vault рекомендуется использовать LEFT JOIN вместо INNER JOIN при сравнении с уже существующими записями?", "answers": ["INNER JOIN вернул бы только совпадающие записи из обеих таблиц, что как раз и нужно для загрузки — однако LEFT JOIN предпочтительнее, так как позволяет сохранить дубликаты бизнес-ключей из источника и передать их в satellite-таблицы для отслеживания истории изменений атрибутов.", "LEFT JOIN используется потому, что он работает быстрее INNER JOIN при большом объёме данных в hub-таблице — оптимизатор запросов может эффективнее использовать индексы по бизнес-ключам, что критично при инкрементальной загрузке в высоконагруженных DWH-системах.", "INNER JOIN медленнее при NULL-значениях.", "INNER JOIN исключил бы новые бизнес-ключи, которых ещё нет в hub — именно LEFT JOIN позволяет выявить записи, отсутствующие в целевой таблице (где правая часть NULL), и загрузить только новые уникальные бизнес-ключи."], "correct": 3, "explanation": "🔎 LEFT JOIN Hub к существующим данным: WHERE existing.key IS NULL означает 'эта запись есть в источнике, но НЕТ в Hub'. Именно эти строки нужно вставить. INNER JOIN вернул бы только уже существующие записи — то есть ничего нового не загрузим. LEFT JOIN = находим новинки.", "explanation_html": "<p><em class=\"analogy\">🔎 <strong>LEFT <strong>JOIN</strong> Hub к существующим данным: <strong>WHERE</strong> existing.key IS <strong>NULL</strong> означает 'эта запись есть в источнике, но НЕТ в Hub'</em>. Именно эти строки нужно вставить. <strong>INNER <strong>JOIN</strong> вернул бы только уже существующие записи — то есть ничего нового не загрузим. <strong>LEFT <strong>JOIN</strong> = находим новинки.</p>"}, {"id": 162, "topic": "SQL", "subtopic": "Фильтрация данных - применение HAVING для отбора групп с агрегированными показателями выше заданного порога", "question": "Почему HAVING применяется после GROUP BY, а не до него?", "answers": ["Потому что HAVING фильтрует уже сформированные группы с вычисленными агрегатами, которые появляются только после GROUP BY.", "Потому что HAVING работает только с индексированными столбцами, которые становятся доступны после того, как GROUP BY завершает сортировку и индексирование данных.", "Потому что HAVING фильтрует строки до агрегации, поэтому ему нужен результат GROUP BY как входные данные.", "HAVING применяется после GROUP BY, так как иначе WHERE не сможет корректно обработать условия фильтрации по исходным строкам. 11. JOIN-ы — механика INNER, LEFT, FULL OUTER JOIN и корректное их применение при загрузке данных в DWH-слои При загрузке данных в хаб Data Vault из двух источников (source_a и source_b) с частично пересекающимися ключами — какой тип JOIN следует использовать, чтобы не потерять бизнес-ключи ни из одного источника?"], "correct": 0, "explanation": "⏰ HAVING работает на результатах GROUP BY. Чтобы фильтровать по COUNT(*) или SUM() — нужно сначала их посчитать. COUNT(*) появляется только после GROUP BY. Поэтому HAVING физически не может стоять до GROUP BY — ему нечего фильтровать.", "explanation_html": "<p>⏰ <strong>HAVING</strong> работает на результатах <strong>GROUP BY</strong>. Чтобы фильтровать по <strong>COUNT</strong>(*) или <strong>SUM</strong>() — нужно сначала их посчитать. <strong>COUNT</strong>(*) появляется только после <strong>GROUP BY</strong>. Поэтому <strong>HAVING</strong> физически не может стоять до <strong>GROUP BY</strong> — ему нечего фильтровать.</p>"}, {"id": 163, "topic": "SQL", "subtopic": "Хранимые процедуры PL/SQL — проектирование и реализация сложных процедур для загрузки данных в слои Data Vault (Hub, Link, Satellite)", "question": "Почему при загрузке Hub в Data Vault используют MERGE вместо простого INSERT?", "answers": ["MERGE быстрее INSERT при загрузке Hub, так как использует параллельные потоки записи и обходит табличные индексы.", "MERGE используется для обновления существующих Hub-записей при изменении бизнес-ключа, что невозможно сделать через INSERT.", "INSERT не поддерживает работу с суррогатными ключами (hash-ключами) в Data Vault, поэтому применяют MERGE.", "MERGE атомарно обрабатывает дубликаты бизнес-ключей: вставляет только новые записи, избегая нарушений уникальности без отдельного SELECT-проверки. 6. Курсоры PL/SQL - использование явных курсоров, курсорных переменных и атрибутов курсора для построчной и пакетной обработки данных в ETL-процедурах Почему использование BULK COLLECT с LIMIT предпочтительнее полного BULK COLLECT без ограничений в ETL-процедурах при обработке больших объёмов данных?"], "correct": 3, "explanation": "🔄 MERGE = 'если есть — ничего не делаем (WHEN MATCHED), если нет — вставляем (WHEN NOT MATCHED)'. Для Hub это идеально: дублей не будет (нет UPDATE для Hub), новые ключи добавляются атомарно. Простой INSERT упадёт с ошибкой при дубле или создаст дубль без уникального индекса.", "explanation_html": "<p><em class=\"analogy\">🔄 MERGE = 'если есть — ничего не делаем (WHEN MATCHED), если нет — вставляем (WHEN NOT MATCHED)'</em>. Для Hub это идеально: дублей не будет (нет UPDATE для Hub), новые ключи добавляются атомарно. Простой INSERT упадёт с ошибкой при дубле или создаст дубль без уникального индекса.</p>"}, {"id": 164, "topic": "SQL", "subtopic": "Исключения PL/SQL - объявление пользовательских исключений и построение централизованной обработки ошибок в процедурах ETL-загрузки", "question": "Почему в ETL-процедурах рекомендуется объявлять пользовательские исключения через PRAGMA EXCEPTION_INIT, а не использовать только встроенные исключения Oracle?", "answers": ["PRAGMA EXCEPTION_INIT ускоряет обработку ошибок в ETL, так как исключения с именами обрабатываются быстрее, чем анонимные коды в WHEN OTHERS, что критично при массовых загрузках данных с высокой частотой ошибок.", "PRAGMA EXCEPTION_INIT используется вместо встроенных исключений, потому что встроенные исключения Oracle не имеют кодов SQLCODE и недоступны через SQLERRM, а пользовательские исключения с PRAGMA дают полный доступ к диагностической информации об ошибке.", "PRAGMA EXCEPTION_INIT позволяет связать произвольный код ошибки Oracle (-XXXXX) с именованным исключением, что даёт возможность перехватывать специфические ошибки БД (например, нарушение FK или уникальности) по имени в блоке EXCEPTION, делая централизованную обработку ошибок ETL читаемой и точной, а не ловить всё через WHEN OTHERS с ручным разбором SQLCODE.", "PRAGMA EXCEPTION_INIT нужна для создания новых кодов ошибок, которых нет в Oracle, что позволяет ETL-процедурам генерировать собственные уникальные исключения через RAISE без привязки к системным кодам. 13. Пакеты (PACKAGE) PL/SQL - организация процедур и функций загрузки хабов, линков и сателлитов в пакеты с разделением спецификации и тела Почему в PL/SQL пакете спецификация и тело компилируются раздельно, и какое это даёт преимущество при изменении логики загрузки сателлитов?"], "correct": 2, "explanation": "🎯 PRAGMA EXCEPTION_INIT связывает имя исключения с кодом ORA. Вместо 'WHEN OTHERS THEN IF SQLCODE = -1 THEN...' пишешь чисто 'WHEN e_dup_val THEN'. Код становится читаемым. Каждый тип ошибки имеет имя и свой обработчик — централизованно, чисто, понятно.", "explanation_html": "<p><em class=\"analogy\">🎯 PRAGMA EXCEPTION_INIT связывает имя исключения с кодом ORA</em>. Вместо 'WHEN OTHERS THEN IF SQLCODE = -1 THEN...' пишешь чисто 'WHEN e_dup_val THEN'. Код становится читаемым. Каждый тип ошибки имеет имя и свой обработчик — централизованно, чисто, понятно.</p>"}, {"id": 165, "topic": "SQL", "subtopic": "Пакеты PL/SQL - структура PACKAGE и PACKAGE BODY, группировка связанных процедур и функций одного ETL-потока по готовому образцу", "question": "В пакете ETL-потока загрузки хабов Data Vault нужно скрыть внутреннюю процедуру calc_hash от внешних вызовов — где её следует объявить?", "answers": ["Только в PACKAGE BODY, добавив модификатор PROTECTED перед именем процедуры — иначе она останется публичной.", "Только в PACKAGE (спецификации), без тела — объявление в спецификации автоматически делает процедуру приватной.", "Только в PACKAGE BODY, без объявления в PACKAGE (спецификации) — тогда процедура будет приватной и недоступной извне пакета.", "Объявить в обоих местах с ключевым словом PRIVATE — это стандартный способ скрыть процедуру от внешних вызовов. 16. Функции PL/SQL - создание пользовательских функций, возвращающих скалярные значения, для вычисления хэш-ключей и бизнес-атрибутов в маппингах Почему пользовательские функции PL/SQL для вычисления хэш-ключей в Data Vault должны быть детерминированными?"], "correct": 2, "explanation": "🔒 Процедура в PACKAGE BODY без объявления в PACKAGE SPEC = приватная процедура. Она видна только внутри пакета — другие пакеты и внешний код её вызвать не могут. PACKAGE SPEC = публичный интерфейс. PACKAGE BODY = реализация (публичная + приватная).", "explanation_html": "<p><em class=\"analogy\">🔒 Процедура в PACKAGE BODY без объявления в PACKAGE SPEC = приватная процедура</em>. Она видна только внутри пакета — другие пакеты и внешний код её вызвать не могут. PACKAGE SPEC = публичный интерфейс. PACKAGE BODY = реализация (публичная + приватная).</p>"}, {"id": 166, "topic": "SQL", "subtopic": "Последовательности (Sequence) — создание и применение sequence для генерации суррогатных ключей и технических идентификаторов в объектах Data Vault", "question": "Почему в Data Vault для генерации суррогатных ключей sequence предпочтительнее ROWNUM или функции генерации UUID на уровне SQL-запроса?", "answers": ["Sequence предпочтительнее потому, что ROWNUM и UUID генерируются на клиентской стороне и не логируются в redo-логах Oracle, из-за чего невозможно восстановить значения ключей после сбоя, тогда как sequence полностью управляется словарём данных.", "ROWNUM не подходит для суррогатных ключей исключительно по причине производительности: при больших объёмах данных Oracle вынужден материализовать весь результирующий набор для присвоения номеров строкам, тогда как sequence работает через легковесный кэш в SGA. UUID-функции же избыточны по размеру хранимых данных — 128 бит против компактного числового sequence, что критично для индексов Hub и Link таблиц.", "UUID предпочтительнее sequence в Data Vault, поскольку гарантирует глобальную уникальность без обращения к базе данных, а ROWNUM не используется просто из соображений читаемости кода.", "Sequence гарантирует уникальность и атомарность даже при параллельных сессиях: каждый вызов NEXTVAL возвращает уникальное значение независимо от конкурентных транзакций, тогда как ROWNUM зависит от контекста запроса и не гарантирует уникальность при параллельной загрузке, что критично для Hub и Link ключей в Data Vault. 18. Представления (VIEW) - разработка представлений на слоях Business Vault и Information Mart с инкапсуляцией логики преобразования данных Data Vault Почему в слое Business Vault логику вычисляемых атрибутов рекомендуется инкапсулировать во VIEW, а не хранить физически в таблицах?"], "correct": 3, "explanation": "🔢 ROWNUM не уникален при параллельной загрузке (зависит от порядка строк в запросе). UUID генерируется без гарантии от БД. SEQUENCE.NEXTVAL = атомарный счётчик: каждый вызов гарантированно возвращает уникальное значение, даже при 100 параллельных сессиях одновременно.", "explanation_html": "<p><em class=\"analogy\">🔢 ROWNUM не уникален при параллельной загрузке (зависит от порядка строк в запросе)</em>. UUID генерируется без гарантии от БД. SEQUENCE.NEXTVAL = атомарный счётчик: каждый вызов гарантированно возвращает уникальное значение, даже при 100 параллельных сессиях одновременно.</p>"}, {"id": 167, "topic": "Модели данных DWH", "subtopic": "Link-таблицы Data Vault - моделирование многоуровневых связей между hub-сущностями в сложных доменах", "question": "Почему в Data Vault Link-таблица не хранит дескриптивные атрибуты связи напрямую, а выносит их в отдельный Satellite?", "answers": ["Чтобы сохранить неизменяемость Link-таблицы и отслеживать историю изменений атрибутов связи независимо от самого факта связи между Hub-сущностями.", "Потому что Link-таблица технически не может содержать nullable-поля, а дескриптивные атрибуты связи часто необязательны и появляются позже основного факта связи.", "Дескриптивные атрибуты выносятся в Satellite для оптимизации производительности JOIN-запросов: Link хранит только ключи, что уменьшает размер индексов и ускоряет поиск связей между Hub-сущностями в больших объёмах данных.", "Чтобы упростить ETL-процессы загрузки данных. 10. Link-таблицы Data Vault - моделирование многоуровневых связей между hub-сущностями в сложных доменах В домене e-commerce нужно смоделировать связь Order-Product-Warehouse-Supplier. Сравните подходы: единый четырёхсторонний Link vs. несколько связанных Link-таблиц разной гранулярности."], "correct": 2, "explanation": "🏠 Link = факт что 'этот заказ связан с этим клиентом'. Атрибуты связи (скидка за сотрудничество, дата начала контракта) могут меняться. Изменяемые вещи нельзя держать в неизменяемом Link. Satellite к Link = история изменений атрибутов этой конкретной связи.", "explanation_html": "<p><em class=\"analogy\">🏠 <strong>Link</strong> = факт что 'этот заказ связан с этим клиентом'</em>. Атрибуты связи (скидка за сотрудничество, дата начала контракта) могут меняться. Изменяемые вещи нельзя держать в неизменяемом <strong>Link</strong>. <strong>Satellite</strong> к <strong>Link</strong> = история изменений атрибутов этой конкретной связи.</p>"}, {"id": 168, "topic": "Informatica PC", "subtopic": "Трансформации Lookup и Aggregator — подстановка значений из справочников и расчёт агрегированных показателей в цепочке трансформаций", "question": "В цепочке трансформаций Lookup → Aggregator нужно подставить название категории из справочника и посчитать сумму продаж по каждой категории — в каком порядке следует расположить трансформации?", "answers": ["Порядок не имеет принципиального значения: Informatica автоматически оптимизирует цепочку трансформаций и переставляет их в нужном порядке при компиляции маппинга, поэтому Aggregator можно разместить до или после Lookup — результат будет одинаковым.", "Сначала Lookup подставляет название категории, затем Aggregator группирует по ней и считает SUM продаж. Aggregator после Lookup — единственно верный порядок, иначе группировка будет по коду, а не названию.", "Lookup следует поместить после Aggregator, но настроить его на справочную таблицу с агрегированными данными — такой подход позволяет избежать дублирования логики группировки и получить название категории вместе с предрассчитанной суммой продаж за один проход по данным.", "Сначала Aggregator группирует по коду категории и считает SUM продаж, затем Lookup подставляет название — это эффективнее, так как уменьшает количество обращений к справочнику: вместо каждой строки lookup выполняется только для уникальных кодов после группировки."], "correct": 1, "explanation": "🍳 Сначала Lookup подставляет название (без него некуда группировать по названию), потом Aggregator считает SUM по этому названию. Порядок критичен: если поменять местами, Aggregator будет группировать по коду (до подстановки), а не по названию. Данные будут неверными.", "explanation_html": "<p><em class=\"analogy\">🍳 Сначала <strong>Lookup</strong> подставляет название (без него некуда группировать по названию), потом <strong>Aggregator</strong> считает SUM по этому названию</em>. Порядок критичен: если поменять местами, <strong>Aggregator</strong> будет группировать по коду (до подстановки), а не по названию. Данные будут неверными.</p>"}, {"id": 169, "topic": "SQL", "subtopic": "Оконные функции — механика выполнения PARTITION BY/ORDER BY, фреймы (ROWS/RANGE) и выбор между оконной функцией и GROUP BY для аналитических расчётов в DWH", "question": "Почему RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW может включать больше строк во фрейм, чем аналогичный ROWS-фрейм?", "answers": ["RANGE работает с логическими границами по значению ORDER BY: все строки с одинаковым значением ключа сортировки считаются 'текущими' и включаются во фрейм вместе, тогда как ROWS оперирует физическими позициями строк и включает ровно одну текущую строку.", "RANGE автоматически расширяет фрейм до границ секции (PARTITION), если в ORDER BY встречаются дублирующиеся значения, тогда как ROWS строго ограничен указанным количеством строк и никогда не выходит за пределы явно заданного диапазона позиций.", "ROWS всегда пропускает NULL-строки, а RANGE включает их.", "RANGE использует физические позиции строк точно так же, как ROWS, однако дополнительно включает во фрейм все строки из соседних секций с совпадающим значением ключа сортировки, что приводит к пересечению границ PARTITION BY и увеличивает количество обрабатываемых строк по сравнению с ROWS-фреймом. 7. Оконные функции - использование ROW_NUMBER() для нумерации строк внутри группы по шаблону Вам нужно пронумеровать строки внутри каждого hub_customer, упорядочив записи по load_date — какой SQL-запрос это реализует?"], "correct": 3, "explanation": "⚠️ Внимание: RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW работает с логическими границами ORDER BY. Строки с одинаковым значением ORDER BY ключа считаются 'текущими' одновременно — все они включаются во фрейм. ROWS оперирует физическими позициями строк. Это разница в поведении при дублях.", "explanation_html": "<p><em class=\"analogy\">⚠️ Внимание: RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW работает с логическими границами <strong>ORDER BY</strong></em>. Строки с одинаковым значением <strong>ORDER BY</strong> ключа считаются 'текущими' одновременно — все они включаются во фрейм. ROWS оперирует физическими позициями строк. Это разница в поведении при дублях.</p>"}, {"id": 170, "topic": "SQL", "subtopic": "Оконные функции - использование ROW_NUMBER() для нумерации строк внутри группы по шаблону", "question": "Вам нужно пронумеровать строки внутри каждого hub_customer, упорядочив записи по load_date — какой SQL-запрос это реализует?", "answers": ["SELECT *, ROW_NUMBER() OVER (PARTITION BY hub_customer_key ORDER BY load_date) AS rn FROM hub_customer;", "SELECT *, RANK() OVER (PARTITION BY hub_customer_key ORDER BY load_date ASC) AS rn FROM hub_customer;", "SELECT *, ROW_NUMBER() OVER (PARTITION BY load_date ORDER BY hub_customer_key) AS rn FROM hub_customer;", "SELECT *, ROW_NUMBER() OVER (ORDER BY load_date) AS rn FROM hub_customer PARTITION BY hub_customer_key; 8. Анализ плана выполнения запроса — выявление узких мест через EXPLAIN/EXPLAIN ANALYZE и устранение избыточного полного сканирования таблиц Назовите основные причины расхождения estimated rows и actual rows в EXPLAIN ANALYZE."], "correct": 0, "explanation": "🏷️ SELECT *, ROW_NUMBER() OVER(PARTITION BY hub_customer_key ORDER BY load_date) AS rn FROM hub_customer нумерует строки внутри каждого клиента от старых к новым. rn=1 = самая ранняя запись, rn=MAX = самая свежая. Без ORDER BY нумерация непредсказуема.", "explanation_html": "<p><em class=\"analogy\">🏷️ SELECT *, <strong>ROW_NUMBER</strong>() OVER(<strong>PARTITION BY</strong> hub_customer_key <strong>ORDER BY</strong> load_date) AS rn FROM hub_customer нумерует строки внутри каждого клиента от старых к новым</em>. rn=1 = самая ранняя запись, rn=MAX = самая свежая. Без <strong>ORDER BY</strong> нумерация непредсказуема.</p>"}, {"id": 171, "topic": "Oracle PL/SQL", "subtopic": "Обработка исключений PL/SQL - использование стандартных и пользовательских исключений (EXCEPTION, RAISE, SQLCODE, SQLERRM) для логирования ошибок в ETL-блоках", "question": "Почему в ETL-блоке рекомендуется использовать SQLERRM вместе с SQLCODE при логировании ошибок?", "answers": ["SQLCODE необходим для фильтрации системных ошибок от пользовательских исключений, а SQLERRM автоматически переводит сообщение на язык текущей сессии базы данных для читаемости логов", "SQLERRM самостоятельно содержит полную информацию об ошибке включая код и описание, поэтому SQLCODE добавляют лишь для совместимости со старыми версиями Oracle и legacy-кодом", "SQLCODE возвращает текстовое описание ошибки, а SQLERRM — её числовой идентификатор; совместное использование позволяет дублировать информацию для повышения надёжности записи в лог-таблицу", "SQLCODE возвращает числовой код ошибки, а SQLERRM — её текстовое описание; вместе они дают полную диагностическую информацию для анализа сбоя 6. Последовательности (Sequence) — создание и применение sequence для генерации суррогатных ключей и технических идентификаторов в объектах Data Vault Почему в Data Vault для генерации суррогатных ключей sequence предпочтительнее ROWNUM или функции генерации UUID на уровне SQL-запроса?"], "correct": 3, "explanation": "🔍 SQLCODE = числовой код ошибки (-1 для уникальности, -1017 для неверного пароля). SQLERRM = текстовое описание ('ORA-00001: unique constraint violated'). Только код = неясно что случилось. Только текст = сложно фильтровать и обрабатывать программно. Вместе = полная диагностика.", "explanation_html": "<p><em class=\"analogy\">🔍 SQLCODE = числовой код ошибки (-1 для уникальности, -1017 для неверного пароля)</em>. SQLERRM = текстовое описание ('ORA-00001: unique constraint violated'). Только код = неясно что случилось. Только текст = сложно фильтровать и обрабатывать программно. Вместе = полная диагностика.</p>"}, {"id": 172, "topic": "SQL", "subtopic": "CTE — пошаговая трансформация данных из staging-слоя в целевую таблицу с проверкой уникальности ключей", "question": "Почему при загрузке в Hub-таблицу Data Vault через CTE используют ROW_NUMBER() перед INSERT, а не просто DISTINCT?", "answers": ["DISTINCT не используют потому, что он несовместим с конструкцией CTE в большинстве СУБД при наличии оконных функций в том же запросе, тогда как ROW_NUMBER() технически обязателен для корректной компиляции запроса INSERT...SELECT из CTE в соответствии со стандартом SQL:2003.", "ROW_NUMBER() применяется не для устранения дублей, а для присвоения порядкового номера каждой записи перед вставкой в Hub, что позволяет системе аудита Data Vault отслеживать последовательность загрузки и восстанавливать хронологию появления бизнес-ключей в источнике без потери каких-либо строк.", "DISTINCT не гарантирует выбор одной строки при дублях с разными атрибутами — ROW_NUMBER() позволяет детерминировано оставить ровно одну запись на бизнес-ключ, контролируя порядок выбора через ORDER BY.", "DISTINCT прекрасно справляется с дублями по бизнес-ключу, однако ROW_NUMBER() используют по соображениям производительности: оконные функции выполняются быстрее операции DISTINCT на больших объёмах staging-данных, поскольку не требуют полной сортировки всего результирующего набора. 8. Анализ плана выполнения запроса — выявление узких мест через EXPLAIN/EXPLAIN ANALYZE и устранение избыточного полного сканирования таблиц В плане EXPLAIN ANALYZE виден Seq Scan на таблице фактов из 50 млн строк с фильтром по load_date, хотя индекс существует — какова наиболее вероятная причина игнорирования индекса планировщиком?"], "correct": 1, "explanation": "✅ Правильный ответ: ROW_NUMBER() позволяет детерминированно выбрать ОДНУ запись из дублей, контролируя порядок через ORDER BY. DISTINCT убирает полностью одинаковые строки, но если дубли отличаются другими полями (датой загрузки) — DISTINCT не поможет. ROW_NUMBER + WHERE rn=1 = точный выбор.", "explanation_html": "<p>✅ Правильный ответ: <strong>ROW_NUMBER</strong>() позволяет детерминированно выбрать ОДНУ запись из дублей, контролируя порядок через <strong>ORDER BY</strong>. DISTINCT убирает полностью одинаковые строки, но если дубли отличаются другими полями (датой загрузки) — DISTINCT не поможет. <strong>ROW_NUMBER</strong> + <strong>WHERE</strong> rn=1 = точный выбор.</p>"}, {"id": 173, "topic": "SQL", "subtopic": "Агрегирование данных — GROUP BY, функции COUNT/SUM/MAX и их поведение при наличии NULL-значений в аналитических выборках", "question": "В таблице сателлита SAT_PAYMENT есть столбец amount с NULL-значениями у части записей. Какой агрегат вернёт корректную сумму только по существующим платежам: SUM(amount) или SUM(COALESCE(amount, 0))?", "answers": ["Оба варианта корректны и взаимозаменяемы: SUM(amount) игнорирует NULL, а SUM(COALESCE(amount, 0)) заменяет их нулями, поэтому результат идентичен. Однако в продуктивной среде Data Vault рекомендуется использовать именно COALESCE-версию как более явную и читаемую для аналитиков, работающих с сателлитами.", "SUM(COALESCE(amount, 0)) — единственный корректный вариант, поскольку SUM(amount) при наличии NULL в столбце вернёт NULL для всей группы, и итоговая сумма окажется некорректной. COALESCE заменяет NULL нулями, гарантируя, что агрегат учтёт все строки и вернёт числовой результат вместо NULL.", "SUM(amount) — игнорирует NULL автоматически и возвращает сумму только существующих значений. SUM(COALESCE(amount, 0)) даст тот же результат, но COALESCE избыточен и может вводить в заблуждение, создавая ложное ощущение, что нули учитываются как реальные платежи.", "SUM(amount) вернёт NULL, если хотя бы одна запись содержит NULL. 10. WHERE и HAVING — корректная фильтрация строк и агрегатов в одном аналитическом запросе Почему нельзя использовать WHERE для фильтрации результатов агрегатных функций?"], "correct": 0, "explanation": "💡 SUM(amount) автоматически игнорирует NULL — результат суммы существующих значений. SUM(COALESCE(amount, 0)) явно заменяет NULL нулями перед суммированием — математически то же самое. Оба варианта корректны для суммирования платежей. COALESCE может ввести в заблуждение: нули ≠ отсутствие данных.", "explanation_html": "<p><em class=\"analogy\">💡 <strong>SUM</strong>(amount) автоматически игнорирует <strong>NULL</strong> — результат суммы существующих значений</em>. <strong>SUM</strong>(COALESCE(amount, 0)) явно заменяет <strong>NULL</strong> нулями перед суммированием — математически то же самое. Оба варианта корректны для суммирования платежей. COALESCE может ввести в заблуждение: нули ≠ отсутствие данных.</p>"}];
window.DISC_META = {
  "Data Vault":        {"color":"#0ea5e9","light":"#f0f9ff","dark":"#0c1e2e","short":"DV"},
  "SQL":               {"color":"#a855f7","light":"#fdf4ff","dark":"#1c0c2e","short":"SQL"},
  "Oracle PL/SQL":     {"color":"#f97316","light":"#fff7ed","dark":"#2e1a0c","short":"ORA"},

};
window.DISC_COUNTS = {
  "Data Vault": 18,
  "SQL": 65,
  "Oracle PL/SQL": 53,

<script>
(function() {
var $ = function(id){ return document.getElementById(id); };
function setPage(id){
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  $(id).classList.add('active');
}
function getTheme(){ return localStorage.getItem('theme') || 'light'; }
function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); localStorage.setItem('theme',t); }
applyTheme(getTheme());
$('btn-theme').addEventListener('click', function(){ applyTheme(getTheme()==='light'?'dark':'light'); });

var DISC_META = window.DISC_META;
var ALL_DISCS = Object.keys(DISC_META);
function discColor(d){ return (DISC_META[d]||{}).color||'#888'; }
function discBg(d){ return getTheme()==='dark'?(DISC_META[d]||{}).dark:(DISC_META[d]||{}).light; }

var selectedDiscs = ALL_DISCS.slice();

function buildHomeChips(){
  var c = $('home-disc-chips'); c.innerHTML='';
  var allChip = document.createElement('button');
  allChip.className='disc-chip'; allChip.setAttribute('data-disc','__all__');
  allChip.innerHTML='Все <span class="disc-count">'+window.QUESTIONS.length+'</span>';
  if(selectedDiscs.length===ALL_DISCS.length) allChip.classList.add('active');
  allChip.style.setProperty('--chip-color','#111827');
  c.appendChild(allChip);
  ALL_DISCS.forEach(function(disc){
    var chip=document.createElement('button');
    chip.className='disc-chip'; chip.setAttribute('data-disc',disc);
    var cnt=window.DISC_COUNTS[disc]||0;
    chip.innerHTML=disc+' <span class="disc-count">'+cnt+'</span>';
    if(selectedDiscs.indexOf(disc)!==-1) chip.classList.add('active');
    chip.style.setProperty('--chip-color',discColor(disc));
    c.appendChild(chip);
  });
  updateStartCount();
}
function updateStartCount(){
  $('s-total').textContent=getActiveQ().length;
}
$('home-disc-chips').addEventListener('click',function(e){
  var chip=e.target.closest('[data-disc]'); if(!chip) return;
  var disc=chip.getAttribute('data-disc');
  if(disc==='__all__'){
    selectedDiscs=selectedDiscs.length===ALL_DISCS.length?[]:ALL_DISCS.slice();
  } else {
    var idx=selectedDiscs.indexOf(disc);
    if(idx!==-1) selectedDiscs.splice(idx,1); else selectedDiscs.push(disc);
  }
  $('home-disc-chips').querySelectorAll('[data-disc]').forEach(function(c){
    var d=c.getAttribute('data-disc');
    if(d==='__all__') c.classList.toggle('active',selectedDiscs.length===ALL_DISCS.length);
    else c.classList.toggle('active',selectedDiscs.indexOf(d)!==-1);
  });
  updateStartCount();
});

function getActiveQ(){
  return window.QUESTIONS.filter(function(q){ return selectedDiscs.indexOf(q.topic)!==-1; });
}
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

var quizQueue=[]; var quizIdx=0; var wrongIds=[]; var answered=false;

function startQuiz(queue){
  quizQueue=shuffle(queue); quizIdx=0; wrongIds=[]; answered=false;
  setPage('page-quiz'); renderQ();
}
function renderQ(){
  answered=false;
  var q=quizQueue[quizIdx]; var tot=quizQueue.length;
  var disc=q.topic; var color=discColor(disc);
  var pct=(quizIdx/tot)*100;
  $('progress-fill').style.width=pct+'%';
  $('quiz-meta').textContent=(quizIdx+1)+' / '+tot;
  $('q-disc-bar').style.background=color;
  var chip=$('q-disc-chip');
  chip.textContent=disc;
  chip.style.background=discBg(disc);
  chip.style.color=color;
  chip.style.borderColor=color+'33';
  $('q-num').textContent='Вопрос '+(quizIdx+1)+' из '+tot;
  $('q-text').textContent=q.question;
  $('explanation-box').classList.remove('visible');
  $('explanation-box').style.borderLeftColor=color;
  $('btn-next').classList.remove('visible');
  var grid=$('answers-grid'); grid.innerHTML='';
  var order=shuffle([0,1,2,3].slice(0,q.answers.length));
  order.forEach(function(origIdx,dispIdx){
    var btn=document.createElement('button');
    btn.className='answer-btn'; btn.setAttribute('data-orig',origIdx);
    btn.innerHTML='<span class="answer-idx">'+(dispIdx+1)+'.</span><span>'+escHtml(q.answers[origIdx])+'</span>';
    btn.addEventListener('click',function(){ onAnswer(btn,origIdx,q,color); });
    grid.appendChild(btn);
  });
}
function onAnswer(clickedBtn,chosenIdx,q,color){
  if(answered) return; answered=true;
  var ok=(chosenIdx===q.correct);
  $('answers-grid').querySelectorAll('.answer-btn').forEach(function(btn){
    var oi=parseInt(btn.getAttribute('data-orig'));
    btn.disabled=true;
    if(oi===q.correct && !ok) btn.classList.add('state-reveal');
    else if(oi===q.correct && ok) btn.classList.add('state-correct');
    else if(btn===clickedBtn && !ok) btn.classList.add('state-wrong');
    else btn.classList.add('state-none');
  });
  if(!ok) wrongIds.push(q.id);
  var expHtml=q.explanation_html||('<p>'+(q.explanation||'')+'</p>');
  $('exp-text').innerHTML=expHtml;
  $('explanation-box').querySelectorAll('em.analogy').forEach(function(em){ em.style.borderLeftColor=color; });
  $('explanation-box').classList.add('visible');
  $('btn-next').classList.add('visible');
}
$('btn-next').addEventListener('click',function(){
  quizIdx++;
  if(quizIdx>=quizQueue.length) showResults(); else renderQ();
});
$('btn-quiz-home').addEventListener('click',function(){ setPage('page-home'); });

function showResults(){
  var tot=quizQueue.length; var wrong=wrongIds.length; var cor=tot-wrong;
  var pct=tot>0?Math.round((cor/tot)*100):0;
  var circ=276.46;
  setTimeout(function(){ $('ring-prog').style.strokeDashoffset=circ-(pct/100)*circ; },100);
  $('ring-pct').textContent=pct+'%';
  $('r-correct').textContent=cor;
  $('r-wrong').textContent=wrong;
  $('r-total').textContent=tot;
  var titles=['Нужно повторить','Есть над чем работать','Хороший результат','Отличный результат!'];
  var msgs=[
    'Материал требует повторения. Изучи объяснения в справочнике.',
    'Половина вопросов верно. Отработай ошибки и повтори тест.',
    'Большинство вопросов пройдено верно. Повтори ошибки для уверенности.',
    'Ты отлично знаешь материал. Попробуй справочник для закрепления.'
  ];
  var lvl=pct>=90?3:pct>=70?2:pct>=50?1:0;
  $('results-title').textContent=titles[lvl];
  $('results-msg').textContent=msgs[lvl];
  if(wrong>0) $('btn-retry-wrong').classList.remove('hidden');
  else $('btn-retry-wrong').classList.add('hidden');
  setPage('page-results');
}
$('btn-retry-wrong').addEventListener('click',function(){
  var wq=window.QUESTIONS.filter(function(q){ return wrongIds.indexOf(q.id)!==-1; });
  startQuiz(wq);
});
$('btn-again').addEventListener('click',function(){ startQuiz(getActiveQ()); });
$('btn-choose-disc').addEventListener('click',function(){ buildHomeChips(); setPage('page-home'); });
$('btn-start-quiz').addEventListener('click',function(){
  var active=getActiveQ(); if(!active.length) return; startQuiz(active);
});

/* REFERENCE */
var refSelDiscs=ALL_DISCS.slice(); var refSearch='';
function buildRefChips(){
  var c=$('ref-disc-chips'); c.innerHTML='';
  var all=document.createElement('button');
  all.className='disc-chip'; all.setAttribute('data-disc','__all__');
  all.innerHTML='Все';
  if(refSelDiscs.length===ALL_DISCS.length) all.classList.add('active');
  all.style.setProperty('--chip-color','#111827');
  c.appendChild(all);
  ALL_DISCS.forEach(function(disc){
    var ch=document.createElement('button');
    ch.className='disc-chip'; ch.setAttribute('data-disc',disc);
    ch.textContent=disc;
    if(refSelDiscs.indexOf(disc)!==-1) ch.classList.add('active');
    ch.style.setProperty('--chip-color',discColor(disc));
    c.appendChild(ch);
  });
}
$('ref-disc-chips').addEventListener('click',function(e){
  var chip=e.target.closest('[data-disc]'); if(!chip) return;
  var disc=chip.getAttribute('data-disc');
  if(disc==='__all__'){
    refSelDiscs=refSelDiscs.length===ALL_DISCS.length?[]:ALL_DISCS.slice();
  } else {
    var idx=refSelDiscs.indexOf(disc);
    if(idx!==-1) refSelDiscs.splice(idx,1); else refSelDiscs.push(disc);
  }
  $('ref-disc-chips').querySelectorAll('[data-disc]').forEach(function(c){
    var d=c.getAttribute('data-disc');
    if(d==='__all__') c.classList.toggle('active',refSelDiscs.length===ALL_DISCS.length);
    else c.classList.toggle('active',refSelDiscs.indexOf(d)!==-1);
  });
  renderRef();
});
$('ref-search').addEventListener('input',function(){ refSearch=this.value; renderRef(); });

function renderRef(){
  var body=$('ref-body');
  var srch=refSearch.toLowerCase().trim();
  var filtered=window.QUESTIONS.filter(function(q){
    if(refSelDiscs.indexOf(q.topic)===-1) return false;
    if(srch.length>0 && q.question.toLowerCase().indexOf(srch)===-1) return false;
    return true;
  });
  if(!filtered.length){ body.innerHTML='<div class="ref-empty">Ничего не найдено</div>'; return; }
  var groups={};
  ALL_DISCS.forEach(function(d){ groups[d]=[]; });
  filtered.forEach(function(q){ if(groups[q.topic]) groups[q.topic].push(q); });
  var html='';
  ALL_DISCS.forEach(function(disc){
    var items=groups[disc]; if(!items||!items.length) return;
    var color=discColor(disc);
    html+='<div class="ref-group">';
    html+='<div class="ref-group-title" style="color:'+color+'">'+disc+' ('+items.length+')</div>';
    items.forEach(function(q){
      var correctText=q.answers[q.correct]||'';
      var expHtml=q.explanation_html||('<p>'+(q.explanation||'')+'</p>');
      html+='<div class="ref-item" style="--disc-color:'+color+'" data-qid="'+q.id+'">';
      html+='<div class="ref-item-q" role="button" tabindex="0">';
      html+='<span class="ref-item-arrow">&#9658;</span>';
      html+=escHtml(q.question);
      html+='</div>';
      html+='<div class="ref-item-detail">';
      html+='<div class="ref-correct"><span class="ref-correct-icon">&#10003;</span>'+escHtml(correctText)+'</div>';
      html+='<div class="ref-exp">'+expHtml+'</div>';
      html+='</div></div>';
    });
    html+='</div>';
  });
  body.innerHTML=html;
  body.querySelectorAll('.ref-item-q').forEach(function(el){
    el.addEventListener('click',function(){
      el.closest('.ref-item').classList.toggle('open');
    });
    el.addEventListener('keydown',function(e){
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); el.closest('.ref-item').classList.toggle('open'); }
    });
  });
  body.querySelectorAll('.ref-item').forEach(function(item){
    var c=getComputedStyle(item).getPropertyValue('--disc-color').trim();
    item.querySelectorAll('em.analogy').forEach(function(em){ em.style.borderLeftColor=c; });
  });
}
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function openRef(){
  buildRefChips();
  $('ref-search').value=''; refSearch=''; renderRef();
  $('modal-ref').classList.add('open');
  setTimeout(function(){ $('ref-search').focus(); },100);
}
function closeRef(){ $('modal-ref').classList.remove('open'); }
$('btn-open-ref').addEventListener('click',openRef);
$('modal-close-btn').addEventListener('click',closeRef);
$('modal-ref').addEventListener('click',function(e){ if(e.target===$('modal-ref')) closeRef(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeRef(); });

buildHomeChips();
setPage('page-home');
})();
</script>
