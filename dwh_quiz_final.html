обавляет новые строки вместо UPDATE, что дешевле для движка базы данных, и историчность является лишь приятным побочным эффектом этого технического ограничения.", "Отдельный satellite для link создаётся потому, что Data Vault запрещает хранить любые атрибуты в link-таблице по соображениям нормализации: все описательные данные должны находиться исключительно в satellites хабов, к которым относится связь. Link-satellite — это лишь вспомогательный паттерн для редких случаев, когда атрибут невозможно однозначно отнести ни к одному из связанных хабов, и историчность тут не является ключевым фактором принятия решения об архитектуре.", "Link-таблица содержит только хеш-ключи связанных хабов и load_date — она неизменяема и описывает только факт связи. Атрибуты связи могут меняться со временем, поэтому их историчность обеспечивается через отдельный link-satellite с собственным механизмом версионирования (load_date + end_date или hash_diff), не нарушая иммутабельности самого link."], "correct": 3, "explanation": "🗃️ Link = неизменяемый факт связи (кто-кого). Если у связи есть атрибуты (сумма, дата начала контракта) — они могут меняться. Изменяемые вещи нельзя хранить в неизменяемом Link. Поэтому Satellite к Link — отдельная история изменений атрибутов этой связи.", "explanation_html": "<p><em class=\"analogy\">🗃️ Link = неизменяемый факт связи (кто-кого)</em>. Если у связи есть атрибуты (сумма, дата начала контракта) — они могут меняться. Изменяемые вещи нельзя хранить в неизменяемом Link. Поэтому Satellite к Link — отдельная история изменений атрибутов этой связи.</p>"}, {"id": 74, "topic": "SQL", "subtopic": "Агрегирование данных — GROUP BY, функции COUNT/SUM/MAX и их поведение при наличии NULL-значений в аналитических выборках", "question": "Почему COUNT(*) и COUNT(column) могут возвращать разные значения для одной группы?", "answers": ["COUNT(*) считает все строки группы, COUNT(column) — только строки, где значение столбца не NULL.", "COUNT(*) игнорирует дубликаты, COUNT(column) считает все строки включая NULL", "COUNT(column) считает уникальные значения, COUNT(*) — все строки с повторами", "COUNT(*) не работает с NULL-столбцами, поэтому возвращает меньшее значение"], "correct": 0, "explanation": "📊 Таблица: Иван: сумма=100, Мария: NULL, Пётр: сумма=200. COUNT(*) = 3 (считает все строки). COUNT(amount) = 2 (игнорирует NULL у Марии). Разница появляется только когда в указанном столбце есть NULL-значения.", "explanation_html": "<p><em class=\"analogy\">📊 Таблица: Иван: сумма=100, Мария: <strong>NULL</strong>, Пётр: сумма=200</em>. <strong>COUNT</strong>(*) = 3 (считает все строки). <strong>COUNT</strong>(amount) = 2 (игнорирует <strong>NULL</strong> у Марии). Разница появляется только когда в указанном столбце есть <strong>NULL</strong>-значения.</p>"}, {"id": 75, "topic": "SQL", "subtopic": "Индексы — принципы работы B-tree индексов и влияние на план выполнения SELECT-запросов при разработке трансформаций", "question": "В трансформации ETL выполняется запрос SELECT * FROM fact_sales WHERE sale_date BETWEEN '2023-01-01' AND '2023-12-31' AND region_id = 5, но план выполнения показывает Full Table Scan — какой индекс следует создать для оптимизации?", "answers": ["Достаточно создать отдельные индексы на sale_date и region_id — оптимизатор объединит их через Index Merge для ускорения запроса.", "Создать составной B-tree индекс на (region_id, sale_date): сначала высокоселективный равностный фильтр, затем диапазонный — это позволит Index Range Scan вместо Full Table Scan.", "Создать индекс только на sale_date, так как BETWEEN-фильтр охватывает год данных и является основным условием для оптимизации.", "Создать составной индекс на (sale_date, region_id): диапазонный фильтр должен стоять первым, это даёт лучшую селективность для Range Scan. 6. Агрегирование и HAVING — разница между фильтрацией в WHERE и HAVING, поведение агрегатов при работе с большими объёмами данных хранилища Почему фильтрация через HAVING выполняется медленнее, чем аналогичная фильтрация через WHERE?"], "correct": 1, "explanation": "📚 Индекс (region_id, sale_date): сначала ищем по равенству region_id=5 (быстро исключаем 80% данных), потом по диапазону дат. Равностный фильтр должен стоять первым в составном индексе — он максимально сужает выборку. Диапазон после равенства = эффективный Range Scan.", "explanation_html": "<p><em class=\"analogy\">📚 Индекс (region_id, sale_date): сначала ищем по равенству region_id=5 (быстро исключаем 80% данных), потом по диапазону дат</em>. Равностный фильтр должен стоять первым в составном индексе — он максимально сужает выборку. Диапазон после равенства = эффективный Range Scan.</p>"}, {"id": 76, "topic": "SQL", "subtopic": "Агрегирование и HAVING — разница между фильтрацией в WHERE и HAVING, поведение агрегатов при работе с большими объёмами данных хранилища", "question": "Почему фильтрация через HAVING выполняется медленнее, чем аналогичная фильтрация через WHERE?", "answers": ["HAVING медленнее, так как выполняется после сортировки данных в GROUP BY: движок вынужден удерживать все отсортированные группы в памяти до завершения сортировки, и только затем применяет условие фильтрации, что требует дополнительного прохода по уже упорядоченному набору и увеличивает потребление оперативной памяти и дисковых операций по сравнению с WHERE.", "HAVING работает медленнее, потому что применяет более сложные алгоритмы хэш-фильтрации к агрегированным значениям, тогда как WHERE использует простое побитовое сравнение на уровне строк — разница обусловлена типом операции, а не порядком выполнения.", "HAVING фильтрует уже после агрегирования — движок сначала обрабатывает и группирует все строки, затем отбрасывает ненужные группы. WHERE отсекает строки до агрегирования, существенно сокращая объём данных, над которым строится агрегат.", "HAVING не использует индексы, а WHERE использует — поэтому WHERE быстрее. 7. Многоуровневые JOIN — порядок соединений 5+ таблиц, типы JOIN (HASH/MERGE/NESTED LOOP) в плане выполнения и их оптимизация для запросов к Data Vault В плане выполнения запроса к Data Vault (HUB→SAT→LINK→SAT→HUB) оптимизатор выбрал NESTED LOOP для соединения LINK с большим SAT (10M строк) — какое изменение запроса или статистики устранит проблему?"], "correct": 2, "explanation": "🍳 WHERE = предварительная нарезка овощей (до готовки): чем меньше нарежешь — тем быстрее готовится. HAVING = выбираешь готовые блюда по вкусу: все уже приготовлено, только потом отбираешь нужные. Очевидно, что нарезать лишнее заранее — пустая работа.", "explanation_html": "<p><em class=\"analogy\">🍳 <strong>WHERE</strong> = предварительная нарезка овощей (до готовки): чем меньше нарежешь — тем быстрее готовится</em>. <strong>HAVING</strong> = выбираешь готовые блюда по вкусу: все уже приготовлено, только потом отбираешь нужные. Очевидно, что нарезать лишнее заранее — пустая работа.</p>"}, {"id": 77, "topic": "SQL", "subtopic": "Многоуровневые JOIN — порядок соединений 5+ таблиц, типы JOIN (HASH/MERGE/NESTED LOOP) в плане выполнения и их оптимизация для запросов к Data Vault", "question": "В плане выполнения запроса к Data Vault (HUB→SAT→LINK→SAT→HUB) оптимизатор выбрал NESTED LOOP для соединения LINK с большим SAT (10M строк) — какое изменение запроса или статистики устранит проблему?", "answers": ["Следует секционировать SAT по LOAD_DATE и использовать MERGE JOIN — он оптимален для Data Vault, так как Hub и Satellite всегда содержат предсортированные данные по HASH_KEY.", "Нужно добавить индекс на все колонки SAT (включая LOAD_DATE и RECORD_SOURCE), тогда NESTED LOOP станет эффективнее за счёт index scan, и оптимизатор автоматически переключится на оптимальный план без обновления статистики.", "Обновить статистику (ANALYZE/COMPUTE STATS) на SAT и LINK. Оптимизатор переключится на HASH JOIN, эффективный для больших таблиц. Дополнительно — убедиться в наличии индексов на HASH_KEY колонках и при необходимости использовать хинт /*+ USE_HASH(sat) */.", "Проблема в самом NESTED LOOP — его нужно принудительно отключить хинтом /*+ NO_NL */ для всех соединений в запросе, а статистика здесь роли не играет, поскольку оптимизатор выбирает тип JOIN исключительно на основе физической структуры таблиц и наличия индексов. 8. Коррелированные подзапросы — механика выполнения, стоимость повторных вычислений и переписывание на JOIN или оконные функции с обоснованием выбора Почему коррелированный подзапрос выполняется многократно, а не один раз?"], "correct": 2, "explanation": "🔧 NESTED LOOP для больших таблиц — как перебирать 10 млн ключей одним за другим. HASH JOIN — как сделать хэш-таблицу меньшего набора и быстро проверять совпадения. ANALYZE обновляет статистику → оптимизатор 'видит' реальный размер таблиц → выбирает HASH JOIN сам.", "explanation_html": "<p><em class=\"analogy\">🔧 NESTED LOOP для больших таблиц — как перебирать 10 млн ключей одним за другим</em>. HASH <strong>JOIN</strong> — как сделать хэш-таблицу меньшего набора и быстро проверять совпадения. ANALYZE обновляет статистику → оптимизатор 'видит' реальный размер таблиц → выбирает HASH <strong>JOIN</strong> сам.</p>"}, {"id": 78, "topic": "SQL", "subtopic": "Анализ плана выполнения запроса — выявление узких мест через EXPLAIN/EXPLAIN ANALYZE и устранение избыточного полного сканирования таблиц", "question": "В плане EXPLAIN ANALYZE виден Seq Scan на таблице фактов из 50 млн строк с фильтром по load_date, хотя индекс существует — какова наиболее вероятная причина игнорирования индекса планировщиком?", "answers": ["Планировщик считает Seq Scan дешевле: статистика устарела (нужен ANALYZE), фильтр возвращает >10-15% строк (низкая селективность), либо корреляция столбца низкая — случайный heap fetch дороже seq scan. Решение: ANALYZE, проверить pg_stats.correlation, скорректировать random_page_cost.", "Индекс заблокирован конкурентной транзакцией — нужно выполнить REINDEX CONCURRENTLY.", "Планировщик отказывается от индекса, потому что таблица фактов не секционирована по load_date — при отсутствии partition pruning оптимизатор всегда предпочитает Seq Scan для таблиц крупнее 10 млн строк, так как стоимость обхода индексных страниц превышает пороговое значение effective_cache_size. Необходимо реализовать партиционирование по диапазону дат и пересоздать индексы на каждой партиции отдельно, после чего планировщик автоматически начнёт использовать Index Scan.", "Индекс игнорируется из-за неподходящего типа данных в условии фильтра: если load_date хранится как timestamp, а фильтр передаёт date, PostgreSQL не может использовать B-tree индекс без явного приведения типов. Решение — пересоздать индекс с выражением CAST или использовать функциональный индекс on (load_date::date). 10. Индексы в запросах разработчика — понимание того, как условия в WHERE, JOIN ON и ORDER BY используют или не используют индексы, и переписывание запроса для их задействования В DWH-запросе есть условие WHERE YEAR(load_date) = 2023, и индекс по колонке load_date не используется — как переписать условие, чтобы индекс заработал?"], "correct": 0, "explanation": "🔍 load_date хранится как TIMESTAMP, а фильтр передаёт DATE. Oracle не может автоматически использовать индекс на TIMESTAMP для условия DATE без явного приведения типов. Решение: переписать фильтр с явным CAST или создать функциональный индекс на (load_date::date).", "explanation_html": "<p><em class=\"analogy\">🔍 load_date хранится как TIMESTAMP, а фильтр передаёт DATE</em>. Oracle не может автоматически использовать индекс на TIMESTAMP для условия DATE без явного приведения типов. Решение: переписать фильтр с явным CAST или создать функциональный индекс на (load_date::date).</p>"}, {"id": 79, "topic": "Oracle PL/SQL", "subtopic": "Индексы в запросах разработчика — понимание того, как условия в WHERE, JOIN ON и ORDER BY используют или не используют индексы, и переписывание запроса для их задействования", "question": "В DWH-запросе есть условие WHERE YEAR(load_date) = 2023, и индекс по колонке load_date не используется — как переписать условие, чтобы индекс заработал?", "answers": ["Проблема в отсутствии составного индекса: если добавить к индексу по load_date ещё одну колонку из WHERE или SELECT, оптимизатор переключится на index scan вместо full table scan. Функция YEAR() сама по себе не мешает использованию индекса — важна его селективность и покрытие запроса. Поэтому правильное решение — создать covering index, включающий все колонки из запроса.", "Нужно создать функциональный индекс на выражение YEAR(load_date) — тогда оптимизатор сможет использовать его при условии WHERE YEAR(load_date) = 2023. Это стандартный подход для sargable-запросов с функциями над колонками.", "Переписать как CAST(load_date AS DATE) BETWEEN '2023-01-01' AND '2023-12-31'", "Заменить на range-условие: WHERE load_date >= '2023-01-01' AND load_date < '2024-01-01'. Функция YEAR() оборачивает колонку, делая индекс non-sargable — оптимизатор не может использовать B-tree индекс. Прямое сравнение значений восстанавливает sargability. 9. Стратегии партиционирования — влияние range и list партиционирования на partition pruning при типичных паттернах запросов к таблицам фактов Почему list-партиционирование по дискретному атрибуту (например, region_id) обеспечивает более точный partition pruning, чем range-партиционирование по тому же столбцу?"], "correct": 3, "explanation": "📅 YEAR(load_date) = 2023 оборачивает колонку функцией → индекс по load_date бесполезен. Правильно: load_date >= '2023-01-01' AND load_date < '2024-01-01'. Прямое сравнение значений (sargable) позволяет оптимизатору использовать B-tree индекс для Range Scan.", "explanation_html": "<p><em class=\"analogy\">📅 YEAR(load_date) = 2023 оборачивает колонку функцией → индекс по load_date бесполезен</em>. Правильно: load_date >= '2023-01-01' AND load_date < '2024-01-01'. Прямое сравнение значений (sargable) позволяет оптимизатору использовать B-tree индекс для Range Scan.</p>"}, {"id": 80, "topic": "SQL", "subtopic": "JOIN-операции - понимание разницы между INNER, LEFT и RIGHT JOIN при работе с неполными данными в DWH", "question": "В таблице хабов HUB_CLIENT есть 1000 записей, а в сателлите SAT_CLIENT — только 750. Какой JOIN нужно использовать, чтобы получить всех клиентов, даже если у них нет атрибутов в сателлите?", "answers": ["LEFT JOIN от HUB_CLIENT к SAT_CLIENT — вернёт все 1000 хабов, для 250 клиентов без сателлита атрибуты будут NULL.", "RIGHT JOIN от HUB_CLIENT к SAT_CLIENT — вернёт все 750 сателлитов, клиенты без атрибутов будут отброшены.", "LEFT JOIN от SAT_CLIENT к HUB_CLIENT — вернёт все 1000 записей, NULL появится у хабов.", "INNER JOIN вернёт только 750 клиентов с атрибутами, NULL-значения не нужны в DWH. 12. Оконные функции - использование ROW_NUMBER() для нумерации строк внутри группы по шаблону Почему ROW_NUMBER() присваивает уникальные номера даже при одинаковых значениях в PARTITION BY?"], "correct": 0, "explanation": "🌐 LEFT JOIN: берём всех из левой таблицы (HUB_CLIENT, 1000 записей) и добавляем данные из правой (SAT_CLIENT), если есть. Для 250 клиентов без Satellite атрибуты будут NULL, но строки останутся. INNER JOIN вернул бы только 750 — потеряли бы 250 клиентов без атрибутов.", "explanation_html": "<p><em class=\"analogy\">🌐 <strong>LEFT <strong>JOIN</strong>: берём всех из левой таблицы (HUB_CLIENT, 1000 записей) и добавляем данные из правой (SAT_CLIENT), если есть</em>. Для 250 клиентов без Satellite атрибуты будут <strong>NULL</strong>, но строки останутся. <strong>INNER <strong>JOIN</strong> вернул бы только 750 — потеряли бы 250 клиентов без атрибутов.</p>"}, {"id": 81, "topic": "SQL", "subtopic": "Оконные функции - использование ROW_NUMBER() для нумерации строк внутри группы по шаблону", "question": "Почему ROW_NUMBER() присваивает уникальные номера даже при одинаковых значениях в PARTITION BY?", "answers": ["Потому что ROW_NUMBER() нумерует строки последовательно без учёта дублей — в отличие от RANK() и DENSE_RANK(), она никогда не повторяет номер внутри раздела.", "Потому что уникальность обеспечивается значениями в ORDER BY — при одинаковых данных в PARTITION BY именно сортировка гарантирует разные номера.", "Потому что ROW_NUMBER() работает так же, как RANK(), но дополнительно учитывает физический порядок хранения строк в таблице, что и позволяет ей избегать повторяющихся номеров даже для дублирующихся значений в разделе.", "Потому что ROW_NUMBER() автоматически добавляет случайный тай-брейкер при одинаковых значениях, чтобы избежать конфликтов нумерации в рамках раздела. 13. Группировка данных - использование GROUP BY для агрегирования показателей по атрибутам измерений Почему все столбцы в SELECT без агрегатных функций должны присутствовать в GROUP BY?"], "correct": 0, "explanation": "🎫 ROW_NUMBER как театральные билеты: каждый получает уникальный номер 1, 2, 3... даже если двое с одинаковыми именами. RANK как соревнование: оба Иванова получают одинаковое место, следующий — сразу 3-е. Для выбора ровно одной строки нужен ROW_NUMBER.", "explanation_html": "<p><em class=\"analogy\">🎫 <strong>ROW_NUMBER</strong> как театральные билеты: каждый получает уникальный номер 1, 2, 3..</em>. даже если двое с одинаковыми именами. <strong>RANK</strong> как соревнование: оба Иванова получают одинаковое место, следующий — сразу 3-е. Для выбора ровно одной строки нужен <strong>ROW_NUMBER</strong>.</p>"}, {"id": 82, "topic": "SQL", "subtopic": "Группировка данных - использование GROUP BY для агрегирования показателей по атрибутам измерений", "question": "Почему все столбцы в SELECT без агрегатных функций должны присутствовать в GROUP BY?", "answers": ["Потому что столбцы без агрегатных функций используются как ключи сортировки результата, а GROUP BY определяет порядок вывода строк — без явного указания сортировка была бы неопределённой", "Это требование производительности: движок базы данных создаёт индекс по всем столбцам из SELECT, и если столбец не указан в GROUP BY, индекс не будет построен и запрос завершится с ошибкой", "Иначе для каждой группы было бы неизвестно, какое из множества значений этого столбца вернуть — SQL не допускает такой неоднозначности", "Потому что SQL сначала выполняет GROUP BY, а затем SELECT, и все столбцы должны быть зарегистрированы заранее, иначе движок не сможет выделить для них память при агрегации 14. Фильтрация данных - разница между WHERE и HAVING при фильтрации строк и агрегированных значений В таблице orders нужно найти клиентов, сделавших более 5 заказов, но только среди тех, у кого статус 'active' — где правильно разместить каждое условие?"], "correct": 2, "explanation": "📦 GROUP BY customer_id: для каждого customer_id будет одна строка. Если в SELECT есть city — какой city вернуть, если у клиента два города? SQL не знает. Поэтому city тоже должен быть в GROUP BY (группируй по обоим) или обёрнут в агрегат (MAX(city)).", "explanation_html": "<p><em class=\"analogy\">📦 <strong>GROUP BY</strong> customer_id: для каждого customer_id будет одна строка</em>. Если в SELECT есть city — какой city вернуть, если у клиента два города? SQL не знает. Поэтому city тоже должен быть в <strong>GROUP BY</strong> (группируй по обоим) или обёрнут в агрегат (MAX(city)).</p>"}, {"id": 83, "topic": "SQL", "subtopic": "Группировка данных - использование GROUP BY для агрегирования показателей по атрибутам измерений", "question": "Вам нужно посчитать суммарную выручку по каждому региону из таблицы sales (region, amount). Какой SQL-запрос это реализует?", "answers": ["SELECT SUM(amount) FROM sales GROUP BY region;", "SELECT region, SUM(amount) FROM sales GROUP BY region HAVING COUNT(*) > 0;", "SELECT region, SUM(amount) FROM sales GROUP BY region;", "SELECT region, SUM(amount) FROM sales ORDER BY region; 17. JOIN-операции - понимание разницы между INNER, LEFT и RIGHT JOIN при работе с неполными данными в DWH Почему LEFT JOIN предпочтительнее INNER JOIN при загрузке данных в Satellite-таблицы Data Vault, когда источник содержит неполные записи?"], "correct": 2, "explanation": "📊 SELECT region, SUM(amount) FROM sales GROUP BY region — простейший агрегирующий запрос. GROUP BY region разбивает все строки на группы по региону, SUM(amount) суммирует выручку внутри каждой группы. Результат: по одной строке на каждый регион с суммой.", "explanation_html": "<p><em class=\"analogy\">📊 SELECT region, <strong>SUM</strong>(amount) FROM sales <strong>GROUP BY</strong> region — простейший агрегирующий запрос</em>. <strong>GROUP BY</strong> region разбивает все строки на группы по региону, <strong>SUM</strong>(amount) суммирует выручку внутри каждой группы. Результат: по одной строке на каждый регион с суммой.</p>"}, {"id": 84, "topic": "SQL", "subtopic": "JOIN-операции - понимание разницы между INNER, LEFT и RIGHT JOIN при работе с неполными данными в DWH", "question": "Почему LEFT JOIN предпочтительнее INNER JOIN при загрузке данных в Satellite-таблицы Data Vault, когда источник содержит неполные записи?", "answers": ["LEFT JOIN автоматически заполняет NULL-значения в Satellite-атрибутах, тогда как INNER JOIN требует явного указания DEFAULT-значений для каждого поля", "INNER JOIN теряет дубликаты", "LEFT JOIN быстрее INNER JOIN при больших объёмах данных, что критично для ETL-процессов в DWH", "LEFT JOIN сохраняет все строки левой таблицы, INNER JOIN молча теряет несовпадающие записи. 18. Индексы — принципы работы B-tree индексов и влияние на план выполнения SELECT-запросов при разработке трансформаций Почему B-tree индекс не используется оптимизатором при выборке более 10–20% строк таблицы?"], "correct": 3, "explanation": "🔎 Источник содержит неполные записи. INNER JOIN выбросит строки без пары в Satellite — данные потеряются тихо, без ошибок. LEFT JOIN сохранит все строки из основной таблицы, даже если в Satellite нет соответствующих данных (атрибуты будут NULL).", "explanation_html": "<p><em class=\"analogy\">🔎 Источник содержит неполные записи</em>. <strong>INNER <strong>JOIN</strong> выбросит строки без пары в Satellite — данные потеряются тихо, без ошибок. <strong>LEFT <strong>JOIN</strong> сохранит все строки из основной таблицы, даже если в Satellite нет соответствующих данных (атрибуты будут <strong>NULL</strong>).</p>"}, {"id": 85, "topic": "Informatica PC", "subtopic": "Трансформация Aggregator в Informatica PowerCenter — подсчёт агрегированных показателей с группировкой по одному полю", "question": "Почему в трансформации Aggregator поле группировки нужно помечать флагом 'Group By'?", "answers": ["Чтобы поле отображалось в выходном порту трансформации и передавалось в следующий компонент маппинга", "Чтобы отфильтровать дублирующиеся строки до начала вычислений и ускорить выполнение маппинга", "Чтобы указать Aggregator, какие поля нужно суммировать и агрегировать в итоговый результат", "Чтобы Aggregator знал, по каким значениям объединять строки перед вычислением агрегатных функций (SUM, COUNT и др.)"], "correct": 3, "explanation": "🗂️ Aggregator без Group By флага — как рассыпать документы в одну кучу без разбора. Флаг Group By говорит: 'группируй стопки по этому признаку, а потом считай итоги для каждой стопки отдельно'. Без него агрегат вычислится по всей таблице как одна большая группа.", "explanation_html": "<p><em class=\"analogy\">🗂️ <strong>Aggregator</strong> без <strong>Group By</strong> флага — как рассыпать документы в одну кучу без разбора</em>. Флаг <strong>Group By</strong> говорит: 'группируй стопки по этому признаку, а потом считай итоги для каждой стопки отдельно'. Без него агрегат вычислится по всей таблице как одна большая группа.</p>"}, {"id": 86, "topic": "Informatica PC", "subtopic": "Трансформация Aggregator в Informatica PowerCenter — подсчёт агрегированных показателей с группировкой по одному полю", "question": "В трансформации Aggregator вы считаете SUM(amount) с группировкой по customer_id — какое свойство порта customer_id необходимо включить?", "answers": ["Для порта customer_id нужно установить флаг Group By, чтобы агрегация выполнялась в разрезе каждого клиента.", "Для порта customer_id нужно включить флаг Key, который указывает на уникальное значение и автоматически группирует записи по этому полю при агрегации.", "Флаг Group By нужно установить на порту SUM(amount), поскольку именно агрегатная функция определяет логику группировки.", "Порт customer_id не требует дополнительных флагов — группировка задаётся автоматически при добавлении агрегатной функции."], "correct": 0, "explanation": "🏷️ В трансформации Aggregator есть два вида портов: 'Group By' (ключи группировки) и 'Output' (агрегатные функции). Для customer_id нужно поставить флаг Group By — тогда Aggregator будет считать SUM(amount) отдельно для каждого уникального customer_id.", "explanation_html": "<p><em class=\"analogy\">🏷️ В трансформации <strong>Aggregator</strong> есть два вида портов: '<strong>Group By</strong>' (ключи группировки) и 'Output' (агрегатные функции)</em>. Для customer_id нужно поставить флаг <strong>Group By</strong> — тогда <strong>Aggregator</strong> будет считать SUM(amount) отдельно для каждого уникального customer_id.</p>"}, {"id": 87, "topic": "Informatica PC", "subtopic": "Трансформации Lookup и Aggregator — подстановка значений из справочников и расчёт агрегированных показателей в цепочке трансформаций", "question": "Почему трансформация Lookup в Informatica PC по умолчанию кэширует данные справочника в памяти?", "answers": ["Чтобы избежать повторных обращений к источнику для каждой входящей строки — кэш позволяет выполнять подстановку локально, что значительно ускоряет обработку больших объёмов данных.", "Кэширование используется для уменьшения нагрузки на сеть, так как без него каждый запрос к справочнику передаётся по сети, что создаёт избыточный трафик и замедляет работу всего ETL-сервера.", "Кэш справочника нужен для обеспечения транзакционной целостности: данные фиксируются на момент старта сессии, чтобы изменения в источнике не влияли на результат подстановки в процессе выполнения маппинга.", "Потому что без кэша Lookup не может обрабатывать несколько потоков одновременно."], "correct": 0, "explanation": "⚡ Lookup без кэша = звонить в офис за каждой строкой данных. С кэшем = справочник у тебя на столе: посмотрел и ответил сразу. При 1 млн строк экономия — 1 млн сетевых обращений к базе данных. Кэш загружается один раз в начале сессии.", "explanation_html": "<p><em class=\"analogy\">⚡ <strong>Lookup</strong> без кэша = звонить в офис за каждой строкой данных</em>. С кэшем = справочник у тебя на столе: посмотрел и ответил сразу. При 1 млн строк экономия — 1 млн сетевых обращений к базе данных. Кэш загружается один раз в начале сессии.</p>"}, {"id": 88, "topic": "Informatica PC", "subtopic": "Оптимизация производительности mapping при обработке больших объёмов данных — предварительная сортировка потока перед Aggregator, настройка параметров сессии и выбор стратегии кэширования", "question": "Почему предварительная сортировка входного потока по ключу группировки критически важна для производительности Aggregator-трансформации в Informatica PC?", "answers": ["Sorted Input режим важен прежде всего потому, что он активирует встроенный механизм параллельной обработки в Aggregator-трансформации: отсортированный поток позволяет Integration Service распределять группы по нескольким потокам выполнения одновременно, существенно увеличивая пропускную способность. Без предварительной сортировки параллелизм недоступен и вся агрегация выполняется строго последовательно в одном потоке.", "Предварительная сортировка необходима потому, что Aggregator в Informatica PC использует хэш-таблицы для хранения промежуточных результатов, и отсортированные данные позволяют равномернее распределять записи по хэш-бакетам, снижая количество коллизий и ускоряя поиск. Без сортировки хэш-функция работает неэффективно и генерирует избыточные операции чтения с диска, что критично при больших объёмах.", "Предварительная сортировка входного потока критична потому, что Aggregator обязан передавать результаты агрегации в следующую трансформацию строго в отсортированном порядке согласно требованиям downstream-компонентов, например Joiner или Rank. Если данные не отсортированы заранее, Aggregator вынужден буферизировать весь выходной набор до завершения обработки последней группы, чтобы выполнить итоговую сортировку перед отправкой, что многократно увеличивает потребление памяти.", "Sorted Input режим позволяет Aggregator обрабатывать группы последовательно и сбрасывать их из памяти сразу после завершения, не накапливая весь датасет в кэше — это резко снижает потребление памяти и устраняет необходимость сортировки внутри самого Aggregator, что особенно критично при больших объёмах данных."], "correct": 3, "explanation": "📚 Aggregator без Sorted Input хранит в кэше ВСЕ группы одновременно — как читать 500 млн книг разом. С Sorted Input данные приходят уже отсортированными по ключу → Aggregator обрабатывает одну группу, сбрасывает в результат, освобождает память, берёт следующую. Расход памяти в разы меньше.", "explanation_html": "<p><em class=\"analogy\">📚 <strong>Aggregator</strong> без <strong>Sorted Input</strong> хранит в кэше ВСЕ группы одновременно — как читать 500 млн книг разом</em>. С <strong>Sorted Input</strong> данные приходят уже отсортированными по ключу → <strong>Aggregator</strong> обрабатывает одну группу, сбрасывает в результат, освобождает память, берёт следующую. Расход памяти в разы меньше.</p>"}, {"id": 89, "topic": "Oracle PL/SQL", "subtopic": "Объектные типы Oracle - создание пользовательских типов (CREATE TYPE) для передачи структурированных данных между процедурами загрузки сателлитов", "question": "Почему для передачи коллекции записей между процедурами загрузки сателлитов предпочтительнее использовать TABLE OF объектного типа, а не набор отдельных параметров?", "answers": ["TABLE OF объектного типа позволяет избежать ограничения Oracle в 32 параметра на процедуру, которое возникает при передаче структурированных данных через отдельные параметры в процедурах загрузки.", "TABLE OF объектного типа передаёт структурированный набор строк как единый параметр, сохраняя целостность данных, упрощая сигнатуру процедур и позволяя обрабатывать множество записей через единый bulk-операцию, что снижает контекстные переключения PL/SQL↔SQL.", "Набор отдельных параметров предпочтительнее для bulk-операций, а TABLE OF используют только для передачи единичных записей между процедурами, поскольку коллекции требуют дополнительной сериализации при каждом вызове.", "TABLE OF объектного типа предпочтительнее, потому что Oracle автоматически индексирует такие коллекции, что ускоряет поиск записей внутри процедуры загрузки сателлита по сравнению с набором отдельных параметров."], "correct": 1, "explanation": "📦 Вместо 50 отдельных параметров (bk1, bk2, bk3...) передаём одну коллекцию. Это как отправить один посылочный ящик вместо 50 отдельных конвертов. Сигнатура процедуры остаётся чистой, а FORALL внутри делает bulk-загрузку всего содержимого за один раз.", "explanation_html": "<p><em class=\"analogy\">📦 Вместо 50 отдельных параметров (bk1, bk2, bk3...) передаём одну коллекцию</em>. Это как отправить один посылочный ящик вместо 50 отдельных конвертов. Сигнатура процедуры остаётся чистой, а <strong>FORALL</strong> внутри делает bulk-загрузку всего содержимого за один раз.</p>"}, {"id": 90, "topic": "Oracle PL/SQL", "subtopic": "Пакеты (PACKAGE) PL/SQL - организация процедур и функций загрузки хабов, линков и сателлитов в пакеты с разделением спецификации и тела", "question": "Почему в PL/SQL пакете спецификация и тело компилируются раздельно, и какое это даёт преимущество при изменении логики загрузки сателлитов?", "answers": ["Спецификация и тело компилируются раздельно, чтобы разграничить права доступа: зависимые процедуры видят только публичный интерфейс спецификации, а изменение тела требует отдельного GRANT, что защищает логику загрузки сателлитов от несанкционированного вызова.", "Изменение тела пакета инвалидирует зависимые объекты, поэтому раздельная компиляция применяется только для ускорения первичной сборки — логику загрузки сателлитов можно обновлять без перезапуска сессий.", "Раздельная компиляция нужна для того, чтобы спецификация всегда компилировалась первой и при любом изменении тела пакета все зависимые объекты автоматически перекомпилировались — это гарантирует актуальность интерфейсов загрузки сателлитов.", "Изменение тела пакета не инвалидирует зависимые объекты, которые обращаются только к спецификации — это позволяет обновлять логику загрузки сателлитов без перекомпиляции всех зависимых процедур и пакетов."], "correct": 3, "explanation": "🏗️ Спецификация пакета — публичный интерфейс (API). Тело — реализация. Изменил реализацию (тело) — API не изменился, все вызывающие процедуры по-прежнему видят тот же интерфейс и не требуют перекомпиляции. Это как обновить движок машины, не меняя руль и педали.", "explanation_html": "<p><em class=\"analogy\">🏗️ Спецификация пакета — публичный интерфейс (API)</em>. Тело — реализация. Изменил реализацию (тело) — API не изменился, все вызывающие процедуры по-прежнему видят тот же интерфейс и не требуют перекомпиляции. Это как обновить движок машины, не меняя руль и педали.</p>"}, {"id": 91, "topic": "Oracle PL/SQL", "subtopic": "Переменные и типы PL/SQL - объявление скалярных переменных, записей (RECORD) и коллекций (TABLE, VARRAY) для промежуточной обработки данных хранилища", "question": "В процессе загрузки хаба Data Vault нужно временно хранить набор бизнес-ключей с хэшами для пакетной обработки — какой тип коллекции PL/SQL оптимально использовать и почему?", "answers": ["Associative array (INDEX BY): динамически растёт, не требует предварительного объявления размера, быстрый доступ по ключу — идеально для промежуточного хранения пар бизнес-ключ/хэш в bulk-операциях загрузки хаба.", "Associative array INDEX BY VARCHAR2: прямая индексация по строковому бизнес-ключу замедляет поиск по сравнению с INDEX BY PLS_INTEGER, поэтому для хэшей предпочтительнее числовой индекс.", "Nested table: поддерживает SQL-операции и передачу в качестве параметра, поэтому лучше подходит для пакетной обработки бизнес-ключей через FORALL и BULK COLLECT.", "VARRAY: фиксированный размер задаётся заранее, что обеспечивает предсказуемое потребление памяти при bulk-загрузке хаба — оптимален для хранения хэшей с известным лимитом записей."], "correct": 0, "explanation": "🗂️ Associative Array (INDEX BY PLS_INTEGER) идеален для временного хранения пар ключ-значение в памяти: быстрый доступ по индексу, динамический размер, никакого SQL. Для промежуточной обработки бизнес-ключей и хэшей перед FORALL — самый подходящий тип.", "explanation_html": "<p><em class=\"analogy\">🗂️ Associative Array (INDEX BY PLS_INTEGER) идеален для временного хранения пар ключ-значение в памяти: быстрый доступ по индексу, динамический размер, никакого SQL</em>. Для промежуточной обработки бизнес-ключей и хэшей перед <strong>FORALL</strong> — самый подходящий тип.</p>"}, {"id": 92, "topic": "Oracle PL/SQL", "subtopic": "Исключения PL/SQL - объявление пользовательских исключений и построение централизованной обработки ошибок в процедурах ETL-загрузки", "question": "В ETL-процедуре загрузки в DWH нужно централизованно обрабатывать несколько типов ошибок: нарушение уникальности, проблемы с NULL и бизнес-правила. Какую конструкцию PL/SQL следует использовать для единой точки обработки всех этих исключений?", "answers": ["Применять TRY-CATCH блоки с вложенными IF-проверками SQLCODE сразу после каждого DML-оператора.", "Блок EXCEPTION с несколькими WHEN-обработчиками в конце процедуры: отдельные ветки для DUP_VAL_ON_INDEX, NO_DATA_FOUND, пользовательских исключений (объявленных через EXCEPTION и RAISE), и финальный WHEN OTHERS для логирования непредвиденных ошибок через SQLERRM/SQLCODE в таблицу-лог ETL.", "Для централизованной обработки в ETL-процедурах рекомендуется выносить весь блок EXCEPTION в отдельную вложенную процедуру-обработчик, которая вызывается через CALL из основного тела. Пользовательские исключения объявляются через PRAGMA EXCEPTION_INIT с привязкой к кодам ORA-, а WHEN OTHERS размещается первым в списке обработчиков, чтобы гарантировать перехват всех непредвиденных ошибок до специфичных веток.", "Использовать единственный обработчик WHEN OTHERS в конце процедуры — он перехватывает абсолютно все ошибки Oracle, включая нарушения уникальности и NULL-проблемы, а детализацию обеспечивает SQLERRM. Отдельные WHEN-ветки избыточны и усложняют поддержку ETL-кода. 6. Оптимизация PL/SQL-кода — выявление и устранение узких мест: минимизация context switch, использование BULK-операций, оптимизация циклов обработки данных В цикле FOR обрабатывается 500 000 строк с INSERT в целевую таблицу — время выполнения критически высокое из-за context switch. Какое минимальное изменение кода устранит основную проблему производительности?"], "correct": 1, "explanation": "🎯 WHEN DUP_VAL_ON_INDEX, WHEN NO_DATA_FOUND, WHEN e_business_rule, WHEN OTHERS — как набор сачков для разных видов ошибок. Каждый WHEN обрабатывает конкретный тип, WHEN OTHERS ловит всё остальное. Так ошибки обрабатываются точно, а не 'всё в одну кучу'.", "explanation_html": "<p><em class=\"analogy\">🎯 WHEN DUP_VAL_ON_INDEX, WHEN NO_DATA_FOUND, WHEN e_business_rule, WHEN OTHERS — как набор сачков для разных видов ошибок</em>. Каждый WHEN обрабатывает конкретный тип, WHEN OTHERS ловит всё остальное. Так ошибки обрабатываются точно, а не 'всё в одну кучу'.</p>"}, {"id": 93, "topic": "Oracle PL/SQL", "subtopic": "Оптимизация PL/SQL-кода — выявление и устранение узких мест: минимизация context switch, использование BULK-операций, оптимизация циклов обработки данных", "question": "В цикле FOR обрабатывается 500 000 строк с INSERT в целевую таблицу — время выполнения критически высокое из-за context switch. Какое минимальное изменение кода устранит основную проблему производительности?", "answers": ["Добавить в цикл PRAGMA AUTONOMOUS_TRANSACTION и выполнять COMMIT каждые 1000 итераций — это разгрузит основную транзакцию и устранит context switch за счёт изоляции операций INSERT в отдельных транзакционных контекстах, что кардинально снизит нагрузку на движок.", "Заменить цикл FOR на CURSOR с BULK COLLECT без FORALL: открыть курсор, собрать все 500 000 строк в коллекцию одним вызовом BULK COLLECT (без LIMIT), а затем выполнить обычный цикл FOR по коллекции с построчным INSERT — это уберёт overhead курсора и ускорит выборку данных, решив проблему переключений контекста.", "Перенести INSERT из PL/SQL в чистый SQL: заменить цикл на один INSERT INTO ... SELECT — context switch исчезнет полностью, но FORALL здесь избыточен.", "Заменить построчный INSERT внутри цикла на BULK COLLECT + FORALL: собрать данные в коллекцию через BULK COLLECT LIMIT (например, по 1000 строк), затем выполнить FORALL ... INSERT. Это сократит переключения между PL/SQL и SQL-движком с 500 000 до ~500 раз. 7. Хранимые процедуры PL/SQL — проектирование и реализация сложных процедур для загрузки данных в слои Data Vault (Hub, Link, Satellite) При загрузке данных в Hub таблицу Data Vault через PL/SQL процедуру необходимо избежать дублирования бизнес-ключей при параллельном запуске нескольких потоков — какой механизм Oracle следует применить?"], "correct": 3, "explanation": "🚂 Цикл FOR с INSERT = 500 000 отдельных поездок между PL/SQL и SQL. BULK COLLECT + FORALL = один состав из 500 вагонов делает один рейс туда и один обратно. Разница в количестве 'context switch' (переключений между движками) — именно они тратят время.", "explanation_html": "<p><em class=\"analogy\">🚂 Цикл FOR с INSERT = 500 000 отдельных поездок между PL/SQL и SQL</em>. <strong>BULK COLLECT</strong> + <strong>FORALL</strong> = один состав из 500 вагонов делает один рейс туда и один обратно. Разница в количестве '<strong>context switch</strong>' (переключений между движками) — именно они тратят время.</p>"}, {"id": 94, "topic": "Oracle PL/SQL", "subtopic": "Пользовательские типы данных PL/SQL — создание объектных типов, коллекций (VARRAY, Nested Table, Associative Array) для обработки наборов данных в ETL-логике", "question": "В ETL-процессе на Informatica PC нужно передать из PL/SQL-процедуры набор строк (id + name) как единый параметр — какой пользовательский тип данных Oracle оптимально использовать?", "answers": ["Associative Array (INDEX BY PLS_INTEGER) — лучший вариант для передачи пар id+name, поскольку поддерживает прямую индексацию и быстрый bulk-доступ. Informatica PC автоматически маппирует ассоциативные массивы схемного уровня на входные параметры процедур.", "VARRAY(1000) OF VARCHAR2(200) — оптимальный выбор, так как фиксированный размер обеспечивает предсказуемое потребление памяти, а Informatica PC лучше работает с типизированными массивами фиксированной длины при передаче параметров через Database Connection.", "Достаточно использовать SYS_REFCURSOR как OUT-параметр процедуры — курсор передаёт набор строк целиком, поддерживается всеми версиями Informatica PC и не требует создания пользовательских типов на уровне схемы Oracle.", "Объектный тип (CREATE TYPE obj_t AS OBJECT) + Nested Table (CREATE TYPE tbl_t AS TABLE OF obj_t). Nested Table позволяет передавать неограниченный набор записей как параметр процедуры, поддерживает SQL-операции (TABLE()) и удобна для bulk-обработки в ETL-логике, в отличие от VARRAY (фиксированный размер) или Associative Array (не поддерживается на уровне схемы). 9. Представления (View) — разработка сложных view для слоёв Business Vault и Information Mart поверх Raw Vault: логика вычислений, агрегаций и Point-in-Time структур В Business Vault вам нужно построить Point-in-Time (PIT) таблицу для Hub_Customer, объединяющую снимки из нескольких сателлитов с разной частотой загрузки — какой ключевой механизм в SQL-логике PIT view гарантирует корректный «срез» актуальных записей каждого сателлита на произвольную дату?"], "correct": 2, "explanation": "🚿 SYS_REFCURSOR — как шланг: открыл, потёк поток данных. Informatica умеет 'подключаться' к курсору и читать строки из него. Не нужно создавать сложные объектные типы — курсорная переменная передаёт набор строк целиком через стандартный механизм.", "explanation_html": "<p>🚿 SYS_REF<strong>CURSOR</strong> — как шланг: открыл, потёк поток данных. Informatica умеет 'подключаться' к курсору и читать строки из него. Не нужно создавать сложные объектные типы — курсорная переменная передаёт набор строк целиком через стандартный механизм.</p>"}, {"id": 95, "topic": "Oracle PL/SQL", "subtopic": "Представления (View) — разработка сложных view для слоёв Business Vault и Information Mart поверх Raw Vault: логика вычислений, агрегаций и Point-in-Time структур", "question": "В Business Vault вам нужно построить Point-in-Time (PIT) таблицу для Hub_Customer, объединяющую снимки из нескольких сателлитов с разной частотой загрузки — какой ключевой механизм в SQL-логике PIT view гарантирует корректный «срез» актуальных записей каждого сателлита на произвольную дату?", "answers": ["Используется коррелированный подзапрос или аналитическая функция MAX(load_date) с фильтром load_date <= snapshot_date по каждому сателлиту отдельно (LEFT JOIN с подзапросом на последний load_date ≤ дате среза). Это позволяет для каждой строки PIT-календаря найти максимальный load_date каждого сателлита, не превышающий дату снимка, и джойнить сателлит по hub_key + этому load_date, получая актуальную версию даже если сателлиты обновлялись асинхронно.", "Ключевой механизм — фильтр WHERE load_date = snapshot_date по каждому сателлиту, что позволяет получить точную версию записи именно на указанную дату. Если запись с таким load_date отсутствует, сателлит возвращает NULL через LEFT JOIN.", "Используется оконная функция FIRST_VALUE(load_date) с сортировкой по load_date DESC и фильтром в HAVING, гарантирующей минимально возможную дату, строго превышающую snapshot_date — это позволяет брать «следующую» версию записи, ближайшую к дате среза, что в Data Vault считается стандартным подходом для обеспечения forward-looking consistency в PIT-структурах.", "Для PIT view применяется INNER JOIN всех сателлитов по единому глобальному load_date из управляющей таблицы расписаний — это гарантирует синхронный срез, поскольку Data Vault предполагает согласованную загрузку всех сателлитов в рамках одного batch window. Сателлиты с пропущенными датами просто исключаются из среза, что обеспечивает целостность данных. Коррелированные подзапросы не используются — они избыточны при наличии единого load_date во всех связанных объектах хранилища. 10. Последовательности (Sequence) — создание и применение sequence для генерации суррогатных ключей и технических идентификаторов в объектах Data Vault В Data Vault для Hub-таблицы используется sequence с CACHE 1000. При сбое базы данных в mid-load обнаружены gaps в суррогатных ключах. Как правильно настроить sequence, чтобы минимизировать gaps, сохранив производительность?"], "correct": 3, "explanation": "⚠️ Правильный ответ в этом вопросе — коррелированный подзапрос или MAX(load_date) per satellite. PIT-view должен для каждой строки PIT-календаря найти максимальный load_date ≤ snapshot_date в каждом сателлите. INNER JOIN по глобальному load_date работает только при синхронной загрузке.", "explanation_html": "<p><em class=\"analogy\">⚠️ Правильный ответ в этом вопросе — коррелированный подзапрос или MAX(load_date) per satellite</em>. PIT-view должен для каждой строки PIT-календаря найти максимальный load_date ≤ snapshot_date в каждом сателлите. INNER JOIN по глобальному load_date работает только при синхронной загрузке.</p>"}, {"id": 96, "topic": "Oracle PL/SQL", "subtopic": "Последовательности (Sequence) — создание и применение sequence для генерации суррогатных ключей и технических идентификаторов в объектах Data Vault", "question": "В Data Vault для Hub-таблицы используется sequence с CACHE 1000. При сбое базы данных в mid-load обнаружены gaps в суррогатных ключах. Как правильно настроить sequence, чтобы минимизировать gaps, сохранив производительность?", "answers": ["Правильное решение — заменить sequence на генерацию ключей через SYS_GUID() или ROWNUM-based подход внутри INSERT-блока. Sequence принципиально не подходит для Data Vault, так как не обеспечивает детерминированность при параллельных загрузках. Gaps — признак архитектурной ошибки.", "Gaps при сбое возникают из-за слишком маленького значения CACHE. Оптимальное решение — увеличить CACHE до 10000 и выше: чем больше кеш, тем меньше обращений к диску, а значит, sequence будет менее уязвим к сбоям. Дополнительно следует включить параметр CYCLE, чтобы sequence автоматически заполнял пропущенные значения после рестарта базы данных, восстанавливая непрерывность ключей в Hub-таблице.", "Чтобы устранить gaps, необходимо переключить sequence на NOCACHE ORDER — это гарантирует строгую последовательность без пропусков. Да, производительность снизится из-за serialization, но в Data Vault суррогатные ключи должны быть непрерывными, поскольку по ним строится аудит загрузки и контроль полноты данных. Gaps в Hub-ключах означают потерю записей и нарушение целостности хранилища, поэтому производительность здесь вторична.", "Полностью избежать gaps при кешировании невозможно — это допустимо в Data Vault, так как суррогатные ключи не несут бизнес-смысла. Для баланса: уменьшить CACHE (например, до 100) снизит потери при сбое, но ухудшит производительность. Альтернатива — NOCACHE с NOORDER, но это serialization bottleneck. Правильное решение: оставить разумный CACHE (20–100), задокументировать допустимость gaps в стандартах DWH, и не использовать sequence-значения как индикатор непрерывности загрузки — для этого использовать отдельные поля LOAD_DATE и RECORD_SOURCE. 6. Функции PL/SQL — разработка детерминированных и табличных функций (PIPELINED) для трансформации и хеширования данных в процессах Data Vault В процессе загрузки хабов Data Vault вы используете функцию хеширования для генерации HUB_HASH_KEY. Какой атрибут объявления функции гарантирует кеширование результатов между сессиями и исключает повторные вычисления хеша для одинаковых бизнес-ключей?"], "correct": 3, "explanation": "💾 NOCACHE ORDER — гарантирует строгую последовательность без пропусков. Но это serialization bottleneck при параллельной загрузке. Правда в том, что пропуски в суррогатных ключах Data Vault — допустимы, потому что ключи не несут бизнес-смысла. Уменьши CACHE до 20-100 как компромисс.", "explanation_html": "<p><em class=\"analogy\">💾 <strong>NOCACHE</strong> ORDER — гарантирует строгую последовательность без пропусков</em>. Но это serialization bottleneck при параллельной загрузке. Правда в том, что пропуски в суррогатных ключах Data Vault — допустимы, потому что ключи не несут бизнес-смысла. Уменьши CACHE до 20-100 как компромисс.</p>"}, {"id": 97, "topic": "Oracle PL/SQL", "subtopic": "Динамический SQL в PL/SQL — использование EXECUTE IMMEDIATE и DBMS_SQL для построения гибкой метауправляемой ETL-логики загрузки таблиц Data Vault", "question": "В метауправляемой ETL-логике загрузки хабов Data Vault нужно динамически строить INSERT на основе метаданных. Какой механизм — EXECUTE IMMEDIATE или DBMS_SQL — предпочтительнее, если количество бизнес-ключей меняется для каждого хаба?", "answers": ["EXECUTE IMMEDIATE предпочтительнее: через USING можно передавать массив bind-переменных типа VARRAY, что позволяет динамически менять их количество без перекомпиляции запроса.", "DBMS_SQL предпочтительнее, но только для DDL-операций. Для DML с переменным числом бизнес-ключей корректнее использовать EXECUTE IMMEDIATE с конкатенацией значений напрямую в строку запроса, избегая bind-переменных.", "DBMS_SQL избыточен — оба механизма одинаково поддерживают переменное число параметров, но EXECUTE IMMEDIATE проще в синтаксисе и быстрее выполняется за счёт нативной компиляции PL/SQL.", "DBMS_SQL — позволяет передавать bind-переменные в цикле через DBMS_SQL.BIND_VARIABLE. EXECUTE IMMEDIATE требует явного перечисления всех аргументов в USING — синтаксис не допускает передачи переменного числа значений через массив или цикл. 11. Переменные и типы данных PL/SQL - объявление и использование скалярных переменных, констант и якорных типов (%TYPE, %ROWTYPE) в блоках ETL-процессов Почему использование %TYPE для объявления переменной предпочтительнее явного указания типа данных в ETL-процессах?"], "correct": 3, "explanation": "🔧 DBMS_SQL позволяет динамически добавлять bind-переменные в цикле через DBMS_SQL.BIND_VARIABLE. EXECUTE IMMEDIATE требует явно перечислить все аргументы в USING — нельзя передать произвольное количество. Для метауправляемой загрузки с разным числом ключей DBMS_SQL гибче.", "explanation_html": "<p><em class=\"analogy\">🔧 DBMS_SQL позволяет динамически добавлять bind-переменные в цикле через DBMS_SQL.BIND_VARIABLE</em>. EXECUTE IMMEDIATE требует явно перечислить все аргументы в USING — нельзя передать произвольное количество. Для метауправляемой загрузки с разным числом ключей DBMS_SQL гибче.</p>"}, {"id": 98, "topic": "Oracle PL/SQL", "subtopic": "Структура анонимных и именованных блоков PL/SQL - секции DECLARE, BEGIN, EXCEPTION, END и порядок их применения при разработке по готовому шаблону", "question": "В готовом шаблоне анонимного блока PL/SQL секция EXCEPTION присутствует, но обработчик не нужен — что следует сделать?", "answers": ["Секцию EXCEPTION нельзя удалять — она обязательна в шаблоне, поэтому нужно оставить пустой блок между EXCEPTION и END без какого-либо содержимого.", "Удалить секцию EXCEPTION полностью или оставить с заглушкой WHEN OTHERS THEN NULL, если шаблон это требует. Секция необязательна.", "Если обработчик не нужен, следует написать WHEN OTHERS THEN RAISE, чтобы исключение пробрасывалось выше — это стандартная практика при работе с шаблонами в корпоративной разработке.", "Оставить как есть — пустая EXCEPTION не влияет на компиляцию. 14. Коллекции и пользовательские типы PL/SQL - объявление TYPE как таблицы или записи для пакетной обработки строк в процессах загрузки DWH Почему при пакетной загрузке данных в DWH используют TYPE как таблицу (nested table или varray), а не построчную обработку через курсор?"], "correct": 1, "explanation": "🧹 EXCEPTION не обязательна в PL/SQL-блоке. Если обработка ошибок не нужна — просто удали секцию EXCEPTION. Оставить пустой нельзя (ошибка компиляции). Если по шаблону нужно что-то оставить — WHEN OTHERS THEN NULL (заглушка, которая молча игнорирует ошибки).", "explanation_html": "<p><em class=\"analogy\">🧹 <strong>EXCEPTION</strong> не обязательна в PL/SQL-блоке</em>. Если обработка ошибок не нужна — просто удали секцию <strong>EXCEPTION</strong>. Оставить пустой нельзя (ошибка компиляции). Если по шаблону нужно что-то оставить — WHEN OTHERS THEN NULL (заглушка, которая молча игнорирует ошибки).</p>"}, {"id": 99, "topic": "Oracle PL/SQL", "subtopic": "Коллекции и пользовательские типы PL/SQL - объявление TYPE как таблицы или записи для пакетной обработки строк в процессах загрузки DWH", "question": "Почему при пакетной загрузке данных в DWH используют TYPE как таблицу (nested table или varray), а не построчную обработку через курсор?", "answers": ["TYPE-таблицы быстрее курсоров из-за кеширования.", "Коллекции типа nested table используются потому, что они хранят данные непосредственно в SGA (System Global Area), что исключает дисковый ввод-вывод при загрузке и позволяет Oracle автоматически распараллеливать операции вставки без дополнительных настроек параллелизма.", "Пакетная обработка через коллекции позволяет передавать данные массивом за одно обращение к SQL-движку (BULK COLLECT/FORALL), тогда как построчный курсор переключается между PL/SQL и SQL на каждой строке, что создаёт значительные накладные расходы (context switch) и замедляет загрузку.", "Построчная обработка через курсор создаёт избыточную нагрузку исключительно из-за блокировок на уровне строк (row-level locks), которые Oracle удерживает до конца транзакции — при использовании же коллекций блокировки применяются только в момент финального COMMIT, что существенно снижает конкуренцию за ресурсы и ускоряет загрузку в DWH. 15. Курсоры PL/SQL - явные курсоры и курсорные FOR-циклы для построчной обработки данных при реализации несложных трансформаций Почему курсорный FOR-цикл предпочтительнее явного курсора с OPEN/FETCH/CLOSE?"], "correct": 2, "explanation": "🚌 Курсор обрабатывает строки одну за одной — 100 000 поездок. Коллекция TYPE + BULK COLLECT загружает 100 000 строк за раз, FORALL вставляет их все одним DML-оператором. Переключений контекста: 100 000 → 1. Скорость — в разы выше.", "explanation_html": "<p><em class=\"analogy\">🚌 Курсор обрабатывает строки одну за одной — 100 000 поездок</em>. Коллекция TYPE + <strong>BULK COLLECT</strong> загружает 100 000 строк за раз, <strong>FORALL</strong> вставляет их все одним DML-оператором. Переключений контекста: 100 000 → 1. Скорость — в разы выше.</p>"}, {"id": 100, "topic": "Oracle PL/SQL", "subtopic": "Курсоры PL/SQL - явные курсоры и курсорные FOR-циклы для построчной обработки данных при реализации несложных трансформаций", "question": "Почему курсорный FOR-цикл предпочтительнее явного курсора с OPEN/FETCH/CLOSE?", "answers": ["Явный курсор надёжнее, так как программист сам контролирует открытие и закрытие, исключая ошибки", "FOR-цикл позволяет изменять данные курсора напрямую, тогда как OPEN/FETCH/CLOSE только читает записи", "FOR-цикл работает быстрее, так как использует массовую выборку данных вместо построчной обработки", "FOR-цикл автоматически открывает, читает и закрывает курсор, устраняя риск утечки ресурсов и сокращая количество кода 16. Sequence в Oracle - создание и использование последовательностей (CREATE SEQUENCE, NEXTVAL, CURRVAL) для генерации суррогатных ключей в таблицах DWH Вам нужно создать суррогатный ключ для хаба в Data Vault — напишите DDL для sequence, стартующей с 1 с шагом 1, без кэширования?"], "correct": 3, "explanation": "♻️ FOR-цикл с курсором делает три вещи автоматически: OPEN (открывает), FETCH (читает строки), CLOSE (закрывает). С явным курсором (OPEN/FETCH/CLOSE) всё нужно делать вручную. Забыл CLOSE — утечка ресурсов. FOR-цикл устраняет этот риск и сокращает код втрое.", "explanation_html": "<p><em class=\"analogy\">♻️ FOR-цикл с курсором делает три вещи автоматически: OPEN (открывает), FETCH (читает строки), CLOSE (закрывает)</em>. С явным курсором (OPEN/FETCH/CLOSE) всё нужно делать вручную. Забыл CLOSE — утечка ресурсов. FOR-цикл устраняет этот риск и сокращает код втрое.</p>"}, {"id": 101, "topic": "Oracle PL/SQL", "subtopic": "Функции PL/SQL - создание пользовательских функций, возвращающих скалярные значения, для вычисления хэш-ключей и бизнес-атрибутов в маппингах", "question": "Вам нужно создать функцию PL/SQL для вычисления хэш-ключа Hub-таблицы в Data Vault на основе бизнес-ключа. Какой встроенный Oracle-инструмент следует использовать внутри функции?", "answers": ["Функция UTL_RAW.CAST_TO_RAW(business_key) — преобразует бизнес-ключ в RAW-формат, что является стандартным способом генерации хэш-ключей для Hub-таблиц в Data Vault на Oracle.", "Функция ORA_HASH(business_key) — возвращает числовой хэш и является рекомендуемым инструментом для вычисления хэш-ключей в Data Vault.", "Пакет DBMS_UTILITY, функция GET_HASH_VALUE — она специально предназначена для хэширования строк в PL/SQL.", "Пакет DBMS_CRYPTO или функция STANDARD_HASH (Oracle 12c+), например: STANDARD_HASH(business_key, 'MD5') — возвращает RAW-значение хэша бизнес-ключа. 18. Пакеты (PACKAGE) PL/SQL - организация процедур и функций загрузки хабов, линков и сателлитов в пакеты с разделением спецификации и тела В пакете DWH_LOAD при загрузке хаба в спецификации объявлена процедура load_hub_customer, но тело пакета её не содержит — что произойдёт при компиляции тела пакета?"], "correct": 3, "explanation": "🔐 STANDARD_HASH(business_key, 'MD5') — встроенная Oracle-функция (12c+) для генерации хэшей. Возвращает RAW-значение, которое можно хранить в RAW(16) для MD5. Альтернатива: DBMS_CRYPTO.HASH. ORA_HASH — числовой хэш для внутренних нужд, не подходит для Data Vault.", "explanation_html": "<p><em class=\"analogy\">🔐 STANDARD_HASH(business_key, 'MD5') — встроенная Oracle-функция (12c+) для генерации хэшей</em>. Возвращает RAW-значение, которое можно хранить в RAW(16) для MD5. Альтернатива: DBMS_CRYPTO.HASH. ORA_HASH — числовой хэш для внутренних нужд, не подходит для Data Vault.</p>"}, {"id": 102, "topic": "Oracle PL/SQL", "subtopic": "WHERE и HAVING — корректная фильтрация строк и агрегатов в одном аналитическом запросе", "question": "Почему нельзя использовать WHERE для фильтрации результатов агрегатных функций?", "answers": ["WHERE выполняется после GROUP BY, но не умеет читать сгруппированные данные — для этого нужен HAVING.", "WHERE не поддерживает синтаксис агрегатных функций по стандарту SQL-92, поэтому база данных выдаёт синтаксическую ошибку. Для обхода этого ограничения нужно использовать HAVING, которое специально расширяет возможности WHERE для работы с агрегатами.", "WHERE фильтрует строки ДО группировки и агрегации, поэтому агрегатные значения (SUM, COUNT и др.) ещё не вычислены на этом этапе выполнения запроса. HAVING применяется ПОСЛЕ GROUP BY, когда агрегаты уже рассчитаны.", "WHERE фильтрует только числовые столбцы, а агрегатные функции возвращают специальный тип данных, несовместимый с оператором WHERE, поэтому для них предусмотрен отдельный синтаксис HAVING."], "correct": 2, "explanation": "⏱️ WHERE выполняется ДО GROUP BY: на этом этапе агрегат ещё не вычислен, он просто не существует. Нельзя фильтровать по тому, чего ещё нет. HAVING выполняется ПОСЛЕ GROUP BY: агрегаты уже посчитаны, теперь можно по ним фильтровать.", "explanation_html": "<p><em class=\"analogy\">⏱️ WHERE выполняется ДО GROUP BY: на этом этапе агрегат ещё не вычислен, он просто не существует</em>. Нельзя фильтровать по тому, чего ещё нет. HAVING выполняется ПОСЛЕ GROUP BY: агрегаты уже посчитаны, теперь можно по ним фильтровать.</p>"}, {"id": 103, "topic": "Oracle PL/SQL", "subtopic": "Стратегии партиционирования — влияние range и list партиционирования на partition pruning при типичных паттернах запросов к таблицам фактов", "question": "Таблица фактов продаж партиционирована по RANGE на столбце sale_date (по месяцам), но большинство запросов фильтруют данные по region_id. Какая стратегия партиционирования устранит полное сканирование таблицы в этом сценарии?", "answers": ["Использовать составное (composite) партиционирование: RANGE по sale_date как основное (для retention/архивирования) + LIST по region_id как субпартиционирование. Это обеспечит pruning сразу по обоим предикатам. Альтернатива — пересмотреть ключ: если region_id доминирует в запросах, сделать LIST по region_id основным партиционированием.", "Секционировать по HASH на region_id — это быстрее.", "Добавить составной индекс (composite index) на столбцы (sale_date, region_id) — оптимизатор автоматически выполнит index pruning вместо partition pruning, что даст аналогичный прирост производительности без изменения схемы партиционирования. Перестройка партиций избыточна, если статистика таблицы актуальна.", "Переключиться на LIST-партиционирование исключительно по region_id, полностью отказавшись от RANGE по sale_date. Поскольку большинство запросов фильтруют по region_id, именно он должен быть единственным ключом партиционирования. Составное партиционирование создаёт избыточную сложность администрирования и не даёт значимого преимущества перед простым LIST, так как оптимизатор всё равно применяет pruning по ведущему ключу."], "correct": 0, "explanation": "🗂️ Если 90% запросов фильтруют по region_id, а таблица партиционирована только по дате — придётся читать все партиции (full scan). Составное партиционирование RANGE(date) + LIST(region_id) = pruning работает по обоим измерениям. Запрос читает только нужные date-диапазоны и регионы.", "explanation_html": "<p><em class=\"analogy\">🗂️ Если 90% запросов фильтруют по region_id, а таблица партиционирована только по дате — придётся читать все партиции (full scan)</em>. Составное партиционирование RANGE(date) + LIST(region_id) = pruning работает по обоим измерениям. Запрос читает только нужные date-диапазоны и регионы.</p>"}, {"id": 104, "topic": "Oracle PL/SQL", "subtopic": "JOIN-ы — механика INNER, LEFT, FULL OUTER JOIN и корректное их применение при загрузке данных в DWH-слои", "question": "При загрузке данных в хаб Data Vault из двух источников (source_a и source_b) с частично пересекающимися ключами — какой тип JOIN следует использовать, чтобы не потерять бизнес-ключи ни из одного источника?", "answers": ["FULL OUTER JOIN — он сохраняет записи из обоих источников, включая те, у которых нет пары. После этого применяется COALESCE для объединения ключей в единый business key.", "LEFT JOIN от source_a как основного источника достаточно, если source_b считается второстепенным; бизнес-ключи из source_b, отсутствующие в source_a, всё равно появятся через отдельную инкрементальную загрузку в следующем ETL-цикле.", "INNER JOIN — оптимальный выбор для загрузки в хаб, так как он гарантирует наличие бизнес-ключа в обоих источниках, исключая «мусорные» записи, а пропущенные ключи добавляются позднее через процедуру reconciliation.", "FULL OUTER JOIN применяется, но без COALESCE — вместо этого нужно создать два отдельных потока INSERT для каждого источника и объединить их через UNION ALL, что даёт более прозрачную трассировку происхождения каждого бизнес-ключа в хабе. 5. Коррелированные подзапросы — механика выполнения, стоимость повторных вычислений и переписывание на JOIN или оконные функции с обоснованием выбора В хранилище Data Vault таблица satellites содержит 50 млн строк. Запрос с коррелированным подзапросом для получения последней версии записи по каждому hub_id выполняется 40 минут. Как его переписать для оптимизации?"], "correct": 0, "explanation": "🌐 FULL OUTER JOIN берёт ВСЕ строки из ОБА источников: совпавшие — объединяет, несовпавшие — добавляет с NULL с другой стороны. COALESCE(a.key, b.key) объединяет ключи в единый business key. Это единственный способ не потерять ни одного бизнес-ключа при интеграции двух источников.", "explanation_html": "<p><em class=\"analogy\">🌐 FULL OUTER JOIN берёт ВСЕ строки из ОБА источников: совпавшие — объединяет, несовпавшие — добавляет с NULL с другой стороны</em>. COALESCE(a.key, b.key) объединяет ключи в единый business key. Это единственный способ не потерять ни одного бизнес-ключа при интеграции двух источников.</p>"}, {"id": 105, "topic": "Oracle PL/SQL", "subtopic": "Коррелированные подзапросы — механика выполнения, стоимость повторных вычислений и переписывание на JOIN или оконные функции с обоснованием выбора", "question": "В хранилище Data Vault таблица satellites содержит 50 млн строк. Запрос с коррелированным подзапросом для получения последней версии записи по каждому hub_id выполняется 40 минут. Как его переписать для оптимизации?", "answers": ["Переписать через DENSE_RANK() OVER (PARTITION BY hub_id ORDER BY load_date DESC), отфильтровав rank=1. В отличие от ROW_NUMBER(), DENSE_RANK корректно обрабатывает дубли load_date в Data Vault, где несколько записей могут иметь одинаковую дату загрузки.", "Добавить индекс на hub_id и load_date — коррелированный подзапрос начнёт использовать index seek вместо full scan, что сократит повторные вычисления с O(N²) до O(N log N) без переписывания логики.", "Заменить на JOIN с подзапросом MAX(load_date) GROUP BY hub_id — это эквивалентно ROW_NUMBER(), но быстрее, так как агрегация MAX требует меньше памяти и не строит промежуточных партиций, что критично для 50 млн строк.", "Заменить коррелированный подзапрос на оконную функцию ROW_NUMBER() OVER (PARTITION BY hub_id ORDER BY load_date DESC), отфильтровав rn=1. Это устраняет повторное выполнение подзапроса для каждой строки (N раз), заменяя его одним проходом по данным с сортировкой внутри партиций. 6. CTE рекурсивные — обход иерархических структур данных при трансформации в рамках DWH-слоёв Почему рекурсивный CTE требует наличия двух обязательных частей — якоря и рекурсивного шага?"], "correct": 3, "explanation": "🏎️ ROW_NUMBER() OVER(PARTITION BY hub_id ORDER BY load_date DESC) = 1 — один проход по всем 50 млн строк, вычисляет номер строки внутри каждой партиции. Коррелированный подзапрос — для каждой из 50 млн строк запускает отдельный подзапрос. Разница: 1 проход vs 50 млн проходов.", "explanation_html": "<p>🏎️ ROW_NUMBER() OVER(PARTITION BY hub_id ORDER BY load_date DESC) = 1 — один проход по всем 50 млн строк, вычисляет номер строки внутри каждой партиции. Коррелированный подзапрос — для каждой из 50 млн строк запускает отдельный подзапрос. Разница: 1 проход vs 50 млн проходов.</p>"}, {"id": 106, "topic": "Oracle PL/SQL", "subtopic": "Стратегии партиционирования — влияние range и list партиционирования на partition pruning при типичных паттернах запросов к таблицам фактов", "question": "Почему list-партиционирование по дискретному атрибуту (например, region_id) обеспечивает более точный partition pruning, чем range-партиционирование по тому же столбцу?", "answers": ["При list-партиционировании оптимизатор точно сопоставляет предикат '= value' с единственной партицией, тогда как range вынужден проверять границы интервалов и может захватывать лишние партиции, если значения распределены неравномерно или запрос использует IN-список, охватывающий несколько диапазонов.", "List-партиционирование обеспечивает более точный pruning, потому что хранит значения в отсортированном порядке внутри каждой партиции, что позволяет оптимизатору использовать бинарный поиск по метаданным и быстрее исключать нерелевантные партиции. Range-партиционирование такой сортировки не гарантирует, поэтому сканирует больше партиций при точечных запросах.", "Range-партиционирование по дискретному атрибуту хуже только при запросах с BETWEEN, а при использовании предиката «= value» оба метода дают одинаково точный pruning, поскольку оптимизатор в обоих случаях обращается к одной партиции.", "List-партиционирование точнее, так как физически исключает дубликаты значений между партициями на уровне хранилища, тогда как range допускает пересечение границ при неточном определении интервалов, что вынуждает оптимизатор читать соседние партиции для проверки целостности данных. 10. CTE и вложенные подзапросы — архитектура многоуровневых WITH-выражений, материализация CTE и влияние на производительность сложных аналитических SELECT Почему многократное обращение к одному CTE может приводить к повторному выполнению его подзапроса?"], "correct": 0, "explanation": "📦 LIST-партиционирование: 'region_id=5 → партиция 5, и только она'. Точное сопоставление. RANGE-партиционирование: 'region_id между 1 и 10 → может быть несколько партиций'. Для дискретных атрибутов типа region_id LIST даёт более точный pruning и гарантированно читает одну партицию.", "explanation_html": "<p><em class=\"analogy\">📦 LIST-партиционирование: 'region_id=5 → партиция 5, и только она'</em>. Точное сопоставление. RANGE-партиционирование: 'region_id между 1 и 10 → может быть несколько партиций'. Для дискретных атрибутов типа region_id LIST даёт более точный pruning и гарантированно читает одну партицию.</p>"}, {"id": 107, "topic": "Oracle PL/SQL", "subtopic": "CTE и вложенные подзапросы — архитектура многоуровневых WITH-выражений, материализация CTE и влияние на производительность сложных аналитических SELECT", "question": "Почему многократное обращение к одному CTE может приводить к повторному выполнению его подзапроса?", "answers": ["Повторное выполнение происходит потому, что SQL-движок не отслеживает зависимости между обращениями к CTE и не может гарантировать идемпотентность подзапроса без его повторного запуска.", "Если CTE инлайнится оптимизатором, его логика разворачивается в каждой точке обращения без материализации.", "CTE всегда материализуется при первом обращении, но кэш результата автоматически инвалидируется при каждом повторном вызове из-за потенциальных side-эффектов.", "CTE всегда кэшируется и материализуется при первом вызове — повторные обращения к нему используют сохранённый результат без повторного выполнения подзапроса. 11. Агрегирование данных — GROUP BY, функции COUNT/SUM/MAX и их поведение при наличии NULL-значений в аналитических выборках Почему COUNT(*) и COUNT(column) могут возвращать разные значения для одной группы?"], "correct": 1, "explanation": "🔄 В PostgreSQL 11 CTE материализуется: вычисляется один раз и результат хранится. Если оптимизатор решает 'инлайнить' CTE (не материализовать) — он разворачивает логику в каждой точке использования, что может привести к повторным вычислениям при нескольких обращениях.", "explanation_html": "<p><em class=\"analogy\">🔄 В PostgreSQL 11 CTE материализуется: вычисляется один раз и результат хранится</em>. Если оптимизатор решает 'инлайнить' CTE (не материализовать) — он разворачивает логику в каждой точке использования, что может привести к повторным вычислениям при нескольких обращениях.</p>"}, {"id": 108, "topic": "Oracle PL/SQL", "subtopic": "Фильтрация данных - разница между WHERE и HAVING при фильтрации строк и агрегированных значений", "question": "Почему HAVING не может заменить WHERE при фильтрации строк до агрегации?", "answers": ["HAVING фильтрует строки после сортировки ORDER BY, поэтому не имеет доступа к исходным данным таблицы — WHERE же работает напрямую с индексами, что делает его единственно возможным для фильтрации по столбцам таблицы.", "HAVING не может заменить WHERE только потому, что синтаксически запрещено использовать HAVING без GROUP BY, тогда как WHERE работает в любом запросе, включая те, где группировка отсутствует.", "HAVING применяется после группировки и агрегации, поэтому не видит исходные строки — WHERE фильтрует их до агрегации, что эффективнее и семантически верно.", "HAVING может заменить WHERE, но работает медленнее, так как сначала загружает все строки в память, а затем фильтрует уже готовый результат — это вопрос производительности, а не семантики. 16. Фильтрация данных - применение HAVING для отбора групп с агрегированными показателями выше заданного порога Напишите SQL-запрос, который возвращает hub-таблицы схемы DWH с количеством строк более 10 000, используя системное представление information_schema.tables."], "correct": 2, "explanation": "⏰ HAVING живёт 'после GROUP BY'. Строки до группировки HAVING не видит. WHERE живёт 'до GROUP BY'. HAVING не может заменить WHERE просто потому что не имеет доступа к исходным строкам — они уже 'исчезли' в агрегаты. Каждый инструмент на своём месте.", "explanation_html": "<p>⏰ HAVING живёт 'после GROUP BY'. Строки до группировки HAVING не видит. WHERE живёт 'до GROUP BY'. HAVING не может заменить WHERE просто потому что не имеет доступа к исходным строкам — они уже 'исчезли' в агрегаты. Каждый инструмент на своём месте.</p>"}, {"id": 109, "topic": "Oracle PL/SQL", "subtopic": "Фильтрация данных - применение HAVING для отбора групп с агрегированными показателями выше заданного порога", "question": "Напишите SQL-запрос, который возвращает hub-таблицы схемы DWH с количеством строк более 10 000, используя системное представление information_schema.tables.", "answers": ["SELECT table_name, row_count FROM information_schema.tables WHERE table_schema = 'dwh' AND table_name LIKE 'hub%' HAVING row_count > 10000;", "SELECT table_name FROM information_schema.tables WHERE table_name LIKE 'hub%' AND row_count < 10000;", "SELECT t.table_name, t.row_count FROM information_schema.tables t WHERE t.table_schema = 'dwh' AND t.table_name LIKE '%hub' GROUP BY t.table_name, t.row_count HAVING t.row_count > 10000;", "SELECT table_name, row_count FROM information_schema.tables WHERE table_schema = 'dwh' AND table_name LIKE 'hub%' AND row_count > 10000; 17. Агрегирование и HAVING — разница между фильтрацией в WHERE и HAVING, поведение агрегатов при работе с большими объёмами данных хранилища Почему фильтрация через HAVING выполняется медленнее, чем аналогичная фильтрация через WHERE?"], "correct": 3, "explanation": "📊 row_count — это столбец в information_schema.tables. Условие row_count > 10000 можно вставить прямо в WHERE — это обычный фильтр по столбцу, а не агрегатное условие. HAVING нужно только когда фильтруешь по результату COUNT(*), SUM() и т.п. из GROUP BY.", "explanation_html": "<p><em class=\"analogy\">📊 row_count — это столбец в information_schema.tables</em>. Условие row_count > 10000 можно вставить прямо в WHERE — это обычный фильтр по столбцу, а не агрегатное условие. HAVING нужно только когда фильтруешь по результату COUNT(*), SUM() и т.п. из GROUP BY.</p>"}, {"id": 110, "topic": "Модели данных DWH", "subtopic": "Разграничение компонентов Data Vault — логика разделения ключей, связей и атрибутов между hub, link и satellite", "question": "Почему бизнес-ключи хранятся в hub, а не в satellite?", "answers": ["Бизнес-ключи стабильны и неизменны — их вынесение в hub обеспечивает единую точку идентификации сущности без дублирования при изменении атрибутов, которые версионируются в satellite.", "Satellite предназначены исключительно для хранения исторических изменений описательных атрибутов, поэтому бизнес-ключи технически невозможно разместить в satellite — их структура не поддерживает уникальные идентификаторы без дополнительных суррогатных ключей.", "Бизнес-ключи хранятся в hub, потому что они чаще всего изменяются, и централизованное хранение упрощает их версионирование без необходимости обновлять связанные satellite-таблицы.", "Hub хранит ключи для ускорения JOIN-операций. 7. Дедупликация в Data Vault - стратегии обработки дублирующихся business key при интеграции данных из разнородных источников Почему в Data Vault дедупликация business keys выполняется на уровне staging, а не в Hub?"], "correct": 0, "explanation": "🏦 Hub — центральный реестр бизнес-ключей (как СНИЛС или ИНН). Ключи стабильны и не меняются. Если держать их в Satellite — пришлось бы при каждом изменении атрибута 'находить' ключ через версионирование. В Hub ключ хранится один раз навсегда — единая точка правды.", "explanation_html": "<p><em class=\"analogy\">🏦 <strong>Hub</strong> — центральный реестр <strong>бизнес-ключ</strong>ей (как СНИЛС или ИНН)</em>. Ключи стабильны и не меняются. Если держать их в <strong>Satellite</strong> — пришлось бы при каждом изменении атрибута 'находить' ключ через версионирование. В <strong>Hub</strong> ключ хранится один раз навсегда — единая точка правды.</p>"}, {"id": 111, "topic": "Модели данных DWH", "subtopic": "Дедупликация в Data Vault - стратегии обработки дублирующихся business key при интеграции данных из разнородных источников", "question": "Почему в Data Vault дедупликация business keys выполняется на уровне staging, а не в Hub?", "answers": ["Hub не имеет механизма сравнения входящих записей с уже загруженными, поэтому любой дубликат автоматически создаёт новую запись с новым hash key, что приводит к разрыву связей в Satellite и Link таблицах; staging предотвращает это, фильтруя записи ещё до генерации суррогатных ключей и тем самым сохраняя целостность всей модели.", "Hub должен хранить только уникальные BK с первой датой загрузки — повторная вставка дубликата нарушит идемпотентность и исказит историю появления сущности в системе; staging изолирует грязные данные источника до их попадания в модель.", "Hub — только для уникальных ключей, staging слишком медленная для этого.", "Дедупликация выполняется в staging, потому что Hub не поддерживает составные ключи и технически не способен обрабатывать коллизии business keys из разных источников — это ограничение архитектуры Data Vault 1.0, устранённое только в версии 2.0. 8. Surrogate key в Data Vault - алгоритмы генерации хеш-ключей и обеспечение детерминированности при загрузке из множества источников Почему при генерации хеш-ключей в Data Vault критически важна нормализация входных значений перед хешированием?"], "correct": 1, "explanation": "🚪 Hub — как вахтёр: проверяет, есть ли уже такой business key. Если ETL пускает дубль прямо в Hub — вахтёр либо пропустит (нарушение уникальности), либо создаст дубль. Staging-слой — предварительная проверка: дедупликация происходит ДО попытки вставки в Hub.", "explanation_html": "<p>🚪 <strong>Hub</strong> — как вахтёр: проверяет, есть ли уже такой business key. Если ETL пускает дубль прямо в <strong>Hub</strong> — вахтёр либо пропустит (нарушение уникальности), либо создаст дубль. Staging-слой — предварительная проверка: дедупликация происходит ДО попытки вставки в <strong>Hub</strong>.</p>"}, {"id": 112, "topic": "Модели данных DWH", "subtopic": "Link-таблицы Data Vault - проектирование same-as link и иерархических link для моделирования нетривиальных доменных связей", "question": "Почему Same-As Link в Data Vault хранит суррогатные ключи двух хабов одного типа, а не объединяет их в один хаб?", "answers": ["Потому что хранение двух суррогатных ключей ускоряет ETL-процессы: при загрузке данных система сразу знает, в какой хаб направить запись, не выполняя дополнительных JOIN-операций для определения эквивалентности между источниками.", "Чтобы сохранить исходные бизнес-ключи из разных систем без потери источника происхождения, фиксируя факт эквивалентности как отдельную бизнес-связь, а не физическое слияние записей.", "Потому что объединение хабов одного типа нарушает принцип атомарности Data Vault: каждый хаб должен содержать только уникальные бизнес-ключи из одного источника, а слияние привело бы к дублированию записей и коллизиям суррогатных ключей.", "Потому что Same-As Link технически не может ссылаться на один и тот же хаб дважды из-за ограничений реляционных СУБД на внешние ключи — поэтому создаются два отдельных хаба с идентичной структурой для обхода этого ограничения базы данных. 10. Дедупликация в Data Vault - стратегии обработки дублирующихся business key при интеграции данных из разнородных источников В Data Vault при интеграции данных из CRM и ERP одна и та же компания имеет business key 'COMP-001' в CRM и 'C001' в ERP — какую стратегию следует применить для корректной дедупликации в Hub?"], "correct": 1, "explanation": "🪞 SAL — 'зеркальный' Link между двумя записями одно
