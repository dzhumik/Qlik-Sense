го Hub. 'COMP-001' (CRM) и 'C001' (ERP) — разные ключи, разные записи в Hub, но указывают на одну реальную компанию. SAL фиксирует факт эквивалентности, сохраняя оба ключа в исходном виде.", "explanation_html": "<p>🪞 SAL — 'зеркальный' <strong>Link</strong> между двумя записями одного <strong>Hub</strong>. 'COMP-001' (CRM) и 'C001' (ERP) — разные ключи, разные записи в <strong>Hub</strong>, но указывают на одну реальную компанию. SAL фиксирует факт эквивалентности, сохраняя оба ключа в исходном виде.</p>"}, {"id": 113, "topic": "Модели данных DWH", "subtopic": "Business Key в Data Vault - определение, выбор и корректное заполнение в hub-таблицах", "question": "В HUB_CUSTOMER поступают '00123' и '123' из одного источника — это проблема качества данных или два разных ключа?", "answers": ["Проблема качества данных в источнике: нужна нормализация до загрузки в Hub.", "Это два разных Business Key — Hub хранит их оба как уникальные записи", "Источник всегда прав", "Data Vault допускает хранение обоих значений, нормализация выполняется в Satellite-таблицах при добавлении атрибутов 13. Link-таблицы Data Vault - структура, foreign surrogate keys и правила создания между hub-таблицами Почему link-таблица хранит surrogate keys из hub-таблиц, а не бизнес-ключи напрямую?"], "correct": 1, "explanation": "🏷️ '00123' и '123' — разные строки. Hub не нормализует бизнес-ключи — он хранит их как есть. Это может быть проблема качества данных в источнике, но с точки зрения Data Vault — это два разных ключа, два разных объекта. Нормализация — задача staging, не Hub.", "explanation_html": "<p><em class=\"analogy\">🏷️ '00123' и '123' — разные строки</em>. <strong>Hub</strong> не нормализует <strong>бизнес-ключ</strong>и — он хранит их как есть. Это может быть проблема качества данных в источнике, но с точки зрения <strong>Data Vault</strong> — это два разных ключа, два разных объекта. Нормализация — задача staging, не <strong>Hub</strong>.</p>"}, {"id": 114, "topic": "Модели данных DWH", "subtopic": "Link-таблицы Data Vault - структура, foreign surrogate keys и правила создания между hub-таблицами", "question": "Почему link-таблица хранит surrogate keys из hub-таблиц, а не бизнес-ключи напрямую?", "answers": ["Surrogate keys нужны только для совместимости с legacy-системами, которые не поддерживают строковые ключи в JOIN-операциях между таблицами.", "Бизнес-ключи слишком длинные для хранения в link-таблицах, поэтому surrogate keys используются исключительно для экономии дискового пространства в хранилище.", "Бизнес-ключи хранятся в link-таблицах напрямую, а surrogate keys добавляются лишь как дополнительный индекс для ускорения выборок в отчётах.", "Surrogate keys обеспечивают стабильные связи между хабами независимо от изменений бизнес-ключей, снижают дублирование данных и ускоряют JOIN-операции за счёт числовых идентификаторов вместо составных строковых ключей. 14. Link-таблицы Data Vault - структура, foreign surrogate keys и правила создания между hub-таблицами В Link-таблице между Hub_Customer и Hub_Order какие обязательные поля должны присутствовать помимо LINK_HASH_KEY и дат загрузки?"], "correct": 3, "explanation": "🔗 Surrogate key (хэш) — стабильный внутренний идентификатор. Если завтра источник изменит формат business key ('CUST-001' → '1'), хэш в Link останется прежним, связь не сломается. Хранить business key напрямую в Link — риск, что при изменении ключа все связи нужно переписывать.", "explanation_html": "<p><em class=\"analogy\">🔗 Surrogate key (<strong>хэш</strong>) — стабильный внутренний идентификатор</em>. Если завтра источник изменит формат business key ('CUST-001' → '1'), <strong>хэш</strong> в <strong>Link</strong> останется прежним, связь не сломается. Хранить business key напрямую в <strong>Link</strong> — риск, что при изменении ключа все связи нужно переписывать.</p>"}, {"id": 115, "topic": "SQL", "subtopic": "Record Source в Data Vault - назначение поля, форматы значений и правила заполнения по стандарту команды", "question": "Источник данных — SAP ERP, загрузка через Informatica PC. Как выглядит RECORD_SOURCE по стандарту команды?", "answers": ["sap_erp.informatica.orders — система, инструмент и объект, но в нижнем регистре", "SAP_ERP.INFORMATICA.ORDERS — система, инструмент загрузки и объект, верхний регистр, без пробелов.", "INFORMATICA.SAP_ERP.ORDERS — инструмент загрузки ставится первым, затем система и объект", "SAP_ERP.ORDERS — только система и объект без указания инструмента загрузки 11. Link-таблицы Data Vault - структура, foreign surrogate keys и правила создания между hub-таблицами Почему link-таблица хранит surrogate keys из hub-таблиц, а не бизнес-ключи напрямую?"], "correct": 1, "explanation": "📋 RECORD_SOURCE = 'SAP_ERP.ORDERS' по стандарту команды: [СИСТЕМА].[ОБЪЕКТ]. Без инструмента загрузки (Informatica) — он может меняться, а источник данных остаётся SAP ERP. Формат: система.объект, в верхнем регистре, через точку.", "explanation_html": "<p><em class=\"analogy\">📋 RECORD_SOURCE = 'SAP_ERP.ORDERS' по стандарту команды: [СИСТЕМА].[ОБЪЕКТ]</em>. Без инструмента загрузки (Informatica) — он может меняться, а источник данных остаётся SAP ERP. Формат: система.объект, в верхнем регистре, через точку.</p>"}, {"id": 116, "topic": "Модели данных DWH", "subtopic": "Разграничение компонентов Data Vault — логика разделения ключей, связей и атрибутов между hub, link и satellite", "question": "В системе есть сущность «Клиент» с полями: customer_id, name, email, phone, created_date — в какой компонент Data Vault поместить поле email?", "answers": ["Email — изменяемый атрибут, размещается в Satellite. Hub хранит только business key (customer_id), Link — связи между сущностями.", "Email — стабильное контактное поле, поэтому его размещают в Hub: Satellite нужен только для часто меняющихся данных вроде статуса или баланса.", "Email — уникальный идентификатор клиента, поэтому он помещается в Hub вместе с customer_id как дополнительный бизнес-ключ для поиска записей.", "Email хранится в Link, так как связывает клиента с коммуникационным каналом и отражает отношение между сущностями. 18. Business Key в Data Vault - определение, выбор и корректное заполнение в hub-таблицах Почему Business Key в hub-таблице должен храниться в исходном, неизменённом виде?"], "correct": 0, "explanation": "📧 Email — атрибут клиента, который может меняться (человек сменил почту). Hub хранит только стабильный бизнес-ключ (customer_id). Email — изменяемый атрибут → Satellite. Если email стал бизнес-ключом для поиска клиентов — только тогда он попадает в Hub.", "explanation_html": "<p>📧 Email — атрибут клиента, который может меняться (человек сменил почту). <strong>Hub</strong> хранит только стабильный <strong>бизнес-ключ</strong> (customer_id). Email — изменяемый атрибут → <strong>Satellite</strong>. Если email стал <strong>бизнес-ключ</strong>ом для поиска клиентов — только тогда он попадает в <strong>Hub</strong>.</p>"}, {"id": 117, "topic": "Oracle PL/SQL", "subtopic": "Обработка исключений PL/SQL — проектирование стратегий обработки ошибок в процессах загрузки DWH: пользовательские исключения, PRAGMA EXCEPTION_INIT, логирование ошибок", "question": "Почему PRAGMA EXCEPTION_INIT необходимо объявлять до секции BEGIN, а не внутри обработчика исключений?", "answers": ["PRAGMA EXCEPTION_INIT должна быть в секции объявлений, потому что PL/SQL-движок обрабатывает исключения последовательно сверху вниз, и если директива встретится после BEGIN, она будет проигнорирована интерпретатором без выдачи ошибки компиляции, что приведёт к молчаливому сбою в рантайме.", "Ограничение связано с областью видимости переменных: исключение, объявленное в DECLARE, имеет область видимости всего блока включая EXCEPTION-секцию, тогда как директива PRAGMA EXCEPTION_INIT внутри BEGIN имела бы локальную область видимости только до ближайшего вложенного блока, что делало бы привязку ORA-кода ненадёжной при вложенных вызовах процедур.", "PRAGMA EXCEPTION_INIT — директива компилятора: она связывает пользовательскую переменную-исключение с ORA-кодом на этапе компиляции, до выполнения кода. Внутри BEGIN директивы компилятора недопустимы — там только исполняемые операторы.", "PRAGMA EXCEPTION_INIT технически можно разместить внутри блока BEGIN, однако Oracle рекомендует секцию DECLARE из соображений читаемости и стандартизации кода: при нахождении директивы внутри исполняемого блока она работает только для исключений, возникающих после строки с PRAGMA, но не для предшествующих операторов."], "correct": 2, "explanation": "🔨 PRAGMA — директива компилятора, как команда #include в C++. Она обрабатывается на этапе компиляции, до выполнения кода. В секции BEGIN компилятор ждёт исполняемые операторы, а не директивы. PRAGMA EXCEPTION_INIT должна быть в DECLARE, чтобы Oracle знал об исключении до начала блока.", "explanation_html": "<p>🔨 <strong>PRAGMA</strong> — директива компилятора, как команда #include в C++. Она обрабатывается на этапе компиляции, до выполнения кода. В секции <strong>BEGIN</strong> компилятор ждёт исполняемые операторы, а не директивы. <strong>PRAGMA</strong> <strong>EXCEPTION</strong>_INIT должна быть в <strong>DECLARE</strong>, чтобы Oracle знал об исключении до начала блока.</p>"}, {"id": 118, "topic": "Oracle PL/SQL", "subtopic": "Последовательности (SEQUENCE) - создание и применение последовательностей для генерации суррогатных ключей в объектах хранилища данных", "question": "Почему суррогатные ключи в DWH, генерируемые через SEQUENCE, не гарантируют отсутствие пропусков в значениях?", "answers": ["SEQUENCE намеренно пропускает значения для обеспечения уникальности в RAC-среде, резервируя диапазоны для каждого узла.", "Пропуски образуются потому, что при параллельных вставках Oracle автоматически пропускает уже занятые значения, проверяя уникальность по индексу первичного ключа.", "Пропуски возникают из-за того, что SEQUENCE использует алгоритм round-robin при распределении значений между сессиями, и часть диапазонов резервируется как буфер для предотвращения конкурентных блокировок, но никогда не выдаётся конечным транзакциям.", "SEQUENCE кэширует блоки значений (CACHE) в памяти каждого экземпляра; при откате транзакции или перезапуске БД закэшированные, но неиспользованные значения теряются безвозвратно, образуя пропуски. 8. Последовательности (SEQUENCE) - создание и применение последовательностей для генерации суррогатных ключей в объектах хранилища данных В Data Vault хабе необходимо генерировать суррогатный ключ при вставке новых записей — какой DDL-синтаксис Oracle позволит привязать sequence к колонке хаба без использования триггера?"], "correct": 3, "explanation": "💸 Sequence с CACHE 1000 зарезервировал значения 1001-2000 в памяти. БД упала на значении 1050. При перезапуске — всё ещё не использованные 1051-2000 потеряны. Следующее значение начнётся с 2001. Gaps (1051-2000) безвозвратны. При NOCACHE — нет резерва в памяти, нет потерь.", "explanation_html": "<p><em class=\"analogy\">💸 Sequence с CACHE 1000 зарезервировал значения 1001-2000 в памяти</em>. БД упала на значении 1050. При перезапуске — всё ещё не использованные 1051-2000 потеряны. Следующее значение начнётся с 2001. Gaps (1051-2000) безвозвратны. При <strong>NOCACHE</strong> — нет резерва в памяти, нет потерь.</p>"}, {"id": 119, "topic": "Oracle PL/SQL", "subtopic": "Курсоры и обработка наборов данных — явные курсоры, REF CURSOR, BULK COLLECT и FORALL для эффективной пакетной обработки данных при загрузке в DWH", "question": "Почему FORALL выполняет DML значительно быстрее, чем цикл FOR с одиночными операциями?", "answers": ["FORALL передаёт весь массив данных одним context switch между PL/SQL и SQL движками, устраняя многократные переключения контекста, которые и создают основные накладные расходы при построчной обработке.", "FORALL быстрее цикла FOR потому, что он полностью обходит механизм транзакций Oracle и буферный кэш при записи данных, напрямую взаимодействуя с сегментами данных на диске, что устраняет накладные расходы на управление undo-сегментами и redo-логами для каждой отдельной строки.", "FORALL работает быстрее, потому что автоматически распараллеливает выполнение DML-операций между несколькими потоками Oracle, позволяя базе данных обрабатывать части массива одновременно, что значительно сокращает общее время выполнения при больших объёмах данных.", "FORALL оптимизирует производительность за счёт того, что PL/SQL движок предварительно компилирует все DML-операции в единый оптимизированный план выполнения, который Oracle кэширует и переиспользует для каждого элемента коллекции, избегая повторного разбора SQL-запросов при каждой итерации цикла. 10. Динамический SQL в PL/SQL — использование EXECUTE IMMEDIATE и DBMS_SQL для построения гибкой метауправляемой ETL-логики загрузки таблиц Data Vault В метауправляемой ETL-логике загрузки хабов Data Vault нужно динамически строить INSERT на основе метаданных. Какой механизм — EXECUTE IMMEDIATE или DBMS_SQL — предпочтительнее, если количество бизнес-ключей меняется для каждого хаба?"], "correct": 0, "explanation": "🚀 Цикл FOR с INSERT = 500 000 'телефонных звонков' между PL/SQL и SQL. FORALL = один звонок, но сразу отправляешь 500 000 задач. Context switch (переключение контекста) занимает время. Один большой вызов вместо тысяч маленьких — принципиальный выигрыш в скорости.", "explanation_html": "<p><em class=\"analogy\">🚀 Цикл FOR с INSERT = 500 000 'телефонных звонков' между PL/SQL и SQL</em>. <strong>FORALL</strong> = один звонок, но сразу отправляешь 500 000 задач. Context switch (переключение контекста) занимает время. Один большой вызов вместо тысяч маленьких — принципиальный выигрыш в скорости.</p>"}, {"id": 120, "topic": "Oracle PL/SQL", "subtopic": "Sequence в Oracle - создание и использование последовательностей (CREATE SEQUENCE, NEXTVAL, CURRVAL) для генерации суррогатных ключей в таблицах DWH", "question": "Почему NEXTVAL возвращает новое значение при каждом обращении, даже если транзакция была откатана?", "answers": ["Sequence живёт вне транзакций: INCREMENT происходит на уровне системы и не откатывается вместе с DML-операциями, чтобы гарантировать уникальность значений.", "Это поведение настраивается параметром NOCYCLE — без него последовательность не откатывает значения, с ним — откатывает.", "Sequence кэширует значения в памяти заранее, и при откате транзакции использованное значение просто теряется из кэша без возврата.", "NEXTVAL автоматически фиксирует мини-транзакцию (autonomous transaction), поэтому откат основной транзакции не влияет на уже выданное значение. 14. Переменные и типы данных PL/SQL - объявление и использование скалярных переменных, констант и якорных типов (%TYPE, %ROWTYPE) в блоках ETL-процессов В ETL-процессе нужно объявить переменную для хранения значения поля SALARY из таблицы EMPLOYEES, чтобы тип автоматически подстраивался под структуру таблицы — какой синтаксис использовать?"], "correct": 0, "explanation": "🔢 Sequence — это счётчик вне транзакций. Как счётчик посещений на сайте: даже если посетитель ушёл (транзакция откатилась), счётчик уже увеличился. Это сделано специально для уникальности: если позволить откат, два потока могли бы получить одинаковый номер.", "explanation_html": "<p><em class=\"analogy\">🔢 Sequence — это счётчик вне транзакций</em>. Как счётчик посещений на сайте: даже если посетитель ушёл (транзакция откатилась), счётчик уже увеличился. Это сделано специально для уникальности: если позволить откат, два потока могли бы получить одинаковый номер.</p>"}, {"id": 121, "topic": "Oracle PL/SQL", "subtopic": "Переменные и типы данных PL/SQL - объявление и использование скалярных переменных, констант и якорных типов (%TYPE, %ROWTYPE) в блоках ETL-процессов", "question": "В ETL-процессе нужно объявить переменную для хранения значения поля SALARY из таблицы EMPLOYEES, чтобы тип автоматически подстраивался под структуру таблицы — какой синтаксис использовать?", "answers": ["v_salary NUMBER := EMPLOYEES.SALARY%TYPE; — тип столбца присваивается через инициализацию переменной", "v_salary EMPLOYEES%ROWTYPE.SALARY; — якорный тип %ROWTYPE позволяет обращаться к отдельным полям строки таблицы через точечную нотацию", "v_salary%TYPE := EMPLOYEES.SALARY; — якорный тип объявляется через %TYPE после имени переменной с указанием источника справа", "v_salary EMPLOYEES.SALARY%TYPE; — якорный тип привязывает переменную к типу конкретного столбца таблицы. 15. Коллекции и пользовательские типы PL/SQL - объявление TYPE как таблицы или записи для пакетной обработки строк в процессах загрузки DWH Почему при пакетной загрузке данных в DWH используют TYPE как таблицу (nested table или varray), а не построчную обработку через курсор?"], "correct": 3, "explanation": "🧩 v_salary EMPLOYEES.SALARY%TYPE — переменная наследует тип поля SALARY из таблицы EMPLOYEES. Если DBA изменит SALARY с NUMBER(10,2) на NUMBER(15,4) — переменная автоматически получит новый тип при следующей компиляции процедуры. Без %TYPE — нужно вручную искать и менять везде.", "explanation_html": "<p><em class=\"analogy\">🧩 v_salary EMPLOYEES.SALARY<strong>%TYPE</strong> — переменная наследует тип поля SALARY из таблицы EMPLOYEES</em>. Если DBA изменит SALARY с NUMBER(10,2) на NUMBER(15,4) — переменная автоматически получит новый тип при следующей компиляции процедуры. Без <strong>%TYPE</strong> — нужно вручную искать и менять везде.</p>"}, {"id": 122, "topic": "Oracle PL/SQL", "subtopic": "Переменные и типы PL/SQL - объявление скалярных переменных, записей (RECORD) и коллекций (TABLE, VARRAY) для промежуточной обработки данных хранилища", "question": "Почему при объявлении коллекции типа TABLE OF в PL/SQL её необходимо инициализировать перед добавлением элементов, тогда как для VARRAY это правило одинаково обязательно?", "answers": ["Инициализация нужна из-за ограничений памяти PGA: без конструктора PL/SQL не резервирует сегмент под коллекцию. Для VARRAY размер фиксирован при объявлении, поэтому память выделяется автоматически, но конструктор всё равно нужен для установки COUNT=0.", "Оба типа (nested table и VARRAY) являются объектами и по умолчанию имеют значение NULL — не пустую коллекцию, а именно NULL. Без вызова конструктора (например, my_type()) обращение к элементам вызовет исключение ORA-06531 (Reference to uninitialized collection), поскольку объект не существует в памяти.", "Коллекции TABLE OF требуют инициализации, потому что Oracle не знает тип элементов до первого вызова конструктора. VARRAY тип фиксирован при компиляции, поэтому Oracle создаёт пустой объект автоматически и инициализация необязательна.", "Инициализация обязательна только для nested table, так как она хранится в отдельной таблице БД. VARRAY хранится inline и автоматически создаётся как пустой массив при объявлении, поэтому для него инициализация через конструктор не требуется."], "correct": 1, "explanation": "📭 Nested Table и VARRAY — объекты Oracle. По умолчанию они NULL (как несуществующий почтовый ящик). Перед использованием нужно 'создать ящик': my_collection := my_type(). Без инициализации обращение к коллекции вызовет ORA-06531. Это не опционально — это обязательно для обоих типов.", "explanation_html": "<p>📭 Nested Table и VARRAY — объекты Oracle. По умолчанию они NULL (как несуществующий почтовый ящик). Перед использованием нужно 'создать ящик': my_collection := my_type(). Без инициализации обращение к коллекции вызовет ORA-06531. Это не опционально — это обязательно для обоих типов.</p>"}, {"id": 123, "topic": "Informatica PC", "subtopic": "Трансформация Router — маршрутизация потоков данных по условиям и формирование различных наборов атрибутов через Expression в каждой ветке", "question": "В маппинге Informatica PC есть Router с тремя группами: VIP-клиенты, стандартные клиенты и группа Default. В ветке VIP через Expression добавляется атрибут DISCOUNT_RATE = 0.2, в ветке стандартных — DISCOUNT_RATE = 0.05. Запись клиента не попала ни в одну из именованных групп. Какое значение DISCOUNT_RATE получит эта запись?", "answers": ["Запись попадёт в Default-группу и унаследует DISCOUNT_RATE = 0.05, так как Default автоматически применяет параметры последней именованной группы Router в качестве значения по умолчанию.", "Запись вообще не будет обработана и потеряется: Default-группа Router существует только как технический маршрут для логирования отклонённых строк, и без подключённого target-объекта такие записи молча отбрасываются движком Integration Service.", "Запись попадёт в Default-группу, но маппинг завершится ошибкой — Informatica PC требует явного указания Expression-трансформации для Default-группы, иначе сессия падает с ошибкой несоответствия схемы выходных портов.", "Запись попадёт в Default-группу. DISCOUNT_RATE будет NULL, так как Default-группа Router передаёт порты без изменений, не поддерживая собственную Expression-логику."], "correct": 3, "explanation": "🚦 Default-группа Router — запасной выход. Если запись не подошла ни к одному условию именованных групп, она уходит в Default. DISCOUNT_RATE там NULL, потому что Default не имеет своей Expression-логики — он просто передаёт поля без изменений. Expression-трансформер подключается к именованным веткам.", "explanation_html": "<p><em class=\"analogy\">🚦 Default-группа <strong>Router</strong> — запасной выход</em>. Если запись не подошла ни к одному условию именованных групп, она уходит в Default. DISCOUNT_RATE там NULL, потому что Default не имеет своей <strong>Expression</strong>-логики — он просто передаёт поля без изменений. <strong>Expression</strong>-трансформер подключается к именованным веткам.</p>"}, {"id": 124, "topic": "Informatica PC", "subtopic": "Оптимизация производительности mapping при обработке больших объёмов данных — предварительная сортировка потока перед Aggregator, настройка параметров сессии и выбор стратегии кэширования", "question": "В mapping с Aggregator, обрабатывающем 500 млн записей, наблюдается высокое использование диска из-за spill файлов — какую настройку следует изменить в первую очередь?", "answers": ["Сначала увеличить 'Session Log Level' до verbose для анализа spill файлов, затем перераспределить разделы в Source Qualifier", "Увеличить 'Aggregator Data Cache Size' до максимального значения и отключить 'Sorted Input' — это позволит Aggregator самостоятельно управлять сортировкой без лишних накладных расходов на предварительную обработку данных", "Включить 'Sorted Input' и уменьшить размер кэша — меньший кэш снизит нагрузку на память и устранит spill файлы", "Сначала включить 'Sorted Input' (при предварительно отсортированных данных) — это снизит объём кэша. Затем увеличить 'Aggregator Data Cache Size' и 'Index Cache Size'. 5. Трансформация Lookup в Informatica PowerCenter — обогащение входящего потока данных справочными значениями по ключевому полю В маппинге Informatica PowerCenter нужно обогатить поток заказов названием продукта из таблицы-справочника по PRODUCT_ID — какую трансформацию следует использовать?"], "correct": 3, "explanation": "🧊 Spill-файлы появляются когда кэш Aggregator'а переполнен и данные 'выливаются' на диск. Решение: включи Sorted Input (данные приходят отсортированными по group by ключу → Aggregator обрабатывает группы одну за другой и освобождает память) + увеличь кэш если нужно.", "explanation_html": "<p>🧊 Spill-файлы появляются когда кэш <strong>Aggregator</strong>'а переполнен и данные 'выливаются' на диск. Решение: включи <strong>Sorted Input</strong> (данные приходят отсортированными по group by ключу → <strong>Aggregator</strong> обрабатывает группы одну за другой и освобождает память) + увеличь кэш если нужно.</p>"}, {"id": 125, "topic": "Informatica PC", "subtopic": "Трансформация Lookup в Informatica PowerCenter — обогащение входящего потока данных справочными значениями по ключевому полю", "question": "В маппинге Informatica PowerCenter нужно обогатить поток заказов названием продукта из таблицы-справочника по PRODUCT_ID — какую трансформацию следует использовать?", "answers": ["Трансформацию Filter с условием PRODUCT_ID IS NOT NULL — она автоматически подтягивает связанные значения из указанной таблицы-справочника и добавляет их в поток данных.", "Трансформацию Router: направить поток по PRODUCT_ID в нужную ветку.", "Трансформацию Joiner: подключить справочную таблицу как pipeline source, настроить Join Condition по PRODUCT_ID и выбрать тип Full Outer Join для получения названия продукта.", "Трансформацию Lookup: подключить справочную таблицу, задать Lookup Condition по PRODUCT_ID, вернуть нужное поле названия продукта в поток. 5. Трансформация Aggregator в Informatica PowerCenter — подсчёт агрегированных показателей с группировкой по одному полю В трансформации Aggregator вы считаете SUM(amount) с группировкой по customer_id — какое свойство порта customer_id необходимо включить?"], "correct": 3, "explanation": "🔭 Lookup-трансформация в Informatica — это подстановка по ключу: 'у меня PRODUCT_ID=123, скажи мне PRODUCT_NAME из справочника'. Подключаешь таблицу-справочник, задаёшь условие (PRODUCT_ID = PRODUCT_ID), выбираешь поля для возврата — и готово. Это стандартное обогащение потока.", "explanation_html": "<p>🔭 <strong>Lookup</strong>-трансформация в Informatica — это подстановка по ключу: 'у меня PRODUCT_ID=123, скажи мне PRODUCT_NAME из справочника'. Подключаешь таблицу-справочник, задаёшь условие (PRODUCT_ID = PRODUCT_ID), выбираешь поля для возврата — и готово. Это стандартное обогащение потока.</p>"}, {"id": 126, "topic": "Informatica PC", "subtopic": "Satellite-таблицы — структура и назначение полей для хранения атрибутов hub и link сущностей", "question": "В satellite-таблице для hub 'Клиент' какой минимальный набор служебных полей обязателен по классическому Data Vault (Linstedt)?", "answers": ["HASH_KEY (ссылка на hub), LOAD_DATE (дата загрузки), RECORD_SOURCE (источник), HASH_DIFF (хэш атрибутов) и SURROGATE_KEY (суррогатный ключ satellite) — обязательный первичный ключ таблицы по стандарту Линстедта", "HASH_KEY (ссылка на hub), LOAD_DATE (дата загрузки), RECORD_SOURCE (источник), HASH_DIFF (хэш атрибутов для выявления изменений).", "HASH_KEY (ссылка на hub), LOAD_DATE (дата загрузки), RECORD_SOURCE (источник), END_DATE (дата окончания действия записи) — для отслеживания актуальности атрибутов", "HASH_KEY, LOAD_DATE, END_DATE"], "correct": 2, "explanation": "🏗️ Минимальный состав Satellite по Линстедту: HASH_KEY (внешний ключ на Hub), LOAD_DATE (когда загрузили), RECORD_SOURCE (откуда), HASH_DIFF (хэш атрибутов для обнаружения изменений). END_DATE / LOAD_END_DATE — полезный, но не обязательный по классическому стандарту атрибут.", "explanation_html": "<p><em class=\"analogy\">🏗️ Минимальный состав Satellite по Линстедту: HASH_KEY (внешний ключ на Hub), LOAD_DATE (когда загрузили), RECORD_SOURCE (откуда), HASH_DIFF (хэш атрибутов для обнаружения изменений)</em>. END_DATE / LOAD_END_DATE — полезный, но не обязательный по классическому стандарту атрибут.</p>"}, {"id": 127, "topic": "Модели данных DWH", "subtopic": "Историчность данных в Data Vault - обеспечение целостности исторических записей satellite-таблиц при изменении структуры модели", "question": "Почему при добавлении новой колонки в satellite-таблицу исторические записи не должны пересчитываться заново?", "answers": ["Потому что каждая запись satellite фиксирует состояние атрибутов на момент загрузки через хэш-дифф — ретроактивное изменение нарушило бы аудитабельность и immutability исторических данных; новая колонка просто остаётся NULL для старых записей, сохраняя целостность временной линии", "Потому что пересчёт хэш-диффов для исторических записей технически невозможен — алгоритм хэширования является односторонней функцией, и восстановить исходные значения атрибутов из существующих хэшей для последующего включения новой колонки в расчёт не представляется возможным без полной переработки ETL-процессов", "Потому что исторические записи уже прошли процедуру дедупликации на этапе загрузки, и повторный пересчёт нарушит логику работы hub-таблиц, которые хранят ссылки на конкретные версии satellite-записей по первичному ключу — изменение структуры satellite автоматически инвалидирует все существующие связи в hub и link таблицах, что приведёт к каскадному разрушению референциальной целостности всей модели", "Потому что согласно методологии Data Vault 2.0 новая колонка должна быть реализована как отдельный satellite-объект с собственным жизненным циклом, и пересчёт старых записей в исходном satellite противоречит принципу разделения rate-of-change — каждый атрибут должен версионироваться независимо, поэтому старый satellite остаётся неизменным, а новый satellite начинает историю с момента добавления колонки 12. Satellite-таблицы Data Vault - разделение атрибутов по скорости изменения (rate of change) при реструктуризации существующей модели Почему разделение атрибутов по скорости изменения на отдельные сателлиты снижает нагрузку на DWH при загрузке?"], "correct": 0, "explanation": "📚 Data Vault 2.0: если атрибут меняется с другой скоростью — создай новый Satellite. Не ломай историю старого. Старый Satellite продолжает жить со своей историей, новый начинает с момента добавления. Исторические записи старого — неизменны, как архивные документы.", "explanation_html": "<p><em class=\"analogy\">📚 <strong>Data Vault</strong> 2.0: если атрибут меняется с другой скоростью — создай новый <strong>Satellite</strong></em>. Не ломай историю старого. Старый <strong>Satellite</strong> продолжает жить со своей историей, новый начинает с момента добавления. Исторические записи старого — неизменны, как архивные документы.</p>"}, {"id": 128, "topic": "Informatica PC", "subtopic": "Record Source в Data Vault - назначение поля, форматы значений и правила заполнения по стандарту команды", "question": "Почему поле Record Source в Data Vault заполняется на уровне загрузки, а не вычисляется динамически при каждом запросе?", "answers": ["Поле заполняется при загрузке для того, чтобы система могла автоматически дедуплицировать записи из разных источников и корректно объединять их в единый хаб.", "Чтобы упростить ETL-процессы и избежать необходимости хранить метаданные о маршрутах передачи данных между системами-источниками и хранилищем.", "Чтобы зафиксировать реальный источник данных в момент загрузки и обеспечить воспроизводимый аудит происхождения записи.", "Потому что динамическое вычисление источника при каждом запросе значительно снижает производительность хранилища и увеличивает нагрузку на серверы базы данных. 7. Data Vault vs Star Schema - принципиальные архитектурные различия и обоснование выбора Data Vault для загрузки сырых данных Почему Data Vault намеренно сохраняет дублирующиеся и противоречивые данные из источников без трансформации?"], "correct": 2, "explanation": "🔍 RECORD_SOURCE фиксируется в момент загрузки: 'эта запись пришла из SAP.ORDERS в 14:32'. Если вычислять динамически — можно потерять реальный источник (таблица удалена, ETL изменился). Зафиксированный источник = аудитная цепочка: всегда можно проследить происхождение записи.", "explanation_html": "<p><em class=\"analogy\">🔍 RECORD_SOURCE фиксируется в момент загрузки: 'эта запись пришла из SAP.ORDERS в 14:32'</em>. Если вычислять динамически — можно потерять реальный источник (таблица удалена, ETL изменился). Зафиксированный источник = аудитная цепочка: всегда можно проследить происхождение записи.</p>"}, {"id": 129, "topic": "Informatica PC", "subtopic": "Link-таблицы Data Vault - проектирование same-as link и иерархических link для моделирования нетривиальных доменных связей", "question": "В системе CRM один клиент может иметь несколько дублирующих записей из разных источников — какой тип Link-таблицы Data Vault следует использовать для моделирования этой связи?", "answers": ["Дубли устраняются на уровне Hub через добавление атрибута приоритета источника в Satellite, Link здесь не нужен.", "Нужно создать отдельный Hub для каждого источника и соединить их стандартным Link, сохраняя бизнес-ключи раздельно.", "Hierarchical Link — он связывает записи одного Hub в иерархию, что позволяет группировать дубли клиентов по уровням мастер-записи.", "Same-As Link (SAL) — специальный тип Link, связывающий хабы одного типа между собой для обозначения эквивалентности/дублирования бизнес-ключей разных источников без изменения Hub-таблиц. 9. Business Key в Data Vault - определение, выбор и корректное заполнение в hub-таблицах Почему Business Key в hub-таблице должен храниться в исходном, неизменённом виде?"], "correct": 3, "explanation": "👥 SAL (Same-As Link) для дублей CRM-клиентов: CRM говорит 'клиент 101', 'клиент 102' — разные записи для одного человека. SAL фиксирует: '101 ≡ 102'. Так исходные ключи сохраняются, а master-data management решает, кто 'главный' через SAL-связь.", "explanation_html": "<p>👥 SAL (Same-As Link) для дублей CRM-клиентов: CRM говорит 'клиент 101', 'клиент 102' — разные записи для одного человека. SAL фиксирует: '101 ≡ 102'. Так исходные ключи сохраняются, а master-data management решает, кто 'главный' через SAL-связь.</p>"}, {"id": 130, "topic": "Informatica PC", "subtopic": "Hub-таблицы Data Vault — определение business key и проектирование surrogate key для новых бизнес-доменов", "question": "В новом бизнес-домене 'Контрагенты' источник поставляет записи с составным натуральным ключом (ИНН + КПП). Как правильно определить business key для Hub-таблицы в Data Vault?", "answers": ["Составной натуральный ключ (ИНН + КПП) нужно хранить в Hub как два отдельных поля без конкатенации — это сохраняет атомарность данных. Surrogate key должен быть целочисленным суррогатом, генерируемым базой данных через IDENTITY/SEQUENCE, так как хэширование создаёт риски коллизий и замедляет джойны.", "Хранить ИНН+КПП как есть в Satellite.", "Конкатенировать ИНН и КПП в единый business key (например, через разделитель), либо создать отдельный Hub для каждого атрибута, если они несут самостоятельный бизнес-смысл. Surrogate key генерируется как хэш (MD5/SHA) от полученного business key.", "Использовать только ИНН как основной business key, поскольку КПП является производным атрибутом и относится к Satellite-таблице. Surrogate key генерируется как автоинкрементный sequence, что обеспечивает лучшую производительность по сравнению с хэш-функциями при больших объёмах данных. 12. Surrogate key в Data Vault — принципы генерации и применения хэш-ключей в hub и link таблицах Почему в Data Vault хэш-ключи предпочтительнее числовых sequence-генерируемых суррогатных ключей для hub и link таблиц?"], "correct": 2, "explanation": "🔑 ИНН+КПП — составной бизнес-ключ: один без другого не уникален (ИНН у всех филиалов одинаковый, КПП различается). Конкатенируй через разделитель: '123456789~КПП001'. Хэш от этой строки = суррогатный ключ Hub. Разделитель критичен для избежания ложных коллизий.", "explanation_html": "<p><em class=\"analogy\">🔑 ИНН+КПП — составной бизнес-ключ: один без другого не уникален (ИНН у всех филиалов одинаковый, КПП различается)</em>. Конкатенируй через разделитель: '123456789~КПП001'. Хэш от этой строки = суррогатный ключ Hub. Разделитель критичен для избежания ложных коллизий.</p>"}, {"id": 131, "topic": "Informatica PC", "subtopic": "Hub-таблицы Data Vault - структура, обязательные поля и правила создания по шаблону", "question": "Почему в Hub-таблице хранится только бизнес-ключ, но не атрибуты сущности?", "answers": ["Чтобы обеспечить неизменяемость Hub и разделить ответственность: атрибуты хранятся в Satellite-таблицах, что позволяет независимо отслеживать их изменения во времени, не затрагивая ядро модели.", "Чтобы сократить размер таблицы.", "Атрибуты не хранятся в Hub, так как они относятся к Link-таблицам, которые специально созданы для описания свойств сущностей и их взаимосвязей — это позволяет централизованно управлять изменениями и упрощает построение витрин данных.", "Потому что Hub-таблица оптимизирована для быстрой загрузки: хранение только ключей уменьшает объём данных и снижает нагрузку на ETL-процессы, а атрибуты намеренно дублируются во всех связанных таблицах для ускорения запросов. 15. Satellite-таблицы — структура и назначение полей для хранения атрибутов hub и link сущностей Почему satellite-таблица содержит технический атрибут load_end_date, и что означает NULL в этом поле?"], "correct": 0, "explanation": "📦 Hub — только 'паспорт' (ключ + метаданные). Атрибуты (имя, адрес, статус) — в Satellite. Зачем? Атрибуты меняются, и каждое изменение создаёт новую версию в Satellite. Hub остаётся неизменным — единая точка идентификации сущности на весь срок жизни хранилища.", "explanation_html": "<p><em class=\"analogy\">📦 Hub — только 'паспорт' (ключ + метаданные)</em>. Атрибуты (имя, адрес, статус) — в Satellite. Зачем? Атрибуты меняются, и каждое изменение создаёт новую версию в Satellite. Hub остаётся неизменным — единая точка идентификации сущности на весь срок жизни хранилища.</p>"}, {"id": 132, "topic": "Informatica PC", "subtopic": "Load Date в Data Vault - назначение поля, правила заполнения и типичные ошибки при реализации", "question": "В хаб HUB_CUSTOMER поле LOAD_DATE заполнено датой повторной загрузки уже существующей записи — это правильно?", "answers": ["Нет, но только если запись не изменилась — если же бизнес-ключ пришёл с новыми атрибутами, LOAD_DATE в хабе обновляется.", "Да, при повторной загрузке LOAD_DATE нужно обновлять, иначе поле теряет смысл: Data Vault требует, чтобы дата всегда соответствовала последнему времени обработки записи в пайплайне.", "Нет. LOAD_DATE фиксируется один раз при первой вставке записи и больше не обновляется — это неизменяемая техническая метка времени загрузки.", "Да, это правильно — LOAD_DATE всегда обновляется при каждой загрузке, чтобы отражать актуальную дату последнего появления записи в источнике. 17. Соглашения об именовании объектов Data Vault - применение принятых naming conventions при создании и изменении таблиц Почему в Data Vault к именам хабов принято добавлять префикс HUB_?"], "correct": 2, "explanation": "⛔ LOAD_DATE в Hub = дата ПЕРВОГО появления business key в DWH. Hub — append-only: записи никогда не обновляются. Если бизнес-ключ пришёл снова, он уже есть в Hub и его туда не вставляют второй раз. LOAD_DATE = момент первичного появления, и он никогда не меняется.", "explanation_html": "<p><em class=\"analogy\">⛔ LOAD_DATE в Hub = дата ПЕРВОГО появления business key в DWH</em>. Hub — append-only: записи никогда не обновляются. Если бизнес-ключ пришёл снова, он уже есть в Hub и его туда не вставляют второй раз. LOAD_DATE = момент первичного появления, и он никогда не меняется.</p>"}, {"id": 133, "topic": "Informatica PC", "subtopic": "Соглашения об именовании объектов Data Vault - применение принятых naming conventions при создании и изменении таблиц", "question": "Почему в Data Vault к именам хабов принято добавлять префикс HUB_?", "answers": ["Префикс позволяет сразу определить тип объекта (Hub, Link, Satellite) по имени таблицы, без необходимости изучать её структуру — это ускоряет навигацию и снижает ошибки при разработке.", "Префикс HUB_ добавляется исключительно по техническим причинам — реляционные СУБД не позволяют создавать таблицы с одинаковыми именами, и префикс предотвращает конфликты между хабами, линками и сателлитами, хранящими данные об одной сущности.", "Префикс HUB_ необходим для корректной работы ETL-инструментов: большинство современных платформ автоматической загрузки данных, таких как WhereScape или Matillion, требуют строгого соответствия именования для распознавания типов объектов.", "Префикс HUB_ указывает на то, что таблица содержит исторические данные бизнес-ключей и была загружена из основного источника системы, что позволяет аналитикам быстро определить приоритетность и достоверность хранимой в ней информации. 18. Историчность данных в satellite — использование load date и load end date для отслеживания изменений атрибутов во времени В satellite таблице атрибут изменился 3 раза. Как корректно закрыть предыдущую версию записи при использовании load_end_date?"], "correct": 0, "explanation": "🏷️ HUB_, LNK_, SAT_ — как цветные ярлыки на папках. Открываешь каталог таблиц: HUB_CUSTOMER, HUB_ORDER, LNK_CUSTOMER_ORDER, SAT_CUSTOMER_DETAILS — сразу ясна роль каждой таблицы без чтения её структуры. Это сокращает время ориентации в сложной схеме.", "explanation_html": "<p><em class=\"analogy\">🏷️ HUB_, LNK_, SAT_ — как цветные ярлыки на папках</em>. Открываешь каталог таблиц: HUB_CUSTOMER, HUB_ORDER, LNK_CUSTOMER_ORDER, SAT_CUSTOMER_DETAILS — сразу ясна роль каждой таблицы без чтения её структуры. Это сокращает время ориентации в сложной схеме.</p>"}, {"id": 134, "topic": "Oracle PL/SQL", "subtopic": "Оптимизация PL/SQL-кода — выявление и устранение узких мест: минимизация context switch, использование BULK-операций, оптимизация циклов обработки данных", "question": "Почему переключение контекста между PL/SQL и SQL движками снижает производительность при построчной обработке данных?", "answers": ["PL/SQL и SQL движки используют разные области памяти (PGA и SGA), и при каждом переключении данные копируются между ними, что создаёт избыточный расход памяти, а не дополнительные вызовы.", "Переключение контекста замедляет работу из-за блокировки таблиц: каждый SQL-запрос в цикле удерживает row-level lock дольше, чем пакетная операция, создавая конкуренцию за ресурсы.", "Каждый переход между движками требует дополнительных системных вызовов и накладных расходов. При построчной обработке в цикле таких переключений тысячи, тогда как BULK-операции выполняют один переход для всей коллекции, многократно сокращая суммарные издержки.", "Проблема не в самих переключениях, а в том, что построчный цикл мешает оптимизатору построить эффективный план выполнения — BULK работает быстрее именно благодаря единому explain plan для всей коллекции. 5. Последовательности (Sequence) — создание и применение sequence для генерации суррогатных ключей и технических идентификаторов в объектах Data Vault В Data Vault для Hub-таблицы используется sequence с CACHE 1000. При сбое базы данных в mid-load обнаружены gaps в суррогатных ключах. Как правильно настроить sequence, чтобы минимизировать gaps, сохранив производительность?"], "correct": 2, "explanation": "🔌 PL/SQL и SQL — два разных движка. Каждый переход между ними = накладные расходы (как переключение передач). В цикле из 100 000 строк = 100 000 переключений. BULK операции = одно переключение для всего массива. Разница в скорости — значительная.", "explanation_html": "<p><em class=\"analogy\">🔌 PL/SQL и SQL — два разных движка</em>. Каждый переход между ними = накладные расходы (как переключение передач). В цикле из 100 000 строк = 100 000 переключений. BULK операции = одно переключение для всего массива. Разница в скорости — значительная.</p>"}, {"id": 135, "topic": "Oracle PL/SQL", "subtopic": "Курсоры PL/SQL - использование явных курсоров, курсорных переменных и атрибутов курсора для построчной и пакетной обработки данных в ETL-процедурах", "question": "Почему использование BULK COLLECT с LIMIT предпочтительнее полного BULK COLLECT без ограничений в ETL-процедурах при обработке больших объёмов данных?", "answers": ["BULK COLLECT без LIMIT работает быстрее, так как использует один системный вызов, тогда как LIMIT создаёт дополнительные round-trips к базе данных, увеличивая нагрузку на сеть и снижая общую производительность ETL-процесса.", "LIMIT нужен только для курсорных переменных REF CURSOR — обычный BULK COLLECT автоматически ограничивает выборку размером SGA, поэтому переполнение памяти невозможно.", "BULK COLLECT с LIMIT предпочтительнее, потому что Oracle не может оптимизировать полную выборку — без LIMIT отключается механизм array fetching и данные читаются построчно.", "BULK COLLECT без LIMIT загружает все строки в память сразу, что может вызвать переполнение PGA. LIMIT контролирует размер порции, обеспечивая баланс между количеством обращений к БД и потреблением памяти. 10. Пакеты PL/SQL - структура PACKAGE и PACKAGE BODY, группировка связанных процедур и функций одного ETL-потока по готовому образцу Почему в ETL-потоке процедуры загрузки хабов, линков и сателлитов объединяют в один PL/SQL-пакет?"], "correct": 3, "explanation": "🧃 BULK COLLECT без LIMIT = выпить всё ведро разом (переполнение памяти при больших объёмах). BULK COLLECT LIMIT 1000 = выпивать стакан за стаканом: контролируемо, память не взрывается. Баланс: меньше обращений к БД чем без BULK, меньше памяти чем без LIMIT.", "explanation_html": "<p><em class=\"analogy\">🧃 <strong>BULK COLLECT</strong> без LIMIT = выпить всё ведро разом (переполнение памяти при больших объёмах)</em>. <strong>BULK COLLECT</strong> LIMIT 1000 = выпивать стакан за стаканом: контролируемо, память не взрывается. Баланс: меньше обращений к БД чем без BULK, меньше памяти чем без LIMIT.</p>"}, {"id": 136, "topic": "Oracle PL/SQL", "subtopic": "Пакеты PL/SQL - структура PACKAGE и PACKAGE BODY, группировка связанных процедур и функций одного ETL-потока по готовому образцу", "question": "Почему в ETL-потоке процедуры загрузки хабов, линков и сателлитов объединяют в один PL/SQL-пакет?", "answers": ["Чтобы скрыть логику от других схем — пакет шифрует код.", "Потому что пакет создаёт отдельную транзакционную границу для каждого ETL-потока: все процедуры внутри него выполняются в одной транзакции, что гарантирует целостность данных между хабами, линками и сателлитами без явного управления COMMIT и ROLLBACK.", "Чтобы сгруппировать связанную логику одного потока в единый модуль: упростить поддержку, управление зависимостями и повторное использование общих вспомогательных процедур внутри пакета.", "Потому что Oracle автоматически оптимизирует выполнение процедур внутри пакета, запуская их параллельно, что ускоряет загрузку хабов, линков и сателлитов по сравнению со standalone-процедурами. 11. Курсоры PL/SQL - явные курсоры и курсорные FOR-циклы для построчной обработки данных при реализации несложных трансформаций Почему курсорный FOR-цикл предпочтительнее явного курсора с OPEN/FETCH/CLOSE?"], "correct": 2, "explanation": "📦 Пакет = библиотека с книгами по одной теме. Все процедуры загрузки одного ETL-потока в одном пакете: общие типы, вспомогательные функции, единая точка входа. Поддерживать и обновлять проще, чем 10 отдельных standalone-процедур разбросанных по схеме.", "explanation_html": "<p><em class=\"analogy\">📦 Пакет = библиотека с книгами по одной теме</em>. Все процедуры загрузки одного ETL-потока в одном пакете: общие типы, вспомогательные функции, единая точка входа. Поддерживать и обновлять проще, чем 10 отдельных standalone-процедур разбросанных по схеме.</p>"}, {"id": 137, "topic": "Oracle PL/SQL", "subtopic": "Функции PL/SQL - создание детерминированных и недетерминированных функций для вычисления хэш-ключей хабов и линков Data Vault", "question": "Какой атрибут функции PL/SQL необходимо указать при вычислении хэш-ключа хаба, чтобы оптимизатор Oracle мог устранять повторные вызовы для одинаковых входных значений в рамках одного SQL-запроса?", "answers": ["DETERMINISTIC — подсказка оптимизатору, что функция возвращает одинаковый результат для одинаковых аргументов, позволяя устранять повторные вызовы внутри одного SQL-запроса.", "NOCOPY — указывает оптимизатору передавать параметры по ссылке, избегая копирования и повторных вычислений хэш-значений при одинаковых входных данных.", "PARALLEL_ENABLE — позволяет оптимизатору распараллелить вызовы функции и устранить дублирующиеся вычисления хэша в параллельных потоках.", "RESULT_CACHE — кэширует результаты между сессиями, что автоматически устраняет повторные вызовы для одинаковых аргументов внутри запроса. 15. Коллекции и пользовательские типы PL/SQL - объявление TYPE как таблицы или записи для пакетной обработки строк в процессах загрузки DWH Почему при пакетной загрузке данных в DWH используют TYPE как таблицу (nested table или varray), а не построчную обработку через курсор?"], "correct": 0, "explanation": "🗓️ DETERMINISTIC говорит оптимизатору: 'для одинаковых входных данных результат всегда одинаков'. В рамках одного SQL-запроса Oracle может вызвать функцию один раз для повторяющегося значения и переиспользовать результат. RESULT_CACHE — кэш между сессиями (сильнее, но другое назначение).", "explanation_html": "<p><em class=\"analogy\">🗓️ <strong>DETERMINISTIC</strong> говорит оптимизатору: 'для одинаковых входных данных результат всегда одинаков'</em>. В рамках одного SQL-запроса Oracle может вызвать функцию один раз для повторяющегося значения и переиспользовать результат. <strong>RESULT_CACHE</strong> — кэш между сессиями (сильнее, но другое назначение).</p>"}, {"id": 138, "topic": "Oracle PL/SQL", "subtopic": "Обработка исключений PL/SQL - использование стандартных и пользовательских исключений (EXCEPTION, RAISE, SQLCODE, SQLERRM) для логирования ошибок в ETL-блоках", "question": "В ETL-блоке PL/SQL нужно поймать любую ошибку и записать в лог-таблицу код и текст ошибки — какие функции использовать внутри секции EXCEPTION?", "answers": ["SQLCODE возвращает числовой код ошибки, SQLERRM — её текстовое описание. Их значения вставляются в лог-таблицу через INSERT в блоке WHEN OTHERS THEN.", "SQLCODE и SQLERRM доступны только в блоке WHEN SPECIFIC_ERROR, для WHEN OTHERS нужно использовать DBMS_UTILITY.FORMAT_ERROR_STACK.", "SQLCODE возвращает текст ошибки, SQLERRM — код. Вызывать их нужно до секции EXCEPTION, иначе значения будут недоступны.", "SQLERRM возвращает числовой код ошибки, SQLCODE — текстовое описание. Их вставляют в лог через INSERT в блоке WHEN OTHERS THEN. 17. Хранимые процедуры PL/SQL — проектирование и реализация сложных процедур для загрузки данных в слои Data Vault (Hub, Link, Satellite) При загрузке данных в Hub таблицу Data Vault через PL/SQL процедуру необходимо избежать дублирования бизнес-ключей при параллельном запуске нескольких потоков — какой механизм Oracle следует применить?"], "correct": 0, "explanation": "🔎 SQLCODE = -1 (числовой код Oracle). SQLERRM = 'ORA-00001: unique constraint violated' (текстовое описание). Вместе дают полную картину: что за ошибка (код) и что именно произошло (текст). В лог-таблицу пишешь оба для полноценной диагностики.", "explanation_html": "<p><em class=\"analogy\">🔎 SQLCODE = -1 (числовой код Oracle)</em>. SQLERRM = 'ORA-00001: unique constraint violated' (текстовое описание). Вместе дают полную картину: что за ошибка (код) и что именно произошло (текст). В лог-таблицу пишешь оба для полноценной диагностики.</p>"}, {"id": 139, "topic": "Oracle PL/SQL", "subtopic": "Хранимые процедуры PL/SQL - разработка процедур загрузки данных в слои Data Vault с обработкой входных параметров и возвратом статуса выполнения", "question": "Почему в процедурах загрузки Data Vault рекомендуется использовать параметр OUT для возврата статуса вместо исключений?", "answers": ["OUT-параметр позволяет вернуть статус выполнения вызывающему процессу без прерывания цепочки ETL, тогда как необработанное исключение полностью останавливает выполнение пакета и затрудняет частичный откат или логирование ошибок на уровне отдельного слоя.", "OUT-параметр работает быстрее исключений, так как не требует обращения к системным таблицам Oracle для записи ошибки, что критично при массовой загрузке в хабы и сателлиты Data Vault.", "OUT-параметр позволяет избежать блокировок таблиц аудита, поскольку исключение автоматически инициирует ROLLBACK, который снимает все блокировки и делает невозможным сохранение статуса загрузки в лог-таблицу.", "Исключения предпочтительнее в Data Vault, но OUT-параметр используется для совместимости со старыми ETL-инструментами, которые не умеют перехватывать Oracle-исключения через JDBC-драйвер."], "correct": 0, "explanation": "🚂 Исключение останавливает весь поезд. OUT-параметр — это флажок машиниста: 'на этом участке была проблема, но едем дальше'. Informatica (вызывающий процесс) читает статус из OUT-параметра и решает: продолжить ли загрузку или выполнить компенсирующие действия. ETL-цепочка не прерывается.", "explanation_html": "<p><em class=\"analogy\">🚂 Исключение останавливает весь поезд</em>. OUT-параметр — это флажок машиниста: 'на этом участке была проблема, но едем дальше'. Informatica (вызывающий процесс) читает статус из OUT-параметра и решает: продолжить ли загрузку или выполнить компенсирующие действия. ETL-цепочка не прерывается.</p>"}, {"id": 140, "topic": "Informatica PC", "subtopic": "Трансформация Joiner — объединение разнородных источников и последующая фильтрация данных через Filter", "question": "Почему в трансформации Joiner одним из источников рекомендуется назначать мастер-источник с меньшим объёмом данных?", "answers": ["Меньший источник назначается мастером, чтобы Informatica автоматически применяла к нему индексирование на диске, что сокращает время записи временных файлов и уменьшает использование дискового пространства.", "Меньший источник назначается мастером потому, что Joiner обрабатывает детальный источник первым и построчно сканирует его, а мастер используется лишь для финальной проверки условия соединения на последнем этапе.", "Источник с меньшим объёмом данных становится мастером, поскольку именно к нему применяются условия фильтрации до выполнения джойна, что позволяет сократить итоговое количество строк в результирующем наборе данных.", "Меньший источник как мастер загружается в память целиком, что ускоряет поиск совпадений и снижает нагрузку на кэш при объединении."], "correct": 3, "explanation": "📖 Joiner кэширует Master в памяти как словарь. Маленькая таблица (10 тыс.) = маленький словарь, быстро помещается в память. Большая таблица Detail (1 млн) читается потоком и ищет слова в словаре. Если перепутать — словарь в 1 млн записей = медленно и много памяти.", "explanation_html": "<p><em class=\"analogy\">📖 <strong>Joiner</strong> кэширует <strong>Master</strong> в памяти как словарь</em>. Маленькая таблица (10 тыс.) = маленький словарь, быстро помещается в память. Большая таблица Detail (1 млн) читается потоком и ищет слова в словаре. Если перепутать — словарь в 1 млн записей = медленно и много памяти.</p>"}, {"id": 141, "topic": "Informatica PC", "subtopic": "Трансформация Lookup в Informatica PC — режимы кэширования (статический, динамический) и их применение для определения новых и изменённых записей при загрузке Satellite", "question": "При загрузке Satellite в Data Vault нужно отделить новые записи от изменённых — какой режим кэширования Lookup следует использовать и почему?", "answers": ["Dynamic Cache используется только для Hub-таблиц, где важна уникальность бизнес-ключа. Для Satellite достаточно Static Cache: изменения определяются сравнением хэша загружаемой записи с последней версией в таблице-приёмнике.", "Static Cache: кэш загружается один раз, но не позволяет корректно разделить новые и изменённые записи внутри батча. Для Satellite нужен Dynamic Cache, обновляющий состояние на лету. Aggregator при Static Cache не решает проблему дублей, а лишь маскирует её.", "Dynamic Cache не нужен: Lookup в режиме No Cache выполняет прямой SQL-запрос к Satellite при каждой строке, возвращая актуальные данные. Это точнее кэша, так как исключает рассинхронизацию при параллельных загрузках.", "Dynamic Cache: Lookup сравнивает входящую запись с кэшем; если ключ отсутствует — запись новая (INSERT), если атрибуты изменились — изменённая (UPDATE). Кэш обновляется на лету, что позволяет корректно обрабатывать дубли в одном батче. 5. Трансформация Lookup в Informatica PowerCenter — обогащение входящего потока данных справочными значениями по ключевому полю В маппинге Informatica PowerCenter нужно обогатить поток заказов названием продукта из таблицы-справочника по PRODUCT_ID — какую трансформацию следует использовать?"], "correct": 3, "explanation": "🔍 Static Cache = фотография: снимок данных на момент старта маппинга. Dynamic Cache = живая база данных: обновляется в процессе. При загрузке Satellite: новая запись батча сначала не в статическом кэше → будет определена как 'новая', хотя только что была добавлена той же сессией. Dynamic решает это.", "explanation_html": "<p><em class=\"analogy\">🔍 <strong>Static Cache</strong> = фотография: снимок данных на момент старта маппинга</em>. <strong>Dynamic Cache</strong> = живая база данных: обновляется в процессе. При загрузке Satellite: новая запись батча сначала не в статическом кэше → будет определена как 'новая', хотя только что была добавлена той же сессией. Dynamic решает это.</p>"}, {"id": 142, "topic": "SQL", "subtopic": "CTE — пошаговая трансформация данных из staging-слоя в целевую таблицу с проверкой уникальности ключей", "question": "В staging-слое есть дубли по бизнес-ключу customer_id. Как с помощью CTE выбрать только одну запись на ключ перед загрузкой в Hub таблицу Data Vault?", "answers": ["Использовать CTE с GROUP BY customer_id и MAX(load_date) — это стандартный способ дедупликации в staging перед загрузкой в Hub, ROW_NUMBER() избыточен.", "Использовать CTE с ROW_NUMBER() PARTITION BY customer_id ORDER BY load_date ASC, затем WHERE rn = 1 — выбирается самая первая запись, что соответствует принципам Data Vault.", "Использовать CTE с DISTINCT по customer_id — это автоматически уберёт дубли и гарантирует уникальность ключа перед INSERT в Hub без дополнительной фильтрации.", "Использовать CTE с ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY load_date DESC), затем во внешнем SELECT отфильтровать WHERE rn = 1 — это гарантирует уникальность ключа перед INSERT в Hub."], "correct": 3, "explanation": "🥇 ROW_NUMBER() OVER(PARTITION BY customer_id ORDER BY load_date DESC) = 1 берёт последнюю по времени запись для каждого дублирующегося ключа. DISTINCT не даст контроля над тем, КАКУЮ из дублей выбрать. ROW_NUMBER + фильтр = детерминированный выбор нужной записи.", "explanation_html": "<p><em class=\"analogy\">🥇 <strong>ROW_NUMBER</strong>() OVER(<strong>PARTITION BY</strong> customer_id <strong>ORDER BY</strong> load_date DESC) = 1 берёт последнюю по времени запись для каждого дублирующегося ключа</em>. DISTINCT не даст контроля над тем, КАКУЮ из дублей выбрать. <strong>ROW_NUMBER</strong> + фильтр = детерминированный выбор нужной записи.</p>"}, {"id": 143, "topic": "SQL", "subtopic": "Анализ плана выполнения запроса — выявление узких мест через EXPLAIN/EXPLAIN ANALYZE и устранение избыточного полного сканирования таблиц", "question": "Назовите основные причины расхождения estimated rows и actual rows в EXPLAIN ANALYZE.", "answers": ["Ошибки в написании запроса и использование устаревших функций агрегации", "Неверный порядок JOIN операций и отсутствие индексов на ключевых столбцах", "Устаревший кэш буферного пула и неоптимальный cost_factor планировщика", "Устаревшая статистика, корреляция столбцов, skew данных и выборочный характер ANALYZE."], "correct": 3, "explanation": "📊 estimated rows в EXPLAIN ANALYZE — прогноз оптимизатора на основе статистики. actual rows — реальность при выполнении. Расходятся из-за: устаревшей статистики (давно не делали ANALYZE), неравномерного распределения данных (skew), корреляции столбцов (оптимизатор не учитывает совместную избирательность).", "explanation_html": "<p><em class=\"analogy\">📊 estimated rows в <strong>EXPLAIN</strong> ANALYZE — прогноз оптимизатора на основе статистики</em>. actual rows — реальность при выполнении. Расходятся из-за: устаревшей статистики (давно не делали ANALYZE), неравномерного распределения данных (skew), корреляции столбцов (оптимизатор не учитывает совместную избирательность).</p>"}, {"id": 144, "topic": "SQL", "subtopic": "Многоуровневые JOIN — порядок соединений 5+ таблиц, типы JOIN (HASH/MERGE/NESTED LOOP) в плане выполнения и их оптимизация для запросов к Data Vault", "question": "Почему в Data Vault запросах с 5+ таблицами оптимизатор предпочитает HASH JOIN вместо NESTED LOOP?", "answers": ["HASH JOIN предпочитается потому, что Data Vault использует натуральные ключи вместо суррогатных, а NESTED LOOP не поддерживает соединение по хэшированным бизнес-ключам хабов. Оптимизатор автоматически переключается на HASH JOIN при обнаружении SHA-256 хэшей в условиях JOIN.", "HASH JOIN выбирается, так как при 5+ таблицах NESTED LOOP требует больше памяти для хранения промежуточных результатов, а хэш-таблица занимает меньше оперативной памяти благодаря компрессии суррогатных ключей.", "HASH JOIN эффективнее при больших объёмах данных: строит хэш-таблицу меньшего набора и сканирует большой один раз, тогда как NESTED LOOP даёт экспоненциальный рост операций при каждом добавлении таблицы без селективных индексов на суррогатных ключах хабов и линков.", "NESTED LOOP быстрее при большом количестве таблиц, но оптимизатор выбирает HASH JOIN из-за особенностей хранения Data Vault — хабы и линки физически разнесены по разным файловым группам, что делает случайный доступ NESTED LOOP невозможным без полного сканирования. 6. Партиционирование — выбор партиционного ключа и его явное использование в условиях WHERE для снижения объёма сканирования Таблица ORDERS партиционирована по полю ORDER_DATE (по месяцам). Аналитик написал запрос: SELECT * FROM ORDERS WHERE YEAR(ORDER_DATE) = 2023. Почему этот запрос неэффективен и как его исправить?"], "correct": 2, "explanation": "⚡ NESTED LOOP: для каждой строки из Hub ищем строки в SAT — O(N*M). При 5+ таблицах = экспоненциальный рост. HASH JOIN: строим хэш-таблицу меньшего набора, сканируем большой один раз — O(N+M). При больших объёмах Data Vault с хэш-ключами HASH JOIN всегда эффективнее.", "explanation_html": "<p><em class=\"analogy\">⚡ NESTED LOOP: для каждой строки из Hub ищем строки в SAT — O(N*M)</em>. При 5+ таблицах = экспоненциальный рост. HASH <strong>JOIN</strong>: строим хэш-таблицу меньшего набора, сканируем большой один раз — O(N+M). При больших объёмах Data Vault с хэш-ключами HASH <strong>JOIN</strong> всегда эффективнее.</p>"}, {"id": 145, "topic": "SQL", "subtopic": "Партиционирование — выбор партиционного ключа и его явное использование в условиях WHERE для снижения объёма сканирования", "question": "Таблица ORDERS партиционирована по полю ORDER_DATE (по месяцам). Аналитик написал запрос: SELECT * FROM ORDERS WHERE YEAR(ORDER_DATE) = 2023. Почему этот запрос неэффективен и как его исправить?", "answers": ["Запрос неэффективен, потому что функция YEAR() не поддерживается в большинстве SQL-диалектов при работе с партиционированными таблицами. Исправление: следует использовать EXTRACT(YEAR FROM ORDER_DATE) = 2023 — это стандартный SQL-синтаксис, который автоматически активирует partition pruning и заставит оптимизатор читать только партиции за 2023 год.", "Проблема в том, что SELECT * возвращает все столбцы, создавая избыточную нагрузку на I/O независимо от партиционирования. Оптимизатор не может использовать partition pruning при полном сканировании столбцов. Исправление: нужно явно перечислить только нужные столбцы в SELECT и добавить индекс на ORDER_DATE для ускорения фильтрации внутри каждой партиции.", "Запрос неэффективен из-за того, что условие YEAR(ORDER_DATE) = 2023 корректно активирует partition pruning, однако БД всё равно вынуждена сканировать все 12 месячных партиций за 2023 год последовательно, а не параллельно. Исправление: добавить хинт /*+ PARALLEL(ORDERS, 12) */ и явно указать конкретные месяцы через PARTITION(orders_2023_01, orders_2023_02, ...) для параллельного чтения нужных партиций.", "Функция YEAR() оборачивает партиционный ключ, что отключает partition pruning — БД сканирует все партиции. Исправление: WHERE ORDER_DATE >= DATE '2023-01-01' AND ORDER_DATE < DATE '2024-01-01' — явный диапазон позволяет оптимизатору считывать только нужные партиции. 7. Партиционирование — выбор партиционного ключа и его явное использование в условиях WHERE для снижения объёма сканирования Почему указание партиционного ключа в условии WHERE снижает объём сканирования данных?"], "correct": 3, "explanation": "📅 YEAR(ORDER_DATE) = 2023 оборачивает партиционный ключ функцией → оптимизатор не может сделать partition pruning (не знает, к каким партициям относится результат функции). Правильно: ORDER_DATE >= DATE '2023-01-01' AND ORDER_DATE < DATE '2024-01-01' — прямое сравнение активирует pruning.", "explanation_html": "<p><em class=\"analogy\">📅 YEAR(ORDER_DATE) = 2023 оборачивает партиционный ключ функцией → оптимизатор не может сделать <strong>partition pruning</strong> (не знает, к каким партициям относится результат функции)</em>. Правильно: ORDER_DATE >= DATE '2023-01-01' AND ORDER_DATE < DATE '2024-01-01' — прямое сравнение активирует pruning.</p>"}, {"id": 146, "topic": "SQL", "subtopic": "Партиционирование — выбор партиционного ключа и его явное использование в условиях WHERE для снижения объёма сканирования", "question": "Почему указание партиционного ключа в условии WHERE снижает объём сканирования данных?", "answers": ["БД автоматически создаёт индекс по партиционному ключу, и оптимизатор использует его для быстрого поиска строк, минуя полное сканирование таблицы.", "Указание партиционного ключа позволяет БД сжать передаваемые данные между узлами кластера, уменьшая сетевой трафик и ускоряя выполнение запроса.", "БД читает только партиции, удовлетворяющие условию, пропуская остальные — это называется partition pruning.", "БД кэширует результаты предыдущих запросов с тем же партиционным ключом и при повторном обращении возвращает данные напрямую из кэша, не обращаясь к диску. 8. Оконные функции RANK и ROW_NUMBER — дедупликация записей и выбор актуальной версии данных при загрузке в сателлиты Data Vault Почему при дедупликации в сателлитах Data Vault используют ROW_NUMBER, а не RANK?"], "correct": 2, "explanation": "🗂️ Partition pruning = 'пропустить шкафы с ненужными документами'. WHERE sale_date BETWEEN '2023-01-01' AND '2023-12-31' → читаются только партиции за 2023 год. Остальные 10 лет данных физически не читаются. При таблицах в сотни ГБ разница = секунды vs минуты.", "explanation_html": "<p><em class=\"analogy\">🗂️ Partition pruning = 'пропустить шкафы с ненужными документами'</em>. <strong>WHERE</strong> sale_date BETWEEN '2023-01-01' AND '2023-12-31' → читаются только партиции за 2023 год. Остальные 10 лет данных физически не читаются. При таблицах в сотни ГБ разница = секунды vs минуты.</p>"}, {"id": 147, "topic": "SQL", "subtopic": "Оконные функции RANK и ROW_NUMBER — дедупликация записей и выбор актуальной версии данных при загрузке в сателлиты Data Vault", "question": "При загрузке в сателлит Data Vault из источника приходят дубли одной записи с одинаковым хеш-ключом и разными таймстемпами — какую оконную функцию и с каким ORDER BY использовать, чтобы оставить только самую актуальную версию?", "answers": ["ROW_NUMBER() OVER (PARTITION BY hash_key ORDER BY load_timestamp DESC) = 1 — оставляем строку с rn=1, это последняя по времени запись.", "ROW_NUMBER() OVER (PARTITION BY hash_key ORDER BY load_timestamp DESC) > 1 — исключаем строку с rn=1, так как она является дублем-источником ошибки, и оставляем все остальные версии для корректной историзации в сателлите Data Vault.", "ROW_NUMBER() OVER (PARTITION BY hash_key ORDER BY load_timestamp ASC) = 1 — сортируем по возрастанию, чтобы взять первую загруженную запись как оригинальную, ведь именно она отражает исходное состояние сателлита при инициальной загрузке.", "RANK() OVER (PARTITION BY hash_key ORDER BY load_timestamp ASC) = 1 — оставляем строку с rank=1, это самая ранняя запись, которая считается «мастер-версией» при первичной загрузке в сателлит Data Vault. 10. CTE и вложенные подзапросы — архитектура многоуровневых WITH-выражений, материализация CTE и влияние на производительность сложных аналитических SELECT В Data Vault ETL-процессе на PostgreSQL 11 CTE используется трижды в одном SELECT: для хаба, сателлита и линка. Как принудительная материализация каждого CTE повлияет на производительность по сравнению с инлайн-подзапросами?"], "correct": 0, "explanation": "🥇 ROW_NUMBER() OVER(PARTITION BY hash_key ORDER BY load_timestamp DESC) = 1 — берём строку с самым поздним timestamp для каждого hash_key. DESC = от новых к старым, rn=1 = самая свежая. Это стандартный способ дедупликации: берём последнюю версию записи.", "explanation_html": "<p><em class=\"analogy\">🥇 <strong>ROW_NUMBER</strong>() OVER(<strong>PARTITION BY</strong> hash_key <strong>ORDER BY</strong> load_timestamp DESC) = 1 — берём строку с самым поздним timestamp для каждого hash_key</em>. DESC = от новых к старым, rn=1 = самая свежая. Это стандартный способ дедупликации: берём последнюю версию записи.</p>"}, {"id": 148, "topic": "SQL", "subtopic": "Агрегатные функции - использование COUNT и SUM для подсчёта транзакций и сумм в разрезе клиентов", "question": "Почему COUNT(*) и COUNT(column_name) могут вернуть разные результаты для одной таблицы?", "answers": ["COUNT(*) и COUNT(column_name) всегда возвращают одинаковый результат, но разница может возникнуть только если в таблице применены фильтры WHERE или условия JOIN", "COUNT(column_name) более точен и считает все строки включая NULL, а COUNT(*) игнорирует строки где хотя бы один столбец содержит NULL-значение", "COUNT(*) считает все строки включая NULL, а COUNT(column_name) игнорирует NULL-значения в указанном столбце", "COUNT(*) считает только строки с уникальными значениями во всех столбцах, тогда как COUNT(column_name) учитывает и дублирующиеся строки таблицы 12. Агрегатные функции - применение AVG, MIN, MAX для расчёта базовых метрик по группам данных Напишите SQL-запрос, который вычисляет среднюю, минимальную и максимальную сумму заказа по каждому региону из таблицы orders (поля: region, order_amount)?"], "correct": 2, "explanation": "📊 SELECT COUNT(*) FROM employees → 1000 (все строки). SELECT COUNT(email) FROM employees → 980 (у 20 сотрудников email = NULL, они не считаются). COUNT(*) = все строки включая NULL. COUNT(column) = только строки где column NOT NULL. Разница = количество NULL в столбце.", "explanation_html": "<p><em class=\"analogy\">📊 SELECT <strong>COUNT</strong>(*) FROM employees → 1000 (все строки)</em>. SELECT <strong>COUNT</strong>(email) FROM employees → 980 (у 20 сотрудников email = <strong>NULL</strong>, они не считаются). <strong>COUNT</strong>(*) = все строки включая <strong>NULL</strong>. <strong>COUNT</strong>(column) = только строки где column NOT <strong>NULL</strong>. Разница = количество <strong>NULL</strong> в столбце.</p>"}, {"id": 149, "topic": "SQL", "subtopic": "JOIN-операции - применение INNER JOIN для соединения таблицы фактов с таблицей измерений при выгрузке данных", "question": "Есть таблица фактов sales_fact (sale_id, customer_hk, amount) и таблица измерений customer_dim (customer_hk, customer_name, city). Напишите INNER JOIN для получения продаж с именами клиентов.", "answers": ["SELECT sf.sale_id, cd.customer_name, sf.amount FROM sales_fact sf INNER JOIN customer_dim cd ON sf.customer_hk = cd.customer_hk;", "SELECT * FROM sales_fact INNER JOIN customer_dim USING (sale_id);", "SELECT sf.sale_id, cd.customer_name, sf.amount FROM sales_fact sf INNER JOIN customer_dim cd ON sf.sale_id = cd.customer_hk ORDER BY sf.sale_id;", "SELECT sf.sale_id, cd.customer_name, sf.amount FROM customer_dim cd INNER JOIN sales_fact sf ON cd.customer_hk = sf.customer_hk WHERE sf.amount > 0; 15. Группировка данных - использование GROUP BY для агрегирования показателей по атрибутам измерений Вам нужно посчитать суммарную выручку по каждому региону из таблицы sales (region, amount). Какой SQL-запрос это реализует?"], "correct": 0, "explanation": "🔗 INNER JOIN по customer_hk связывает факты с измерениями: SELECT sf.sale_id, cd.customer_name, sf.amount FROM sales_fact sf INNER JOIN customer_dim cd ON sf.customer_hk = cd.customer_hk. Алиасы sf и cd делают запрос читаемым, условие ON определяет ключ соединения.", "explanation_html": "<p><em class=\"analogy\">🔗 <strong>INNER <strong>JOIN</strong> по customer_hk связывает факты с измерениями: SELECT sf.sale_id, cd.customer_name, sf.amount FROM sales_fact sf <strong>INNER <strong>JOIN</strong> customer_dim cd ON sf.customer_hk = cd.customer_hk</em>. Алиасы sf и cd делают запрос читаемым, условие ON определяет ключ соединения.</p>"}, {"id": 150, "topic": "SQL", "subtopic": "Оконные функции - понимание конструкции OVER(PARTITION BY ... ORDER BY ...) при работе с данными хранилища", "question": "В таблице хаба DWH нужно получить последнюю по дате загрузки запись для каждого бизнес-ключа — какую оконную функцию использовать?", "answers": ["ROW_NUMBER() OVER(PARTITION BY load_date ORDER BY business_key DESC) — секционируем по дате загрузки, чтобы получить последнюю запись в каждой группе и отбираем rn = 1", "RANK() OVER(PARTITION BY business_key ORDER BY load_date DESC) — отбираем строки где rank = 1, это эквивалентно ROW_NUMBER и даст тот же результат при дублях дат", "MAX(load_date) GROUP BY business_key", "ROW_NUMBER() OVER(PARTITION BY business_key ORDER BY load_date DESC) — отбираем строки где rn = 1 17. Оконные функции — механика выполнения PARTITION BY/ORDER BY, фреймы (ROWS/RANGE) и выбор между оконной функцией и GROUP BY для аналитических расчётов в DWH В DWH-запросе нужно вычислить скользящую сумму продаж за последние 7 календарных дней для каждой строки — какой фрейм использовать, если в данных возможны пропуски дат?"], "correct": 3, "explanation": "🕐 ROW_NUMBER() OVER(PARTITION BY business_key ORDER BY load_date DESC) нумерует записи от новой к старой для каждого бизнес-ключа. rn=1 = самая свежая запись = 'текущая'. Это стандартный паттерн для получения актуальной версии из исторической таблицы.", "explanation_html": "<p>🕐 <strong>ROW_NUMBER</strong>() OVER(<strong>PARTITION BY</strong> business_key <strong>ORDER BY</strong> load_date DESC) нумерует записи от новой к старой для каждого бизнес-ключа. rn=1 = самая свежая запись = 'текущая'. Это стандартный паттерн для получения актуальной версии из исторической таблицы.</p>"}, {"id": 151, "topic": "SQL", "subtopic": "Оконные функции — механика выполнения PARTITION BY/ORDER BY, фреймы (ROWS/RANGE) и выбор между оконной функцией и GROUP BY для аналитических расчётов в DWH", "question": "В DWH-запросе нужно вычислить скользящую сумму продаж за последние 7 календарных дней для каждой строки — какой фрейм использовать, если в данных возможны пропуски дат?", "answers": ["ROWS BETWEEN 7 PRECEDING AND CURRENT ROW корректен при пропусках.", "ROWS BETWEEN 6 PRECEDING AND CURRENT ROW — универсальный способ для скользящего окна в 7 дней, пропуски дат не влияют на результат, так как фрейм считает строки, а не интервалы времени.", "RANGE BETWEEN 7 PRECEDING AND CURRENT ROW — правильный выбор, так как RANGE автоматически учитывает календарные пропуски, а граница должна быть 7, а не 6, чтобы включить текущий день в полный недельный диапазон; INTERVAL здесь избыточен.", "RANGE BETWEEN INTERVAL '6' DAY PRECEDING AND CURRENT ROW — учитывает календарные дни, а не физические строки. ROWS BETWEEN 6 PRECEDING AND CURRENT ROW некорректен при пропусках дат. 18. Оконные функции LAG и LEAD — вычисление разницы между текущим и предыдущим значением показателя в разрезе клиентских счетов Какую оконную функцию и с каким синтаксисом использовать, чтобы вычислить разницу баланса текущего и предыдущего месяца по каждому клиентскому счёту?"], "correct": 1, "explanation": "📅 ROWS BETWEEN 6 PRECEDING AND CURRENT ROW: считает 6 предыдущих строк + текущая = 7 строк физически. Не зависит от дат — считает строки. Если в данных есть пропуски дат (нет данных за понедельник), ROWS всё равно возьмёт ровно 7 строк независимо от того, какие даты они покрывают.", "explanation_html": "<p><em class=\"analogy\">📅 ROWS BETWEEN 6 PRECEDING AND CURRENT ROW: считает 6 предыдущих строк + текущая = 7 строк физически</em>. Не зависит от дат — считает строки. Если в данных есть пропуски дат (нет данных за понедельник), ROWS всё равно возьмёт ровно 7 строк независимо от того, какие даты они покрывают.</p>"}, {"id": 152, "topic": "SQL", "subtopic": "Оконные функции LAG и LEAD — вычисление разницы между текущим и предыдущим значением показателя в разрезе клиентских счетов", "question": "Какую оконную функцию и с каким синтаксисом использовать, чтобы вычислить разницу баланса текущего и предыдущего месяца по каждому клиентскому счёту?", "answers": ["Использовать LAG: balance - LAG(balance) OVER (PARTITION BY account_id ORDER BY month) — даёт разницу с предыдущим значением в разрезе счёта.", "Использовать LAG с группировкой: LAG(balance) OVER (GROUP BY account_id ORDER BY month) — синтаксис PARTITION BY заменяется на GROUP BY внутри оконной функции для корректного разбиения по счетам.", "Использовать LAG без вычитания: LAG(balance, 1, 0) OVER (PARTITION BY account_id ORDER BY month) возвращает готовую разницу баланса с предыдущим месяцем, третий аргумент автоматически рассчитывает дельту.", "Использовать LEAD: balance - LEAD(balance) OVER (PARTITION BY account_id ORDER BY month) — функция LEAD берёт следующее значение, что даёт разницу текущего и следующего месяца, а не предыдущего."], "correct": 0, "explanation": "📉 balance - LAG(balance) OVER(PARTITION BY account_id ORDER BY month) — разница между текущим и предыдущим балансом счёта. LAG берёт значение из предыдущей строки в той же партиции. PARTITION BY account_id = граница между счетами. ORDER BY month = порядок вычисления.", "explanation_html": "<p><em class=\"analogy\">📉 balance - <strong>LAG</strong>(balance) OVER(<strong>PARTITION BY</strong> account_id <strong>ORDER BY</strong> month) — разница между текущим и предыдущим балансом счёта</em>. <strong>LAG</strong> берёт значение из предыдущей строки в той же партиции. <strong>PARTITION BY</strong> account_id = граница между счетами. <strong>ORDER BY</strong> month = порядок вычисления.</p>"}, {"id": 153, "topic": "SQL", "subtopic": "Функции PL/SQL - создание детерминированных и недетерминированных функций для вычисления хэш-ключей хабов и линков Data Vault", "question": "Почему хэш-функции для хабов Data Vault должны быть детерминированными?", "answers": ["Это требование связано с тем, что в Data Vault линки хранят хэши хабов, и если хэш недетерминирован, линк не сможет найти соответствующий хаб в момент JOIN-операции во время аналитических запросов к витринам данных, что приведёт к неполным результатам отчётов.", "Детерминированность хэш-функций нужна исключительно для повышения производительности: Oracle кэширует результаты детерминированных функций в рамках одного запроса, что критично при обработке миллионов бизнес-ключей в хабах.", "Хэш-функции должны быть детерминированными, чтобы гарантировать уникальность хэшей — недетерминированная функция может случайно сгенерировать одинаковый хэш для двух разных бизнес-ключей.", "Один и тот же бизнес-ключ всегда должен давать одинаковый хэш независимо от времени и сессии — иначе один хаб-объект получит разные хэш-ключи при загрузке из разных источников, что сломает целостность связей в Data Vault."], "correct": 3, "explanation": "🔑 Если хэш недетерминирован, один и тот же ключ при разных загрузках даёт разные хэши → одна сущность получает несколько записей в Hub. Link'и тогда ссылаются на разные 'версии' Hub-записи. Детерминированность = один ключ → один хэш → одна Hub-запись → целостность всей модели.", "explanation_html": "<p><em class=\"analogy\">🔑 Если хэш недетерминирован, один и тот же ключ при разных загрузках даёт разные хэши → одна сущность получает несколько записей в Hub</em>. Link'и тогда ссылаются на разные 'версии' Hub-записи. Детерминированность = один ключ → один хэш → одна Hub-запись → целостность всей модели.</p>"}, {"id": 154, "topic": "SQL", "subtopic": "Коллекции и пользовательские типы PL/SQL - объявление TYPE как таблицы или записи для пакетной обработки строк в процессах загрузки DWH", "question": "Вы загружаете 100 000 строк в staging-таблицу DWH. Объявите тип вложенной таблицы записей для BULK COLLECT + FORALL.", "answers": ["TYPE t_rows IS TABLE OF staging_table%ROWTYPE INDEX BY PLS_INTEGER — индексированная таблица лучше для FORALL", "TYPE t_rows IS TABLE OF staging_table%ROWTYPE — вложенная таблица записей, оптимальна для BULK COLLECT + FORALL.", "TYPE t_row IS RECORD — объявляют запись, затем TABLE OF t_row INDEX BY VARCHAR2(50) для пакетной загрузки через BULK COLLEC
