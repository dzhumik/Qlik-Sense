<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWH Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff; --bg2:#f8f9fa; --bg3:#f0f1f3;
  --surface:#ffffff; --surface2:#f8f9fa;
  --border:#e5e7eb; --border2:#d1d5db;
  --text:#111827; --text2:#374151; --text3:#6b7280; --text4:#9ca3af;
  --accent:#111827;
  --correct:#16a34a; --correct-bg:#f0fdf4; --correct-border:#bbf7d0;
  --wrong:#dc2626; --wrong-bg:#fef2f2; --wrong-border:#fecaca;
  --disabled-bg:#f9fafb; --disabled-text:#9ca3af;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --radius:12px; --radius-sm:8px; --radius-xs:6px;
  --tr:150ms ease;
}
[data-theme="dark"] {
  --bg:#0f1117; --bg2:#161b22; --bg3:#1c2130;
  --surface:#161b22; --surface2:#1c2130;
  --border:#30363d; --border2:#3d444d;
  --text:#e6edf3; --text2:#b1bac4; --text3:#8b949e; --text4:#6e7681;
  --correct:#3fb950; --correct-bg:#0d1f12; --correct-border:#26a641;
  --wrong:#f85149; --wrong-bg:#200d0c; --wrong-border:#8e1a18;
  --disabled-bg:#161b22; --disabled-text:#484f58;
  --shadow:0 1px 3px rgba(0,0,0,.3);
  --shadow-lg:0 10px 25px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg2);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
button:focus-visible{box-shadow:0 0 0 3px rgba(0,0,0,.15)}
input{font-family:inherit}
.page{display:none}
.page.active{display:block}

/* HOME */
#page-home{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
#page-home.active{display:flex}
.home-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:560px;padding:40px}
.home-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}
.home-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.4px;text-transform:uppercase}
.theme-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text3);transition:var(--tr);flex-shrink:0}
.theme-btn:hover{background:var(--bg);border-color:var(--border2);color:var(--text)}
.home-title{font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--text);margin-bottom:8px;line-height:1.2}
.home-sub{color:var(--text3);font-size:14px;margin-bottom:24px}
.stats-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.stat-pill{background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--text2);font-family:'JetBrains Mono',monospace}
.stat-pill span{color:var(--text);font-weight:700}
.disc-section{margin-bottom:24px}
.disc-label{font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.disc-chips{display:flex;flex-wrap:wrap;gap:7px}
.disc-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:99px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--text3);background:var(--bg);transition:var(--tr);cursor:pointer;user-select:none}
.disc-chip:hover{border-color:var(--border2);color:var(--text2)}
.disc-chip.active{background:var(--chip-color,#111);border-color:var(--chip-color,#111);color:#fff}
.disc-chip .disc-count{background:rgba(255,255,255,.25);border-radius:99px;padding:1px 7px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700}
.disc-chip:not(.active) .disc-count{background:var(--bg3);color:var(--text4)}
.home-btns{display:flex;gap:10px}
.btn-primary{flex:1;background:var(--text);color:var(--bg);border:1px solid var(--text);border-radius:var(--radius-sm);padding:11px 20px;font-size:14px;font-weight:600;transition:var(--tr)}
.btn-primary:hover{opacity:.85;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 20px;font-size:14px;font-weight:500;transition:var(--tr);white-space:nowrap}
.btn-secondary:hover{border-color:var(--border2);color:var(--text);background:var(--bg2)}

/* QUIZ */
#page-quiz{min-height:100vh;display:none;flex-direction:column;padding:24px 20px 48px}
#page-quiz.active{display:flex}
.quiz-top{max-width:680px;width:100%;margin:0 auto 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.btn-ghost{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 14px;font-size:12px;font-weight:500;color:var(--text3);transition:var(--tr)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text2);background:var(--bg)}
.quiz-meta{font-size:12px;color:var(--text4);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.progress-track{max-width:680px;width:100%;margin:0 auto 24px;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--text);border-radius:99px;transition:width .3s ease}
.q-card{max-width:680px;width:100%;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.q-disc-bar{height:3px;background:var(--disc-color,#111)}
.q-body{padding:28px}
.q-disc-chip{display:inline-flex;align-items:center;border-radius:99px;padding:3px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;border:1px solid transparent}
.q-num{font-size:11px;color:var(--text4);font-family:'JetBrains Mono',monospace;margin-bottom:6px}
.q-text{font-size:16px;font-weight:600;color:var(--text);line-height:1.55;margin-bottom:22px;letter-spacing:-.1px}
.answers-grid{display:grid;gap:8px}
.answer-btn{display:flex;align-items:flex-start;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 16px;font-size:13.5px;font-weight:400;color:var(--text2);text-align:left;line-height:1.5;transition:var(--tr);width:100%}
.answer-btn:hover:not(:disabled){border-color:var(--border2);background:var(--bg);color:var(--text)}
.answer-idx{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text4);min-width:18px;margin-top:2px;flex-shrink:0}
.answer-btn.state-correct{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct)}
.answer-btn.state-correct .answer-idx{color:var(--correct)}
.answer-btn.state-wrong{background:var(--wrong-bg);border-color:var(--wrong-border);color:var(--wrong)}
.answer-btn.state-wrong .answer-idx{color:var(--wrong)}
.answer-btn.state-reveal{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct);opacity:.7}
.answer-btn:disabled{cursor:default}
.answer-btn.state-none:disabled{background:var(--disabled-bg);color:var(--disabled-text);border-color:var(--border)}
.answer-btn.state-none:disabled .answer-idx{color:var(--text4);opacity:.5}
.explanation-box{display:none;margin:16px 28px 0;padding:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);border-left:3px solid var(--disc-color,#111)}
.explanation-box.visible{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.exp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text4);margin-bottom:8px}
.exp-text{font-size:13px;color:var(--text2);line-height:1.65}
.exp-text strong{color:var(--text);font-weight:600}
.exp-text em.analogy{display:block;margin-top:8px;padding:8px 12px;background:var(--bg3);border-radius:var(--radius-xs);color:var(--text3);font-style:normal;font-size:12.5px;line-height:1.6;border-left:2px solid var(--disc-color,#111)}
.q-footer{padding:16px 28px 28px;display:flex;justify-content:flex-end}
.btn-next{background:var(--text);color:var(--bg);border:1px solid var(--text);border-radius:var(--radius-sm);padding:10px 22px;font-size:13px;font-weight:600;transition:var(--tr);display:none}
.btn-next.visible{display:block;animation:fadeUp .15s ease}
.btn-next:hover{opacity:.85}

/* RESULTS */
#page-results{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
#page-results.active{display:flex}
.results-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:460px;padding:36px;text-align:center}
.ring-wrap{position:relative;display:inline-block;margin-bottom:20px}
.ring-svg{transform:rotate(-90deg)}
.ring-track{fill:none;stroke:var(--border);stroke-width:8}
.ring-prog{fill:none;stroke:var(--text);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
.ring-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-pct{font-size:26px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;display:block}
.ring-sub{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:.5px}
.results-title{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.results-msg{color:var(--text3);font-size:13.5px;margin-bottom:24px}
.results-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.r-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 8px}
.r-stat-num{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.r-stat-num.good{color:var(--correct)}
.r-stat-num.bad{color:var(--wrong)}
.r-stat-label{font-size:11px;color:var(--text4);margin-top:2px}
.results-btns{display:flex;flex-direction:column;gap:8px}
.btn-retry-wrong{background:var(--wrong);color:#fff;border:1px solid var(--wrong);border-radius:var(--radius-sm);padding:11px 20px;font-size:14px;font-weight:600;transition:var(--tr)}
.btn-retry-wrong:hover{opacity:.9}
.btn-retry-wrong.hidden{display:none}

/* MODAL */
#modal-ref{position:fixed;inset:0;z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:24px 16px;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);overflow-y:auto}
#modal-ref.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:700px;animation:fadeUp .2s ease;margin:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:30px;height:30px;background:var(--bg3);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);transition:var(--tr);flex-shrink:0}
.modal-close:hover{background:var(--bg2);color:var(--text)}
.modal-filters{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.modal-search-wrap{padding:14px 24px;border-bottom:1px solid var(--border)}
.modal-search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px;font-size:13px;color:var(--text);outline:none;transition:var(--tr)}
.modal-search:focus{border-color:var(--border2);background:var(--bg)}
.modal-search::placeholder{color:var(--text4)}
.modal-body{padding:16px 24px 24px;max-height:60vh;overflow-y:auto}
.ref-group{margin-bottom:20px}
.ref-group-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;padding:0 2px}
.ref-item{border:1px solid var(--border);border-left:3px solid var(--disc-color,#ccc);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:6px}
.ref-item-q{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:var(--bg2);cursor:pointer;font-size:13px;color:var(--text2);font-weight:500;line-height:1.45;transition:var(--tr)}
.ref-item-q:hover{background:var(--bg);color:var(--text)}
.ref-item-arrow{font-size:12px;color:var(--text4);margin-top:2px;flex-shrink:0;transition:transform .15s;display:inline-block}
.ref-item.open .ref-item-arrow{transform:rotate(90deg)}
.ref-item-detail{display:none;padding:12px 14px;background:var(--surface);border-top:1px solid var(--border)}
.ref-item.open .ref-item-detail{display:block;animation:fadeUp .15s ease}
.ref-correct{display:flex;align-items:flex-start;gap:8px;background:var(--correct-bg);border:1px solid var(--correct-border);border-radius:var(--radius-xs);padding:10px 12px;font-size:12.5px;color:var(--correct);margin-bottom:8px;line-height:1.5}
.ref-correct-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.ref-exp{font-size:12px;color:var(--text3);line-height:1.65}
.ref-exp strong{color:var(--text2);font-weight:600}
.ref-exp em.analogy{display:block;margin-top:6px;padding:6px 10px;background:var(--bg3);border-radius:var(--radius-xs);font-style:normal;color:var(--text3);font-size:11.5px;border-left:2px solid var(--disc-color,#ccc)}
.ref-empty{text-align:center;padding:48px 20px;color:var(--text4);font-size:14px}
</style>
</head>
<body>
<script>
window.QUESTIONS = [{"id": 0, "topic": "Data Vault", "subtopic": "Историчность данных в satellite — использование load date и load end date для отслеживания изменений атрибутов во времени", "question": "В satellite таблице атрибут изменился 3 раза. Как корректно закрыть предыдущую версию записи при использовании load_end_date?", "answers": ["load_end_date предыдущей записи проставляется как дата последней загрузки самой первой версии записи, чтобы сохранить хронологию с момента первичного появления hub-ключа в системе.", "При загрузке новой версии в load_end_date предыдущей записи проставляется дата/время новой загрузки минус 1 секунда (или сама дата новой загрузки), а у актуальной записи load_end_date остаётся NULL или максимальной датой (9999-12-31).", "При загрузке новой версии load_end_date предыдущей записи не обновляется — вместо этого старая запись физически удаляется из satellite, а новая версия атрибута вставляется как единственная актуальная запись, что обеспечивает чистоту таблицы и отсутствие дубликатов.", "При загрузке новой версии у актуальной записи load_end_date обновляется текущей датой, а у новой записи load_end_date сразу устанавливается NULL — так система всегда знает, какая запись активна."], "correct": 1, "explanation": "📅 Представь дневник с датами. Когда запись устарела — ты не вычёркиваешь её, а закрываешь дату окончания: 'актуально до 15 марта'. В Data Vault load_end_date предыдущей записи = дата загрузки новой версии. Текущая запись всегда остаётся с NULL — потому что мы ещё не знаем, когда она устареет.", "explanation_html": "<p><em class=\"analogy\">📅 Представь дневник с датами</em>. Когда запись устарела — ты не вычёркиваешь её, а закрываешь дату окончания: 'актуально до 15 марта'. В Data Vault <strong>load_end_date</strong> предыдущей записи = дата загрузки новой версии. Текущая запись всегда остаётся с <strong>NULL</strong> — потому что мы ещё не знаем, когда она устареет.</p>"}, {"id": 1, "topic": "Data Vault", "subtopic": "Load Date в Data Vault - назначение поля, правила заполнения и типичные ошибки при реализации", "question": "Почему поле Load Date в Data Vault заполняется временем загрузки в хранилище, а не временем создания записи в источнике?", "answers": ["Load Date заполняется временем загрузки, чтобы избежать дублирования: бизнес-время уже есть в источнике, поэтому в хранилище его повторно не сохраняют и используют только техническое время для сортировки записей.", "Load Date хранит время из источника, преобразованное в часовой пояс хранилища — это позволяет унифицировать временные метки и сравнивать записи из разных систем в единой шкале времени.", "Load Date фиксирует момент, когда запись появилась в DWH, обеспечивая аудит и воспроизводимость истории загрузок. Время из источника хранится отдельно — в полях бизнес-ключа или атрибутах сателлита, чтобы не смешивать техническое время хранилища с бизнес-временем.", "Load Date заполняется временем загрузки, потому что источники часто не предоставляют точного времени создания записи, а значит хранилище вынуждено использовать собственное время как единственно доступное. Если источник передаёт timestamp, то Load Date должен содержать именно его для точности аудита."], "correct": 2, "explanation": "🏭 Представь конвейер на заводе: важно знать не когда деталь изготовили на предприятии-поставщике, а когда она поступила к вам на склад. Load Date — это штамп 'принято на склад DWH'. Бизнес-время из источника хранится отдельно в атрибутах, чтобы не смешивать техническое и бизнесовое время.", "explanation_html": "<p><em class=\"analogy\">🏭 Представь конвейер на заводе: важно знать не когда деталь изготовили на предприятии-поставщике, а когда она поступила к вам на склад</em>. Load Date — это штамп 'принято на склад DWH'. Бизнес-время из источника хранится отдельно в атрибутах, чтобы не смешивать техническое и бизнесовое время.</p>"}, {"id": 2, "topic": "Data Vault", "subtopic": "Surrogate key в Data Vault — принципы генерации и применения хэш-ключей в hub и link таблицах", "question": "Почему в Data Vault хэш-ключи предпочтительнее числовых sequence-генерируемых суррогатных ключей для hub и link таблиц?", "answers": ["Числовые суррогатные ключи могут конфликтовать при слиянии данных из разных источников, так как одно и то же число может быть присвоено разным записям в разных системах, тогда как хэши гарантируют уникальность за счёт большего пространства значений.", "Хэш-ключи занимают меньше места в хранилище, чем числовые последовательности, и ускоряют операции JOIN за счёт фиксированной длины поля, что критично при работе с большими объёмами данных в hub таблицах.", "Sequence-генерируемые ключи зависят от централизованного генератора, который создаёт узкое место при параллельной загрузке, поэтому хэши предпочтительнее — они генерируются быстрее на уровне базы данных и требуют меньше вычислительных ресурсов, чем криптографические функции над бизнес-ключами, что снижает нагрузку на CPU при высокочастотной потоковой загрузке из множества источников одновременно.", "Хэш-ключи детерминированы: одни и те же бизнес-ключи всегда дают одинаковый хэш независимо от источника или среды загрузки, что позволяет параллельно загружать данные из разных систем без централизованной координации и устраняет зависимость от порядка загрузки."], "correct": 3, "explanation": "🔑 Представь номер паспорта. Если два человека одновременно из разных городов приходят регистрироваться, каждый может независимо посчитать свой номер по алгоритму (хэш), и он всегда будет одинаков. С числовой последовательностью нужен один 'выдающий номера' центр — это узкое место при параллельной загрузке.", "explanation_html": "<p><em class=\"analogy\">🔑 Представь номер паспорта</em>. Если два человека одновременно из разных городов приходят регистрироваться, каждый может независимо посчитать свой номер по алгоритму (<strong>хэш</strong>), и он всегда будет одинаков. С числовой последовательностью нужен один 'выдающий номера' центр — это узкое место при параллельной загрузке.</p>"}, {"id": 3, "topic": "Data Vault", "subtopic": "Link-таблицы для трёх и более сущностей — проектирование многосторонних связей в соответствии с методологией Data Vault", "question": "Почему в Data Vault Link-таблица для трёх сущностей содержит три отдельных хэш-ключа вместо одного составного?", "answers": ["Каждый хэш-ключ хранит MD5-хэш всех трёх бизнес-ключей сразу, но в разных форматах кодирования, чтобы гарантировать уникальность записи в Link-таблице при любых комбинациях входных значений.", "Один составной ключ усложнил бы дедупликацию записей, поэтому ключи разделяют для упрощения ETL-процессов.", "Три хэш-ключа используются для ускорения JOIN-операций: каждый ключ индексируется отдельно, что снижает нагрузку на базу данных при выборке данных из нескольких Hub-таблиц одновременно.", "Каждый хэш-ключ ссылается на отдельный Hub, сохраняя независимость связей и обеспечивая гибкость при изменении модели без перестройки всей таблицы. 5. Историчность данных в satellite — использование load date и load end date для отслеживания изменений атрибутов во времени Почему в satellite поле load_end_date для текущей записи хранит значение NULL, а не реальную дату?"], "correct": 3, "explanation": "🔗 Представь список участников конференции: у каждого — свой бейдж с ID. В Link-таблице для трёх участников события хранятся три разных ID (от трёх разных Hub), а не один общий. Так каждый Hub остаётся независимым, и если одна сущность изменится — не нужно перестраивать всю таблицу.", "explanation_html": "<p><em class=\"analogy\">🔗 Представь список участников конференции: у каждого — свой бейдж с ID</em>. В <strong>Link</strong>-таблице для трёх участников события хранятся три разных ID (от трёх разных <strong>Hub</strong>), а не один общий. Так каждый <strong>Hub</strong> остаётся независимым, и если одна сущность изменится — не нужно перестраивать всю таблицу.</p>"}, {"id": 4, "topic": "Data Vault", "subtopic": "Историчность данных в satellite — использование load date и load end date для отслеживания изменений атрибутов во времени", "question": "Почему в satellite поле load_end_date для текущей записи хранит значение NULL, а не реальную дату?", "answers": ["NULL означает, что запись актуальна прямо сейчас — дата окончания неизвестна, так как изменение ещё не произошло.", "NULL означает ошибку загрузки: дата окончания не была присвоена ETL-процессом из-за отсутствия информации в источнике.", "Load_end_date становится NULL после архивации записи, сигнализируя, что данные перенесены в архивную таблицу и недоступны для обычных запросов.", "NULL используется для экономии места в хранилище — реальные даты занимают больше памяти, чем пустые значения. 6. Link-таблицы Data Vault — правила проектирования связей между hub-сущностями без атрибутивной нагрузки В Link-таблице между Hub_Customer и Hub_Order обнаружили атрибут order_amount — как правильно поступить с ним согласно правилам Data Vault?"], "correct": 0, "explanation": "📖 NULL в load_end_date — это как открытый договор без даты окончания: 'действует до отдельного уведомления'. Пока нет новой версии записи — мы не знаем дату её 'смерти'. Когда придёт обновление, мы запишем дату закрытия в эту запись и создадим новую с NULL.", "explanation_html": "<p><em class=\"analogy\">📖 <strong>NULL</strong> в <strong>load_end_date</strong> — это как открытый договор без даты окончания: 'действует до отдельного уведомления'</em>. Пока нет новой версии записи — мы не знаем дату её 'смерти'. Когда придёт обновление, мы запишем дату закрытия в эту запись и создадим новую с <strong>NULL</strong>.</p>"}, {"id": 5, "topic": "Data Vault", "subtopic": "Link-таблицы Data Vault — правила проектирования связей между hub-сущностями без атрибутивной нагрузки", "question": "В Link-таблице между Hub_Customer и Hub_Order обнаружили атрибут order_amount — как правильно поступить с ним согласно правилам Data Vault?", "answers": ["Оставить order_amount в Link-таблице допустимо, если это денормализованный атрибут связи — Data Vault разрешает хранить контекстные метрики прямо в Link для ускорения аналитических запросов и снижения количества JOIN-операций.", "Перенести order_amount в Hub_Order, так как сумма заказа является ключевым бизнес-атрибутом, идентифицирующим заказ в системе.", "Вынести order_amount в Satellite к Link-таблице (SAT_LINK), так как Link хранит только хэш-ключи связанных хабов и метаданные загрузки без атрибутов.", "Удалить order_amount как избыточный — суммы хранятся в источнике. 7. Hub-таблицы Data Vault - проектирование business key для источников с пересекающимися и конфликтующими идентификаторами Как в Data Vault 2.0 рекомендуется разрешать коллизии пересекающихся business key из разных источников в Hub?"], "correct": 2, "explanation": "🏠 Представь дом (Link) и паспорт жильца (Hub). В Link хранится только факт: 'этот жилец живёт в этой квартире'. Его зарплату (order_amount) туда не вписывают — она хранится в отдельном документе (Satellite к Link). Так чисто разделяется 'кто с кем связан' и 'что мы знаем об этой связи'.", "explanation_html": "<p><em class=\"analogy\">🏠 Представь дом (<strong>Link</strong>) и паспорт жильца (<strong>Hub</strong>)</em>. В <strong>Link</strong> хранится только факт: 'этот жилец живёт в этой квартире'. Его зарплату (order_amount) туда не вписывают — она хранится в отдельном документе (<strong>Satellite</strong> к <strong>Link</strong>). Так чисто разделяется 'кто с кем связан' и 'что мы знаем об этой связи'.</p>"}, {"id": 6, "topic": "Data Vault", "subtopic": "Hub-таблицы Data Vault - проектирование business key для источников с пересекающимися и конфликтующими идентификаторами", "question": "Как в Data Vault 2.0 рекомендуется разрешать коллизии пересекающихся business key из разных источников в Hub?", "answers": ["Добавлением префикса/namespace к business key или созданием отдельных Hub-таблиц на каждый источник.", "Использованием суррогатных хэш-ключей SHA-256 для унификации всех источников в единый Hub", "Объединением конфликтующих ключей через Link-таблицу с указанием приоритета источника", "Хранением source_system как отдельного атрибута в Satellite без изменения структуры Hub 8. Data Vault vs Star Schema - принципиальные архитектурные различия и обоснование выбора Data Vault для загрузки сырых данных В хранилище на Star Schema исторически менялись атрибуты измерения 'Клиент' (адрес, категория), а бизнес требует полного аудита изменений без потери первоначальных данных — какой компонент Data Vault закроет эту задачу и почему?"], "correct": 0, "explanation": "🏷️ Представь, что два разных завода выпускают детали с одинаковыми серийными номерами '1001'. Чтобы не перепутать, добавляют префикс завода: 'ЗАВОД-А:1001' и 'ЗАВОД-Б:1001'. В Data Vault также: либо добавляем namespace к ключу, либо делаем отдельный Hub для каждого источника.", "explanation_html": "<p><em class=\"analogy\">🏷️ Представь, что два разных завода выпускают детали с одинаковыми серийными номерами '1001'</em>. Чтобы не перепутать, добавляют префикс завода: 'ЗАВОД-А:1001' и 'ЗАВОД-Б:1001'. В Data Vault также: либо добавляем namespace к ключу, либо делаем отдельный <strong>Hub</strong> для каждого источника.</p>"}, {"id": 7, "topic": "Data Vault", "subtopic": "Data Vault vs Star Schema - принципиальные архитектурные различия и обоснование выбора Data Vault для загрузки сырых данных", "question": "В хранилище на Star Schema исторически менялись атрибуты измерения 'Клиент' (адрес, категория), а бизнес требует полного аудита изменений без потери первоначальных данных — какой компонент Data Vault закроет эту задачу и почему?", "answers": ["Satellite (SAT) — хранит всю историю изменений атрибутов с временными метками (load_date, load_end_date). В отличие от SCD Type 2 в Star Schema, SAT не требует изменения структуры Hub/Link и обеспечивает полный аудируемый журнал без перестройки модели.", "Reference Table (REF) — специализированный компонент Data Vault для хранения справочных и исторических данных атрибутов. В отличие от Satellite, REF-таблицы оптимизированы именно для аудита изменяемых атрибутов измерений вроде адреса и категории клиента, содержат встроенный механизм версионирования и не требуют дополнительных Hub-структур для обеспечения полной истории изменений.", "Link (LNK) — компонент, отвечающий за связи между сущностями, идеально подходит для хранения истории изменений атрибутов клиента, поскольку каждое изменение адреса или категории означает новую бизнес-связь. Link фиксирует все версии отношений с временными метками, заменяя SCD Type 2 без перестройки модели и сохраняя полный аудируемый след изменений.", "Hub (HUB) — центральный компонент Data Vault, хранящий уникальные бизнес-ключи клиентов с временными метками первой загрузки. Именно Hub фиксирует момент появления клиента в системе и все последующие изменения его идентификаторов, обеспечивая полный аудит без изменения структуры модели и потери первоначальных данных. 9. Hub-таблицы Data Vault - проектирование business key для источников с пересекающимися и конфликтующими идентификаторами Два источника (CRM и ERP) имеют пересекающиеся числовые customer_id (1001 — разные клиенты). Какие подходы применяются при проектировании Hub_Customer для корректного разграничения записей?"], "correct": 0, "explanation": "📸 Star Schema — как фотоальбом: старое фото затирается новым. Data Vault Satellite — как хронологический дневник: каждое изменение адреса или категории клиента добавляется новой строкой с датой. Можно вернуться к любому моменту прошлого без потери данных.", "explanation_html": "<p><em class=\"analogy\">📸 Star Schema — как фотоальбом: старое фото затирается новым</em>. Data Vault <strong>Satellite</strong> — как хронологический дневник: каждое изменение адреса или категории клиента добавляется новой строкой с датой. Можно вернуться к любому моменту прошлого без потери данных.</p>"}, {"id": 8, "topic": "Data Vault", "subtopic": "Hub-таблицы Data Vault - проектирование business key для источников с пересекающимися и конфликтующими идентификаторами", "question": "Два источника (CRM и ERP) имеют пересекающиеся числовые customer_id (1001 — разные клиенты). Какие подходы применяются при проектировании Hub_Customer для корректного разграничения записей?", "answers": ["Подход 1: разделить Hub_Customer на Hub_CRM_Customer и Hub_ERP_Customer без связей между ними, поскольку Data Vault запрещает объединение идентификаторов разных источников в одном хабе; Подход 2: использовать Reference-таблицу для хранения соответствий между системами.", "Подход 1: создать единый Hub_Customer с составным ключом, объединив customer_id из обоих источников через COALESCE, что устраняет дубли; Подход 2: использовать Bridge-таблицу для маппинга пересекающихся идентификаторов между CRM и ERP.", "Подход 1: использовать только числовой customer_id как business key, добавив атрибут source_system в сателлит — это сохраняет чистоту хаба и позволяет различать источники через исторические записи сателлита.", "Подход 1: составной business key с кодом источника ('CRM_1001', 'ERP_1001'). Подход 2: раздельные хабы на источник, связанные через Same-As Link (SAL). 10. Surrogate key в Data Vault - алгоритмы генерации хеш-ключей и обеспечение детерминированности при загрузке из множества источников В Data Vault хаб CUSTOMER загружается из трёх источников: CRM (customer_id='C-001'), ERP (cust_no='C-001'), MDM (id='C001'). При использовании MD5 для генерации хеш-ключа каждый источник даёт разный хеш — как правильно обеспечить детерминированность Hub Hash Key?"], "correct": 3, "explanation": "🏷️ CRM говорит 'клиент 1001', ERP говорит 'клиент 1001' — но это разные люди! Решение: делаем составной ключ 'CRM_1001' и 'ERP_1001', или создаём отдельные Hub'ы на каждый источник, а потом связываем их через Same-As Link, если выяснится, что это одно и то же лицо.", "explanation_html": "<p><em class=\"analogy\">🏷️ CRM говорит 'клиент 1001', ERP говорит 'клиент 1001' — но это разные люди! Решение: делаем составной ключ 'CRM_1001' и 'ERP_1001', или создаём отдельные <strong>Hub</strong>'ы на каждый источник, а потом связываем их через <strong>Same-As <strong>Link</strong>, если выяснится, что это одно и то же лицо.</em></p>"}, {"id": 9, "topic": "Data Vault", "subtopic": "Surrogate key в Data Vault - алгоритмы генерации хеш-ключей и обеспечение детерминированности при загрузке из множества источников", "question": "В Data Vault хаб CUSTOMER загружается из трёх источников: CRM (customer_id='C-001'), ERP (cust_no='C-001'), MDM (id='C001'). При использовании MD5 для генерации хеш-ключа каждый источник даёт разный хеш — как правильно обеспечить детерминированность Hub Hash Key?", "answers": ["Необходимо нормализовать бизнес-ключ до загрузки: привести к единому формату (например, убрать префиксы, trim, upper/lower case) согласно стандарту хеширования, затем применять MD5/SHA-1 к нормализованному значению. Дополнительно фиксируют разделитель (например, '||') и порядок компонентов составного ключа в соглашении о хешировании (Hash Key Standard), чтобы все источники давали идентичный хеш для одного и того же бизнес-объекта.", "Нужно создать отдельный хаб для каждого источника (HUB_CUSTOMER_CRM, HUB_CUSTOMER_ERP, HUB_CUSTOMER_MDM) с собственным хеш-ключом, а связь между ними установить через Same-As Link. Нормализация бизнес-ключей до хеширования противоречит принципу Data Vault — хранить данные в исходном виде.", "Детерминированность достигается автоматически: MD5 всегда даёт одинаковый хеш для одинаковых входных данных, поэтому достаточно убедиться, что все три источника передают поле с одним и тем же именем (например, customer_id), а сама функция хеширования обеспечит уникальность. Нормализация значений избыточна и усложняет архитектуру.", "Правильное решение — использовать суррогатный ключ из sequence или identity вместо хеш-ключа на уровне хаба: каждый источник при первой загрузке получает новый суррогатный номер, а сопоставление разных форматов бизнес-ключа (C-001 из CRM и C001 из MDM) выполняется отдельно в таблице соответствий (mapping table), которая связывает суррогатные ключи разных источников между собой. Хеш-ключи в такой схеме применяются только для сателлитов, но не для хабов, поскольку хаб агрегирует уникальные бизнес-объекты, а не записи источников, и суррогат лучше отражает эту семантику. 11. Surrogate key в Data Vault - алгоритмы генерации хеш-ключей и обеспечение детерминированности при загрузке из множества источников Почему при генерации хеш-ключей в Data Vault критически важна нормализация входных значений перед хешированием?"], "correct": 2, "explanation": "🧂 Разные источники пишут по-разному: 'C-001', 'C001', 'c001'. Для детерминированности хэша нужно нормализовать до хэширования: убрать пробелы, привести к верхнему регистру, убрать спецсимволы. Только тогда один и тот же бизнес-объект получит одинаковый хэш из всех источников.", "explanation_html": "<p><em class=\"analogy\">🧂 Разные источники пишут по-разному: 'C-001', 'C001', 'c001'</em>. Для детерминированности <strong>хэш</strong>а нужно нормализовать до <strong>хэш</strong>ирования: убрать пробелы, привести к верхнему регистру, убрать спецсимволы. Только тогда один и тот же бизнес-объект получит одинаковый <strong>хэш</strong> из всех источников.</p>"}, {"id": 10, "topic": "Data Vault", "subtopic": "Surrogate key в Data Vault - алгоритмы генерации хеш-ключей и обеспечение детерминированности при загрузке из множества источников", "question": "Почему при генерации хеш-ключей в Data Vault критически важна нормализация входных значений перед хешированием?", "answers": ["Разные источники могут передавать один и тот же бизнес-ключ в разных регистрах, с пробелами или NULL-представлениями — без нормализации один объект получит разные хеш-ключи, что нарушит детерминированность и создаст дубликаты хабов.", "Нормализация входных значений перед хешированием необходима для обеспечения безопасности: без приведения к единому формату хеш-функции MD5 и SHA-1 становятся уязвимы к коллизионным атакам, когда злоумышленник может подобрать разные бизнес-ключи, дающие одинаковый хеш, что приведёт к несанкционированному слиянию записей в хабах и саттелитах Data Vault.", "Нормализация нужна исключительно для повышения производительности хеш-функций: стандартизированные строки одинаковой длины обрабатываются быстрее, что критично при загрузке больших объёмов данных из множества источников одновременно.", "Без нормализации хеш-функция вернёт ошибку при NULL-значениях. 12. Satellite-таблицы Data Vault - разделение атрибутов по скорости изменения (rate of change) при реструктуризации существующей модели Почему разделение атрибутов по скорости изменения на отдельные сателлиты снижает нагрузку на DWH при загрузке?"], "correct": 0, "explanation": "✂️ Представь: источник А пишет ' Иванов ', источник Б пишет 'ИВАНОВ', источник В — 'иванов'. Без нормализации хэш-функция выдаст три разных ключа для одного человека. Нормализация (TRIM + UPPER) делает из них одинаковую строку → один хэш → одна запись в Hub. Без этого — дубли и хаос.", "explanation_html": "<p>✂️ Представь: источник А пишет ' Иванов ', источник Б пишет 'ИВАНОВ', источник В — 'иванов'. Без нормализации <strong>хэш</strong>-функция выдаст три разных ключа для одного человека. Нормализация (TRIM + UPPER) делает из них одинаковую строку → один <strong>хэш</strong> → одна запись в <strong>Hub</strong>. Без этого — дубли и хаос.</p>"}, {"id": 11, "topic": "Data Vault", "subtopic": "Satellite-таблицы Data Vault - разделение атрибутов по скорости изменения (rate of change) при реструктуризации существующей модели", "question": "Почему разделение атрибутов по скорости изменения на отдельные сателлиты снижает нагрузку на DWH при загрузке?", "answers": ["Стабильные атрибуты не создают новых версий записей при изменении только волатильных, что уменьшает объём INSERT-операций и рост таблиц с историей.", "Разделение уменьшает количество JOIN-операций при запросах, так как каждый сателлит содержит меньше столбцов и быстрее сканируется", "Волатильные атрибуты выносятся в отдельные таблицы, что позволяет сжимать стабильные данные и экономить дисковое пространство", "Стабильные атрибуты реже индексируются, поэтому разделение снижает нагрузку на обновление индексов при каждой загрузке 13. Hub-таблицы Data Vault - структура, обязательные поля и правила создания по шаблону Вам нужно создать Hub-таблицу для сущности 'Клиент' в Data Vault. Какие обязательные поля должны присутствовать в этой таблице?"], "correct": 0, "explanation": "🗂️ Представь папку с документами. Адрес меняется раз в 5 лет, а баланс — каждый день. Если держать всё вместе, из-за изменения баланса создаётся новая версия записи даже для неизменившегося адреса. Разделив на два Satellite, каждый обновляется только тогда, когда меняется его часть.", "explanation_html": "<p><em class=\"analogy\">🗂️ Представь папку с документами</em>. Адрес меняется раз в 5 лет, а баланс — каждый день. Если держать всё вместе, из-за изменения баланса создаётся новая версия записи даже для неизменившегося адреса. Разделив на два <strong>Satellite</strong>, каждый обновляется только тогда, когда меняется его часть.</p>"}, {"id": 12, "topic": "Data Vault", "subtopic": "Hub-таблицы Data Vault - структура, обязательные поля и правила создания по шаблону", "question": "Вам нужно создать Hub-таблицу для сущности 'Клиент' в Data Vault. Какие обязательные поля должны присутствовать в этой таблице?", "answers": ["HUB_CUSTOMER_ID (суррогатный ключ), CUSTOMER_BK (бизнес-ключ), LOAD_DATE (дата загрузки), RECORD_SOURCE (источник записи).", "HUB_CUSTOMER_HK (хэш-ключ), CUSTOMER_BK (бизнес-ключ), LOAD_DATE (дата загрузки), END_DATE (дата окончания).", "HUB_CUSTOMER_HK (хэш-ключ), CUSTOMER_BK (бизнес-ключ), LOAD_DATE (дата загрузки), RECORD_SOURCE (источник записи).", "HUB_CUSTOMER_HK (хэш-ключ), CUSTOMER_NAME (имя клиента), LOAD_DATE (дата загрузки), RECORD_SOURCE (источник записи). 14. Соглашения об именовании объектов Data Vault - применение принятых naming conventions при создании и изменении таблиц Вы создаёте хаб для сущности 'Клиент' в модели Data Vault — какое имя таблицы соответствует принятым naming conventions?"], "correct": 1, "explanation": "🪪 Hub — это минимальный паспорт сущности: ID (суррогатный ключ), сам бизнес-ключ, когда пришёл (LOAD_DATE) и откуда (RECORD_SOURCE). Никаких атрибутов — только идентификация. Атрибуты идут в Satellite отдельно.", "explanation_html": "<p>🪪 <strong>Hub</strong> — это минимальный паспорт сущности: ID (<strong>суррогатный</strong> ключ), сам бизнес-ключ, когда пришёл (<strong>LOAD_DATE</strong>) и откуда (<strong>RECORD_SOURCE</strong>). Никаких атрибутов — только идентификация. Атрибуты идут в <strong>Satellite</strong> отдельно.</p>"}, {"id": 13, "topic": "Data Vault", "subtopic": "Соглашения об именовании объектов Data Vault - применение принятых naming conventions при создании и изменении таблиц", "question": "Вы создаёте хаб для сущности 'Клиент' в модели Data Vault — какое имя таблицы соответствует принятым naming conventions?", "answers": ["HUB_CUSTOMER: префикс HUB_ указывает тип объекта, имя сущности в верхнем регистре на английском.", "CUSTOMER_HUB: суффикс _HUB в конце имени таблицы является стандартом Data Vault, так как название сущности должно стоять первым для удобства сортировки объектов по алфавиту в каталоге базы данных", "DV_HUB_CUST: допустимо сокращение имени", "Hub_Customer: в Data Vault принято использовать смешанный регистр (CamelCase) для имён таблиц — префикс Hub_ указывает тип объекта, а имя сущности пишется с заглавной буквы, что соответствует общепринятым стандартам именования в корпоративных хранилищах данных 15. Surrogate key в Data Vault — принципы генерации и применения хэш-ключей в hub и link таблицах В hub-таблице для составного бизнес-ключа (first_name + last_name + birth_date) какой подход генерации хэш-ключа корректен?"], "correct": 0, "explanation": "📚 В библиотеке книги сортируют по первому слову названия: 'Война и мир', а не 'и мир, Война'. Имя сущности должно стоять первым для удобства поиска. Поэтому CUSTOMER_HUB, а не HUB_CUSTOMER. Хотя в разных командах бывают разные стандарты — главное выбрать один и придерживаться его.", "explanation_html": "<p><em class=\"analogy\">📚 В библиотеке книги сортируют по первому слову названия: 'Война и мир', а не 'и мир, Война'</em>. Имя сущности должно стоять первым для удобства поиска. Поэтому CUSTOMER_HUB, а не HUB_CUSTOMER. Хотя в разных командах бывают разные стандарты — главное выбрать один и придерживаться его.</p>"}, {"id": 14, "topic": "Data Vault", "subtopic": "Surrogate key в Data Vault — принципы генерации и применения хэш-ключей в hub и link таблицах", "question": "В hub-таблице для составного бизнес-ключа (first_name + last_name + birth_date) какой подход генерации хэш-ключа корректен?", "answers": ["Порядок полей в конкатенации не важен — главное применять TRIM и UPPER для нормализации. HASH(UPPER(TRIM(last_name)) || UPPER(TRIM(first_name)) || birth_date) даст тот же ключ, что и любой другой порядок.", "Хэшировать каждое поле отдельно и объединять результаты: HASH(first_name) || HASH(last_name) || HASH(birth_date). Это безопаснее, так как позволяет избежать коллизий при конкатенации строк разной длины и не требует фиксированного порядка полей.", "Разделитель между полями не нужен: HASH(UPPER(TRIM(first_name)) || UPPER(TRIM(last_name)) || birth_date) работает корректно, так как хэш-функция сама обеспечивает уникальность результата.", "Конкатенировать поля в фиксированном порядке с разделителем: HASH(UPPER(TRIM(first_name)) || '||' || UPPER(TRIM(last_name)) || '||' || birth_date). Порядок и нормализация должны быть одинаковы везде. 16. Business Key в Data Vault - определение, выбор и корректное заполнение в hub-таблицах Почему Business Key в hub-таблице должен храниться в исходном, неизменённом виде?"], "correct": 3, "explanation": "🥪 Чтобы хэш составного ключа был надёжным, нужно: 1) всегда один порядок полей, 2) разделитель между полями (иначе 'Ива' + 'нов' = 'Ива' + 'нов', что совпадёт с 'Иван' + 'ов'), 3) нормализация (TRIM, UPPER). Как рецепт бутерброда — всегда в одном порядке.", "explanation_html": "<p><em class=\"analogy\">🥪 Чтобы <strong>хэш</strong> составного ключа был надёжным, нужно: 1) всегда один порядок полей, 2) разделитель между полями (иначе 'Ива' + 'нов' = 'Ива' + 'нов', что совпадёт с 'Иван' + 'ов'), 3) <strong>нормализация</strong> (TRIM, UPPER)</em>. Как рецепт бутерброда — всегда в одном порядке.</p>"}, {"id": 15, "topic": "Data Vault", "subtopic": "Business Key в Data Vault - определение, выбор и корректное заполнение в hub-таблицах", "question": "Почему Business Key в hub-таблице должен храниться в исходном, неизменённом виде?", "answers": ["Чтобы сохранить уникальный идентификатор бизнеса независимо от источника и обеспечить воспроизводимость загрузки без потери смысла ключа.", "Потому что Data Vault требует хранить Business Key в исходном виде для оптимизации хранилища — нормализованные ключи занимают больше места и замедляют работу индексов в hub-таблицах при больших объёмах данных.", "Чтобы ускорить JOIN-операции между hub и link таблицами.", "Чтобы упростить дедупликацию: хранение ключа в исходном виде позволяет базе данных автоматически устранять дубликаты без написания дополнительного кода преобразования. 17. Добавление атрибутов в существующую satellite-таблицу - порядок действий, типы данных и соблюдение стандартов Почему при добавлении атрибута в satellite-таблицу нельзя просто изменить существующие записи, а нужно загружать новую версию строки?"], "correct": 0, "explanation": "📦 Представь штрих-код на товаре. Если магазин получил товар с кодом '12345', он хранит именно '12345', а не переводит в свою систему. Это позволяет восстановить цепочку поставок и повторить загрузку с тем же результатом. Изменение бизнес-ключа при загрузке ломает аудит.", "explanation_html": "<p><em class=\"analogy\">📦 Представь штрих-код на товаре</em>. Если магазин получил товар с кодом '12345', он хранит именно '12345', а не переводит в свою систему. Это позволяет восстановить цепочку поставок и повторить загрузку с тем же результатом. Изменение бизнес-ключа при загрузке ломает аудит.</p>"}, {"id": 16, "topic": "Data Vault", "subtopic": "Добавление атрибутов в существующую satellite-таблицу - порядок действий, типы данных и соблюдение стандартов", "question": "Почему при добавлении атрибута в satellite-таблицу нельзя просто изменить существующие записи, а нужно загружать новую версию строки?", "answers": ["Satellite использует append-only подход из соображений производительности: вставка новых строк быстрее UPDATE, особенно при параллельной загрузке из нескольких источников.", "Изменять существующие записи запрещено только в продакшн-среде из-за блокировок таблиц; в тестовом контуре допускается прямое обновление атрибутов через UPDATE.", "Satellite хранит историю изменений через версионирование: каждое изменение атрибута создаёт новую запись с актуальным load_date, сохраняя предыдущие версии нетронутыми для исторического анализа.", "Изменение существующих записей нарушает первичный ключ satellite-таблицы, так как он включает load_date и не допускает повторных значений для одного hub-ключа. 18. Satellite-таблицы Data Vault - структура, назначение атрибутов и связь с родительским hub Почему Satellite-таблица хранит исторические изменения атрибутов через добавление новых строк, а не обновление существующих?"], "correct": 2, "explanation": "📜 Satellite — это юридический архив: нельзя изменить уже подписанный документ. Если что-то изменилось, создаётся новый документ с датой. Старые версии остаются нетронутыми. Это обеспечивает полный аудит: всегда видно, каким был атрибут в любой момент времени.", "explanation_html": "<p><em class=\"analogy\">📜 <strong>Satellite</strong> — это юридический архив: нельзя изменить уже подписанный документ</em>. Если что-то изменилось, создаётся новый документ с датой. Старые версии остаются нетронутыми. Это обеспечивает полный аудит: всегда видно, каким был атрибут в любой момент времени.</p>"}, {"id": 17, "topic": "Data Vault", "subtopic": "Satellite-таблицы Data Vault - структура, назначение атрибутов и связь с родительским hub", "question": "Почему Satellite-таблица хранит исторические изменения атрибутов через добавление новых строк, а не обновление существующих?", "answers": ["Потому что Hub-таблица не поддерживает каскадные обновления, и Satellite вынужден добавлять строки вместо изменения старых", "Чтобы ускорить запросы: новые строки индексируются быстрее, чем обновление существующих записей в больших таблицах", "Чтобы избежать блокировок: UPDATE блокирует таблицу, а INSERT позволяет параллельно писать данные без конфликтов", "Чтобы сохранить полную историю изменений: каждая новая строка фиксирует состояние атрибутов на конкретный момент времени через load_date, не затирая предыдущие версии"], "correct": 3, "explanation": "📕 Satellite работает как бортовой журнал корабля: каждое событие записывается новой строкой с датой и временем. Никто не стирает старые записи — они остаются для истории. UPDATE уничтожил бы историю, а INSERT сохраняет её полностью.", "explanation_html": "<p><em class=\"analogy\">📕 <strong>Satellite</strong> работает как бортовой журнал корабля: каждое событие записывается новой строкой с датой и временем</em>. Никто не стирает старые записи — они остаются для истории. UPDATE уничтожил бы историю, а INSERT сохраняет её полностью.</p>"}, {"id": 18, "topic": "Informatica PC", "subtopic": "Трансформация Expression в Informatica PowerCenter — форматирование и преобразование полей при загрузке плоских файлов в таблицу-приёмник", "question": "Почему трансформация Expression в Informatica PowerCenter не может изменить количество строк на выходе?", "answers": ["Expression выполняет построчную обработку, но может объединять дублирующиеся строки в одну, если их значения совпадают после применения трансформаций — это встроенная оптимизация.", "Expression поддерживает только чтение данных без их модификации, поэтому все строки проходят через трансформацию без каких-либо изменений, что автоматически сохраняет их исходное количество на выходе.", "Expression обрабатывает каждую строку индивидуально и передаёт её дальше без фильтрации или агрегации — одна входная строка всегда даёт одну выходную.", "Expression не фильтрует строки, так как это функция агрегации."], "correct": 2, "explanation": "⚗️ Expression в Informatica — это формульная пробирка: вы можете изменить состав жидкости (значения полей), но не количество молекул (строк). Каждая входящая строка выходит ровно одной строкой с (возможно) изменёнными значениями. Для изменения количества строк используют Filter или Aggregator.", "explanation_html": "<p><em class=\"analogy\">⚗️ <strong>Expression</strong> в Informatica — это формульная пробирка: вы можете изменить состав жидкости (значения полей), но не количество молекул (строк)</em>. Каждая входящая строка выходит ровно одной строкой с (возможно) изменёнными значениями. Для изменения количества строк используют Filter или <strong>Aggregator</strong>.</p>"}, {"id": 19, "topic": "Informatica PC", "subtopic": "Трансформация Router — маршрутизация потоков данных по условиям и формирование различных наборов атрибутов через Expression в каждой ветке", "question": "Почему каждая ветка Router может иметь собственный Expression-трансформер с независимым набором атрибутов?", "answers": ["Потому что Router создаёт копии всех входящих строк для каждой ветки одновременно, а Expression-трансформер в каждой ветке получает полный набор данных и самостоятельно фильтрует нужные строки через внутренние условия — это позволяет формировать разные атрибуты без пересечения результатов между ветками.", "Потому что Router разделяет поток на отдельные группы строк по условиям, и каждая группа обрабатывается своим независимым конвейером трансформаций — Expression в каждой ветке работает только со своим подмножеством строк, формируя уникальный набор выходных полей без влияния на другие ветки.", "Потому что каждая ветка Router физически изолирована на уровне сессии Informatica и запускается в отдельном потоке выполнения с собственным контекстом памяти, поэтому Expression-трансформер в каждой ветке автоматически получает независимое пространство переменных и атрибутов, недоступное другим веткам.", "Потому что Expression-трансформер содержит встроенный механизм маршрутизации, который определяет принадлежность строки к конкретной ветке Router и на основании этого активирует соответствующий набор вычислений — именно Expression управляет тем, какие атрибуты будут сформированы для каждого условия Router."], "correct": 1, "explanation": "🚦 Router — как развязка на дороге: он разделяет поток машин по разным съездам в зависимости от условия. Каждый съезд (ветка) — независимая дорога со своими правилами. Expression в каждой ветке видит только 'своих' машин и может обрабатывать их по-своему.", "explanation_html": "<p><em class=\"analogy\">🚦 <strong>Router</strong> — как развязка на дороге: он разделяет поток машин по разным съездам в зависимости от условия</em>. Каждый съезд (ветка) — независимая дорога со своими правилами. <strong>Expression</strong> в каждой ветке видит только 'своих' машин и может обрабатывать их по-своему.</p>"}, {"id": 20, "topic": "Informatica PC", "subtopic": "Трансформация Joiner — объединение разнородных источников и последующая фильтрация данных через Filter", "question": "В маппинге Informatica PC два источника объединяются через Joiner. Мастер-таблица содержит 1 млн строк, детальная — 10 тыс. Какую таблицу назначить Master-источником для оптимизации памяти?", "answers": ["Большую таблицу (1 млн) назначить Master: Joiner кэширует Detail, поэтому меньший поток должен быть ведущим.", "Размер таблицы не влияет на выбор Master — определяющий фактор порядок соединения и тип JOIN, а не количество строк.", "Меньшую таблицу (10 тыс.) назначить Detail: Informatica оптимизирует кэш для Detail-источника, Master читается потоком.", "Меньшую таблицу (10 тыс. строк) назначить Master: Informatica кэширует Master-источник в памяти, большую (1 млн) — Detail (драйвирующий поток)."], "correct": 3, "explanation": "📚 Joiner кэширует Master-таблицу в оперативной памяти как словарь для быстрого поиска. Поэтому мастером назначают меньшую таблицу (10 тыс. строк), чтобы она поместилась в памяти целиком. Большая таблица (1 млн) читается потоком и ищет совпадения в этом словаре.", "explanation_html": "<p><em class=\"analogy\">📚 <strong>Joiner</strong> кэширует <strong>Master</strong>-таблицу в оперативной памяти как словарь для быстрого поиска</em>. Поэтому мастером назначают меньшую таблицу (10 тыс. строк), чтобы она поместилась в памяти целиком. Большая таблица (1 млн) читается потоком и ищет совпадения в этом словаре.</p>"}, {"id": 21, "topic": "Informatica PC", "subtopic": "Трансформация Lookup в Informatica PC — режимы кэширования (статический, динамический) и их применение для определения новых и изменённых записей при загрузке Satellite", "question": "Почему динамический кэш Lookup предпочтительнее статического при загрузке Satellite в Data Vault?", "answers": ["Динамический кэш предпочтительнее, потому что он загружается в оперативную память полностью до начала обработки строк, обеспечивая более быстрый доступ к данным по сравнению со статическим кэшем, который обращается к базе данных при каждом поиске. Это критично при загрузке Satellite, где объёмы данных особенно велики.", "Динамический кэш автоматически применяет хеш-партиционирование при поиске совпадений, что позволяет параллельно обрабатывать несколько потоков данных одновременно. Статический кэш работает только в однопоточном режиме, из-за чего при загрузке Satellite возникают узкие места производительности и некорректная сортировка дельта-записей внутри батча.", "Динамический кэш предпочтительнее, поскольку он хранит хеш-суммы всех атрибутов Satellite и автоматически сравнивает их с входящими записями, генерируя флаги NEW и CHANGED без дополнительных трансформаций. Статический кэш такой функциональности не поддерживает и требует ручного написания сложных выражений в трансформации Expression для определения изменений.", "Динамический кэш обновляется в процессе выполнения маппинга: новые записи добавляются в кэш на лету, что позволяет корректно различать новые и изменённые записи внутри одного батча — статический кэш содержит только снимок данных на момент старта и не отражает изменения, внесённые в текущем прогоне. 5. Цепочка трансформаций для загрузки Data Vault Hub — построение последовательности Lookup → Expression → Aggregator → Router с дедупликацией бизнес-ключей и вычислением хэш-значений Почему Aggregator в цепочке загрузки Hub располагается после Expression?"], "correct": 3, "explanation": "🔄 Статический кэш Lookup — снимок на начало дня. Динамический — живая база данных: если в ходе загрузки появилась новая запись, она сразу добавляется в кэш. Это критично для Satellite: новые записи внутри одного батча должны правильно определяться как 'новые', а не 'уже существующие'.", "explanation_html": "<p><em class=\"analogy\">🔄 Статический кэш <strong>Lookup</strong> — снимок на начало дня</em>. Динамический — живая база данных: если в ходе загрузки появилась новая запись, она сразу добавляется в кэш. Это критично для Satellite: новые записи внутри одного батча должны правильно определяться как 'новые', а не 'уже существующие'.</p>"}, {"id": 22, "topic": "Informatica PC", "subtopic": "Цепочка трансформаций для загрузки Data Vault Hub — построение последовательности Lookup → Expression → Aggregator → Router с дедупликацией бизнес-ключей и вычислением хэш-значений", "question": "Почему Aggregator в цепочке загрузки Hub располагается после Expression?", "answers": ["Expression должен очистить NULL-значения бизнес-ключей перед группировкой в Aggregator", "Aggregator не работает со строковыми полями до их нормализации в Expression", "Aggregator первым читает источник", "Хэш-поле вычисляется в Expression и недоступно Aggregator до него. 6. Трансформация Lookup в Informatica PowerCenter — обогащение входящего потока данных справочными значениями по ключевому полю Почему трансформация Lookup в Informatica PowerCenter по умолчанию возвращает только первое найденное совпадение, даже если в таблице-справочнике есть несколько подходящих строк?"], "correct": 3, "explanation": "🍳 Сначала Expression нарезает и подготавливает ингредиенты (чистит NULL, нормализует, вычисляет хэш), а потом Aggregator готовит блюдо (группирует). Если дать Aggregator'у грязные данные с NULL — группировка сломается, потому что NULL ≠ NULL в SQL.", "explanation_html": "<p><em class=\"analogy\">🍳 Сначала <strong>Expression</strong> нарезает и подготавливает ингредиенты (чистит NULL, нормализует, вычисляет хэш), а потом <strong>Aggregator</strong> готовит блюдо (группирует)</em>. Если дать <strong>Aggregator</strong>'у грязные данные с NULL — группировка сломается, потому что NULL ≠ NULL в SQL.</p>"}, {"id": 23, "topic": "Informatica PC", "subtopic": "Трансформация Lookup в Informatica PowerCenter — обогащение входящего потока данных справочными значениями по ключевому полю", "question": "Почему трансформация Lookup в Informatica PowerCenter по умолчанию возвращает только первое найденное совпадение, даже если в таблице-справочнике есть несколько подходящих строк?", "answers": ["Lookup возвращает первое совпадение, потому что это ограничение лицензии базового уровня — в расширенной версии можно настроить возврат всех строк.", "По умолчанию Lookup работает в режиме single-match для экономии памяти: кэш хранит только уникальные ключи, удаляя повторяющиеся записи при загрузке справочника.", "Lookup использует SQL-запрос с DISTINCT, который автоматически удаляет дубликаты ещё на этапе выборки из базы данных, поэтому в результате всегда одна строка.", "Lookup кэширует данные и при поиске возвращает первую совпавшую запись из кэша, так как предназначен для обогащения строки единственным справочным значением, а не для генерации нескольких выходных строк на одну входную."], "correct": 3, "explanation": "📖 Lookup — это словарь: когда ищёшь слово, получаешь первое определение. Он создан для обогащения одной строки одним значением из справочника. Если в справочнике несколько строк с одним ключом — вернётся первая из кэша. Для нескольких совпадений нужен Joiner.", "explanation_html": "<p><em class=\"analogy\">📖 <strong>Lookup</strong> — это словарь: когда ищёшь слово, получаешь первое определение</em>. Он создан для обогащения одной строки одним значением из справочника. Если в справочнике несколько строк с одним ключом — вернётся первая из кэша. Для нескольких совпадений нужен <strong>Joiner</strong>.</p>"}, {"id": 24, "topic": "Oracle PL/SQL", "subtopic": "Пакеты (PACKAGE) PL/SQL - организация процедур и функций загрузки хабов, линков и сателлитов в пакеты с разделением спецификации и тела", "question": "В пакете DWH_LOAD при загрузке хаба в спецификации объявлена процедура load_hub_customer, но тело пакета её не содержит — что произойдёт при компиляции тела пакета?", "answers": ["Компиляция тела завершится с предупреждением PLW-06009, спецификация пакета будет автоматически инвалидирована, а вызов load_hub_customer вернёт NULL вместо выполнения логики загрузки хаба.", "Компиляция тела завершится ошибкой: PLS-00323, так как процедура объявлена в спецификации, но не реализована в теле пакета.", "Компиляция тела пакета завершится успешно, но при вызове load_hub_customer Oracle автоматически сгенерирует исключение NO_DATA_FOUND, так как тело процедуры не определено.", "Компиляция тела пакета пройдёт без ошибок — Oracle допускает отсутствие реализации процедуры в теле, если она объявлена в спецификации как forward declaration без параметров."], "correct": 1, "explanation": "🏗️ Пакет PL/SQL — как здание: спецификация (spec) — это фасад с вывеской 'здесь есть процедура X'. Если фасад обещает процедуру, а внутри (тело пакета) её нет — компилятор выдаст ошибку PLS-00323: 'вы пообещали, но не сделали'. Фасад и внутренности должны соответствовать друг другу.", "explanation_html": "<p><em class=\"analogy\">🏗️ Пакет PL/SQL — как здание: спецификация (spec) — это фасад с вывеской 'здесь есть процедура X'</em>. Если фасад обещает процедуру, а внутри (тело пакета) её нет — компилятор выдаст ошибку PLS-00323: 'вы пообещали, но не сделали'. Фасад и внутренности должны соответствовать друг другу.</p>"}, {"id": 25, "topic": "Oracle PL/SQL", "subtopic": "Курсоры PL/SQL - использование явных курсоров, курсорных переменных и атрибутов курсора для построчной и пакетной обработки данных в ETL-процедурах", "question": "В ETL-процедуре необходимо обработать 10 млн строк из staging-таблицы с минимальной нагрузкой на память — какой механизм курсора оптимален?", "answers": ["Неявный курсор в цикле FOR с прямым INSERT/UPDATE — Oracle автоматически оптимизирует построчную обработку через внутренний механизм array processing, поэтому явное управление размером пакета через LIMIT избыточно и усложняет код без реального выигрыша по памяти.", "Явный курсор с BULK COLLECT ... LIMIT (например, LIMIT 1000) в цикле LOOP — загружает данные пакетами фиксированного размера, снижая количество context switch между SQL и PL/SQL и контролируя потребление памяти.", "Явный курсор с BULK COLLECT без LIMIT — загружает все 10 млн строк в коллекцию за один раз, что полностью устраняет context switch между SQL и PL/SQL и обеспечивает максимальную скорость обработки при минимальных накладных расходах на циклы.", "Курсорная переменная REF CURSOR с FETCH построчно — проще в коде."], "correct": 1, "explanation": "🚌 BULK COLLECT с LIMIT — как автобус с вместимостью: загружает пассажиров порциями по 1000, везёт, высаживает, возвращается за следующей партией. Без LIMIT — как попытка вместить всех 10 млн в один автобус: он рухнет (переполнение памяти). Порции = баланс между скоростью и расходом памяти.", "explanation_html": "<p><em class=\"analogy\">🚌 <strong>BULK COLLECT</strong> с LIMIT — как автобус с вместимостью: загружает пассажиров порциями по 1000, везёт, высаживает, возвращается за следующей партией</em>. Без LIMIT — как попытка вместить всех 10 млн в один автобус: он рухнет (переполнение памяти). Порции = баланс между скоростью и расходом памяти.</p>"}, {"id": 26, "topic": "Oracle PL/SQL", "subtopic": "Последовательности (SEQUENCE) - создание и применение последовательностей для генерации суррогатных ключей в объектах хранилища данных", "question": "В Data Vault хабе необходимо генерировать суррогатный ключ при вставке новых записей — какой DDL-синтаксис Oracle позволит привязать sequence к колонке хаба без использования триггера?", "answers": ["Использовать конструкцию GENERATED ALWAYS AS IDENTITY — hub_key NUMBER GENERATED ALWAYS AS IDENTITY PRIMARY KEY, которая автоматически создаёт и привязывает sequence к колонке. Работает с Oracle 12c+ и не требует триггеров, однако sequence при этом создаётся неявно и не может использоваться в других таблицах хранилища.", "Использовать DEFAULT-значение с псевдостолбцом ROWNUM: hub_key NUMBER DEFAULT ROWNUM NOT NULL — это встроенный механизм Oracle, гарантирующий уникальность ключей в хабе без отдельного объекта sequence, поскольку ROWNUM автоматически инкрементируется для каждой новой строки в сессии.", "Использовать DEFAULT-значение колонки: hub_key NUMBER DEFAULT hub_seq.NEXTVAL NOT NULL. Доступно с Oracle 12c+, sequence генерируется автоматически при INSERT без явного указания значения.", "Использовать синтаксис CREATE SEQUENCE hub_seq и затем указать BEFORE INSERT триггер с :NEW.hub_key := hub_seq.NEXTVAL — это стандартный Oracle-подход до версии 12c, который полностью заменяет DEFAULT NEXTVAL и считается более портируемым для хранилищ, работающих на нескольких версиях Oracle одновременно."], "correct": 2, "explanation": "🔢 DEFAULT hub_seq.NEXTVAL — как автозаполнение даты в форме: вы не пишете дату вручную, она подставляется автоматически. С Oracle 12c+ sequence можно напрямую прописать как DEFAULT-значение колонки, без триггеров. INSERT не указывает это поле — Oracle сам берёт следующий номер.", "explanation_html": "<p><em class=\"analogy\">🔢 DEFAULT hub_seq.<strong>NEXTVAL</strong> — как автозаполнение даты в форме: вы не пишете дату вручную, она подставляется автоматически</em>. С Oracle 12c+ sequence можно напрямую прописать как DEFAULT-значение колонки, без триггеров. INSERT не указывает это поле — Oracle сам берёт следующий номер.</p>"}, {"id": 27, "topic": "Oracle PL/SQL", "subtopic": "Пользовательские типы данных PL/SQL — создание объектных типов, коллекций (VARRAY, Nested Table, Associative Array) для обработки наборов данных в ETL-логике", "question": "Почему Associative Array в PL/SQL нельзя сохранить в столбец таблицы Oracle, в отличие от Nested Table?", "answers": ["Associative Array нельзя хранить в таблице, потому что он использует индексацию по произвольным ключам (включая VARCHAR2), что несовместимо с реляционной моделью Oracle — Nested Table же всегда индексируется по целым числам, что делает её структурно совместимой с SQL-движком и позволяет Oracle корректно сериализовать данные в табличный столбец.", "Это ограничение связано с тем, что Associative Array является устаревшим типом коллекции (ранее назывался PL/SQL Table), и Oracle намеренно запретил его использование в SQL-контексте в целях обратной совместимости, оставив эту возможность только для Nested Table и VARRAY.", "Associative Array не поддерживает хранение в столбцах таблиц из-за ограничения на максимальный размер коллекции — он не может превышать 32KB, тогда как Nested Table не имеет такого ограничения и поэтому допускается SQL-движком для персистентного хранения.", "Associative Array существует только в памяти PL/SQL-движка и не имеет соответствующего SQL-типа на уровне базы данных, тогда как Nested Table является schema-level типом, известным SQL-движку Oracle и пригодным для хранения в столбцах таблиц. 5. Обработка исключений PL/SQL — проектирование стратегий обработки ошибок в процессах загрузки DWH: пользовательские исключения, PRAGMA EXCEPTION_INIT, логирование ошибок В процессе загрузки DWH через Informatica PC возникает ORA-00001 (нарушение уникальности). Как правильно перехватить эту ошибку в PL/SQL-процедуре и залогировать её без остановки всего пакета загрузки?"], "correct": 3, "explanation": "🏠 Associative Array живёт только в оперативной памяти PL/SQL, как блокнот на рабочем столе. Nested Table — как официальный документ в сейфе (схеме БД): у неё есть SQL-тип, Oracle её знает и может хранить в столбце таблицы. Блокнот нельзя положить в сейф — он не формализован.", "explanation_html": "<p><em class=\"analogy\">🏠 Associative Array живёт только в оперативной памяти PL/SQL, как блокнот на рабочем столе</em>. Nested Table — как официальный документ в сейфе (схеме БД): у неё есть SQL-тип, Oracle её знает и может хранить в столбце таблицы. Блокнот нельзя положить в сейф — он не формализован.</p>"}, {"id": 28, "topic": "Oracle PL/SQL", "subtopic": "Обработка исключений PL/SQL — проектирование стратегий обработки ошибок в процессах загрузки DWH: пользовательские исключения, PRAGMA EXCEPTION_INIT, логирование ошибок", "question": "В процессе загрузки DWH через Informatica PC возникает ORA-00001 (нарушение уникальности). Как правильно перехватить эту ошибку в PL/SQL-процедуре и залогировать её без остановки всего пакета загрузки?", "answers": ["Перехватывать ORA-00001 не нужно — достаточно добавить хинт IGNORE_ROW_ON_DUPKEY_INDEX в INSERT-запрос, тогда Oracle молча пропустит дубли без исключений и логирования.", "Использовать встроенное исключение DUP_VAL_ON_INDEX без PRAGMA EXCEPTION_INIT — оно автоматически перехватит ORA-00001. В блоке EXCEPTION записать ошибку в лог-таблицу прямым INSERT в рамках основной транзакции, после чего вызвать ROLLBACK SAVEPOINT для отката только нарушающей строки, а затем продолжить цикл загрузки — автономная транзакция здесь избыточна и замедляет процесс.", "Объявить исключение и привязать его через PRAGMA EXCEPTION_INIT(e_dup_val, -1), в блоке EXCEPTION перехватить его, записать в лог-таблицу (SQLERRM, SQLCODE, имя процедуры, время) через автономную транзакцию (PRAGMA AUTONOMOUS_TRANSACTION), затем выполнить CONTINUE или обработать строку-нарушитель отдельно — основная транзакция при этом не откатывается.", "Объявить исключение и привязать через PRAGMA EXCEPTION_INIT(e_dup_val, -1), перехватить в блоке EXCEPTION, залогировать через автономную транзакцию, затем обязательно вызвать RAISE для повторного возбуждения исключения наверх — иначе Informatica PC не получит сигнал об ошибке и не сможет корректно пометить сессию как failed, что приведёт к потере трассировки ошибок в мониторинге ETL и повторной загрузке дублей. 6. Представления (View) — разработка сложных view для слоёв Business Vault и Information Mart поверх Raw Vault: логика вычислений, агрегаций и Point-in-Time структур Почему Point-in-Time (PIT) таблицы в Data Vault реализуются как материализованные view или отдельные таблицы, а не как обычные view поверх сателлитов?"], "correct": 2, "explanation": "🎯 PRAGMA EXCEPTION_INIT + AUTONOMOUS_TRANSACTION — золотой стандарт логирования ошибок. PRAGMA даёт дублю имя (e_dup_val), EXCEPTION перехватывает его, AUTONOMOUS_TRANSACTION позволяет записать в лог-таблицу даже если основная транзакция откатится. Так загрузка продолжается, а ошибка фиксируется.", "explanation_html": "<p><em class=\"analogy\">🎯 <strong>PRAGMA</strong> <strong>EXCEPTION</strong>_INIT + AUTONOMOUS_TRANSACTION — золотой стандарт логирования ошибок</em>. <strong>PRAGMA</strong> даёт дублю имя (e_dup_val), <strong>EXCEPTION</strong> перехватывает его, AUTONOMOUS_TRANSACTION позволяет записать в лог-таблицу даже если основная транзакция откатится. Так загрузка продолжается, а ошибка фиксируется.</p>"}, {"id": 29, "topic": "Oracle PL/SQL", "subtopic": "Представления (View) — разработка сложных view для слоёв Business Vault и Information Mart поверх Raw Vault: логика вычислений, агрегаций и Point-in-Time структур", "question": "Почему Point-in-Time (PIT) таблицы в Data Vault реализуются как материализованные view или отдельные таблицы, а не как обычные view поверх сателлитов?", "answers": ["Обычный view при каждом обращении выполняет дорогостоящие JOIN всех сателлитов с поиском актуальной записи на заданную дату. PIT-структура материализует снимки: для каждого бизнес-ключа и даты хранятся HASH_KEY и LOAD_DTS каждого сателлита, а при отсутствии записи — нулевой хэш (ghost record). Это превращает временно́й поиск в простой lookup, обеспечивая предсказуемую производительность на больших объёмах.", "Обычные view технически способны реализовать PIT-логику, однако их не используют из-за ограничений оптимизатора Oracle: CBO не умеет корректно строить планы выполнения для view, содержащих аналитические функции ROW_NUMBER() OVER (PARTITION BY ... ORDER BY LOAD_DTS DESC) поверх множества сателлитов одновременно, что приводит к игнорированию существующих индексов и принудительному full table scan каждого сателлита при любом обращении к такому view.", "PIT-таблицы реализуются как материализованные объекты главным образом из соображений согласованности данных: обычный view при параллельных транзакциях загрузки может возвращать разные снимки для одного бизнес-ключа разным сессиям, тогда как материализованная структура фиксирует единое состояние данных на момент последнего refresh, гарантируя транзакционную консистентность всех аналитических запросов к слою Information Mart независимо от текущей активности ETL-процессов.", "PIT-структуры материализуются прежде всего потому, что обычные view не поддерживают хранение ghost records (нулевых хэшей) для отсутствующих записей в сателлитах — это ограничение синтаксиса Oracle, и единственный способ обойти его — физически зафиксировать строки с NULL-значениями или нулевыми хэшами в отдельной таблице или материализованном view, которые Oracle умеет корректно индексировать и использовать в bitmap-планах. 7. Переменные и типы данных PL/SQL - объявление и использование скалярных переменных, констант и якорных типов (%TYPE, %ROWTYPE) в блоках ETL-процессов Почему использование %TYPE для объявления переменной предпочтительнее явного указания типа данных в ETL-процессах?"], "correct": 0, "explanation": "📸 Обычный VIEW — фото по запросу: каждый раз делает новый снимок (JOIN всех сателлитов). PIT-таблица — готовый фотоальбом: снимки уже сделаны заранее, с закладками на каждую дату. Аналитики берут готовый снимок, а не ждут фотографа. Это в разы быстрее для больших данных.", "explanation_html": "<p><em class=\"analogy\">📸 Обычный VIEW — фото по запросу: каждый раз делает новый снимок (JOIN всех сателлитов)</em>. PIT-таблица — готовый фотоальбом: снимки уже сделаны заранее, с закладками на каждую дату. Аналитики берут готовый снимок, а не ждут фотографа. Это в разы быстрее для больших данных.</p>"}, {"id": 30, "topic": "Oracle PL/SQL", "subtopic": "Переменные и типы данных PL/SQL - объявление и использование скалярных переменных, констант и якорных типов (%TYPE, %ROWTYPE) в блоках ETL-процессов", "question": "Почему использование %TYPE для объявления переменной предпочтительнее явного указания типа данных в ETL-процессах?", "answers": ["При изменении типа столбца в таблице переменная автоматически наследует новый тип, что исключает ошибки несоответствия типов и устраняет необходимость ручного обновления кода ETL.", "%TYPE обязателен при работе с NULL-значениями — без него переменная не может хранить NULL, что критично в ETL-процессах с пропущенными данными.", "%TYPE позволяет обойти ограничения прав доступа к таблицам, объявляя переменные без необходимости иметь привилегию SELECT на исходную таблицу.", "%TYPE ускоряет выполнение ETL-запросов, так как Oracle заранее знает точный тип и не тратит время на преобразование данных при загрузке. 8. Sequence в Oracle - создание и использование последовательностей (CREATE SEQUENCE, NEXTVAL, CURRVAL) для генерации суррогатных ключей в таблицах DWH Вам нужно создать суррогатный ключ для хаба в Data Vault — напишите DDL для sequence, стартующей с 1 с шагом 1, без кэширования?"], "correct": 0, "explanation": "🎭 %TYPE — умный дублёр актёра: как бы ни изменился типаж главной роли (тип столбца в таблице), дублёр автоматически подстраивается. Если вы написали NUMBER, а потом столбец стал VARCHAR2 — придётся вручную менять везде. С %TYPE — всё подстраивается само при перекомпиляции.", "explanation_html": "<p><em class=\"analogy\">🎭 <strong>%TYPE</strong> — умный дублёр актёра: как бы ни изменился типаж главной роли (тип столбца в таблице), дублёр автоматически подстраивается</em>. Если вы написали NUMBER, а потом столбец стал VARCHAR2 — придётся вручную менять везде. С <strong>%TYPE</strong> — всё подстраивается само при перекомпиляции.</p>"}, {"id": 31, "topic": "Oracle PL/SQL", "subtopic": "Sequence в Oracle - создание и использование последовательностей (CREATE SEQUENCE, NEXTVAL, CURRVAL) для генерации суррогатных ключей в таблицах DWH", "question": "Вам нужно создать суррогатный ключ для хаба в Data Vault — напишите DDL для sequence, стартующей с 1 с шагом 1, без кэширования?", "answers": ["CREATE SEQUENCE hub_seq START WITH 0 INCREMENT BY 1 NOCACHE NOCYCLE;", "CREATE SEQUENCE hub_seq BEGIN WITH 1 STEP 1 NOCACHE;", "CREATE SEQUENCE hub_seq START WITH 1 INCREMENT BY 1 NOCACHE NOCYCLE;", "CREATE SEQUENCE hub_seq START WITH 1 INCREMENT BY 1 CACHE 20 NOCYCLE ORDER; 17. Функции PL/SQL - создание пользовательских функций, возвращающих скалярные значения, для вычисления хэш-ключей и бизнес-атрибутов в маппингах Вам нужно создать функцию PL/SQL для вычисления хэш-ключа Hub-таблицы в Data Vault на основе бизнес-ключа. Какой встроенный Oracle-инструмент следует использовать внутри функции?"], "correct": 2, "explanation": "⚠️ Правильный синтаксис Oracle: CREATE SEQUENCE hub_seq START WITH 1 INCREMENT BY 1 NOCACHE NOCYCLE. 'BEGIN WITH' и 'STEP' — не Oracle-синтаксис. Это частая ошибка — перепутать с другими СУБД. Запомни: START WITH, INCREMENT BY, NOCACHE.", "explanation_html": "<p><em class=\"analogy\">⚠️ Правильный синтаксис Oracle: CREATE <strong>SEQUENCE</strong> hub_seq START WITH 1 INCREMENT BY 1 <strong>NOCACHE</strong> NOCYCLE</em>. '<strong>BEGIN</strong> WITH' и 'STEP' — не Oracle-синтаксис. Это частая ошибка — перепутать с другими СУБД. Запомни: START WITH, INCREMENT BY, <strong>NOCACHE</strong>.</p>"}, {"id": 32, "topic": "Oracle PL/SQL", "subtopic": "Объектные типы Oracle - создание пользовательских типов (CREATE TYPE) для передачи структурированных данных между процедурами загрузки сателлитов", "question": "Как передать коллекцию записей о бизнес-ключах в процедуру загрузки хаба, используя объектные типы Oracle?", "answers": ["Создать объектный тип строки: CREATE TYPE t_hub_key AS OBJECT (bk VARCHAR2(100), load_dts DATE); затем табличный тип: CREATE TYPE t_hub_key_tab AS TABLE OF t_hub_key; передать t_hub_key_tab как параметр процедуры.", "Создать тип CREATE TYPE t_hub_key AS TABLE OF VARCHAR2(100), передать его напрямую без объектного типа строки — Oracle автоматически упакует поля бизнес-ключа.", "Использовать ассоциативный массив: TYPE t_hub_key_tab IS TABLE OF t_hub_key INDEX BY PLS_INTEGER внутри пакета — объектные типы на уровне схемы для этого не нужны.", "Создать объектный тип строки, затем передать его как VARRAY, а не TABLE OF: CREATE TYPE t_hub_key_tab AS VARRAY(1000) OF t_hub_key — это стандартный подход для хабов. 10. Исключения PL/SQL - объявление пользовательских исключений и построение централизованной обработки ошибок в процедурах ETL-загрузки Почему в ETL-процедурах рекомендуется объявлять пользовательские исключения через PRAGMA EXCEPTION_INIT, а не использовать только встроенные исключения Oracle?"], "correct": 0, "explanation": "📦 Для передачи набора строк между процедурами используют: CREATE TYPE t_hub_key AS OBJECT (...) + CREATE TYPE t_hub_key_tab AS TABLE OF t_hub_key. Это официальный SQL-тип, Oracle его знает. Передаём как параметр — и внутри процедуры работаем с коллекци
