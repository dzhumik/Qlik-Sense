ей через FORALL/BULK.", "explanation_html": "<p><em class=\"analogy\">📦 Для передачи набора строк между процедурами используют: CREATE TYPE t_hub_key AS OBJECT (...) + CREATE TYPE t_hub_key_tab AS TABLE OF t_hub_key</em>. Это официальный SQL-тип, Oracle его знает. Передаём как параметр — и внутри процедуры работаем с коллекцией через <strong>FORALL</strong>/BULK.</p>"}, {"id": 33, "topic": "Oracle PL/SQL", "subtopic": "Курсоры и обработка наборов данных — явные курсоры, REF CURSOR, BULK COLLECT и FORALL для эффективной пакетной обработки данных при загрузке в DWH", "question": "При загрузке 500 000 строк из staging в хаб Data Vault через FORALL+BULK COLLECT вы получаете ORA-24381 из-за дубликатов по hash-ключу — какой механизм позволит пропустить ошибочные строки и продолжить загрузку пакета?", "answers": ["Использовать директиву SAVE EXCEPTIONS в FORALL и обработать коллекцию SQL%BULK_EXCEPTIONS в блоке EXCEPTION, чтобы залогировать ошибочные строки и не откатывать весь пакет.", "Добавить WHEN DUP_VAL_ON_INDEX THEN NULL в блок EXCEPTION внутри FORALL — это автоматически пропустит дубликаты без отката пакета.", "Указать директиву EXCEPTIONS INTO в операторе INSERT — Oracle сам соберёт ошибочные строки в указанную таблицу исключений без дополнительного кода.", "Использовать BULK COLLECT с LIMIT и обернуть каждую итерацию в SAVEPOINT, откатывая только проблемный чанк через ROLLBACK TO SAVEPOINT. 11. Структура анонимных и именованных блоков PL/SQL - секции DECLARE, BEGIN, EXCEPTION, END и порядок их применения при разработке по готовому шаблону Почему секция DECLARE в анонимном блоке PL/SQL должна располагаться до BEGIN?"], "correct": 0, "explanation": "🚑 SAVE EXCEPTIONS в FORALL — как скорая помощь, которая едет дальше после ДТП, не останавливая всю колонну. Ошибочные строки собираются в SQL%BULK_EXCEPTIONS, основной пакет не откатывается. После FORALL — разбираем ошибки и логируем отдельно.", "explanation_html": "<p>🚑 <strong>SAVE <strong>EXCEPTION</strong>S</strong> в <strong>FORALL</strong> — как скорая помощь, которая едет дальше после ДТП, не останавливая всю колонну. Ошибочные строки собираются в SQL%BULK_<strong>EXCEPTION</strong>S, основной пакет не откатывается. После <strong>FORALL</strong> — разбираем ошибки и логируем отдельно.</p>"}, {"id": 34, "topic": "Oracle PL/SQL", "subtopic": "Структура анонимных и именованных блоков PL/SQL - секции DECLARE, BEGIN, EXCEPTION, END и порядок их применения при разработке по готовому шаблону", "question": "Почему секция DECLARE в анонимном блоке PL/SQL должна располагаться до BEGIN?", "answers": ["Секция DECLARE резервирует память до выполнения, иначе Oracle не сможет оптимизировать запросы", "Переменные и типы должны быть объявлены до их использования в исполняемом коде блока BEGIN", "BEGIN не может запуститься без инициализации стека вызовов, которую выполняет DECLARE", "DECLARE обрабатывается компилятором в последнюю очередь, поэтому синтаксически идёт первой 12. Функции PL/SQL — разработка детерминированных и табличных функций (PIPELINED) для трансформации и хеширования данных в процессах Data Vault В процессе загрузки хабов Data Vault вы используете функцию хеширования для генерации HUB_HASH_KEY. Какой атрибут объявления функции гарантирует кеширование результатов между сессиями и исключает повторные вычисления хеша для одинаковых бизнес-ключей?"], "correct": 1, "explanation": "🏗️ DECLARE — это чертёж здания, BEGIN — стройка. Нельзя начать строить, если чертежей ещё нет. Oracle компилирует блок сверху вниз: сначала объявляет все типы и переменные, потом их использует. Если переменная встречается раньше объявления — ошибка компиляции.", "explanation_html": "<p><em class=\"analogy\">🏗️ <strong>DECLARE</strong> — это чертёж здания, <strong>BEGIN</strong> — стройка</em>. Нельзя начать строить, если чертежей ещё нет. Oracle компилирует блок сверху вниз: сначала объявляет все типы и переменные, потом их использует. Если переменная встречается раньше объявления — ошибка компиляции.</p>"}, {"id": 35, "topic": "Oracle PL/SQL", "subtopic": "Функции PL/SQL — разработка детерминированных и табличных функций (PIPELINED) для трансформации и хеширования данных в процессах Data Vault", "question": "В процессе загрузки хабов Data Vault вы используете функцию хеширования для генерации HUB_HASH_KEY. Какой атрибут объявления функции гарантирует кеширование результатов между сессиями и исключает повторные вычисления хеша для одинаковых бизнес-ключей?", "answers": ["NOCOPY — исключает копирование входных параметров и кеширует хеш-значения в PGA.", "PARALLEL_ENABLE — позволяет Oracle распределять вычисления хеша между параллельными процессами и автоматически кеширует промежуточные результаты в буферном пуле для повторного использования в рамках транзакции.", "DETERMINISTIC — Oracle кеширует результаты функции между сессиями в SGA, гарантируя, что одинаковые бизнес-ключи не вычисляются повторно при загрузке хабов Data Vault.", "RESULT_CACHE — Oracle кеширует результаты вызовов в SGA между сессиями, исключая повторные вычисления для одинаковых входных значений. 13. Хранимые процедуры PL/SQL — проектирование и реализация сложных процедур для загрузки данных в слои Data Vault (Hub, Link, Satellite) При загрузке данных в Hub таблицу Data Vault через PL/SQL процедуру необходимо избежать дублирования бизнес-ключей при параллельном запуске нескольких потоков — какой механизм Oracle следует применить?"], "correct": 3, "explanation": "💾 RESULT_CACHE — это термос для кофе: сварил один раз, храни горячим для всех. Oracle кэширует результат в SGA и возвращает его любой сессии без повторных вычислений. DETERMINISTIC тоже кэширует, но только в рамках одного запроса. RESULT_CACHE — между сессиями.", "explanation_html": "<p><em class=\"analogy\">💾 <strong>RESULT_CACHE</strong> — это термос для кофе: сварил один раз, храни горячим для всех</em>. Oracle кэширует результат в <strong>SGA</strong> и возвращает его любой сессии без повторных вычислений. <strong>DETERMINISTIC</strong> тоже кэширует, но только в рамках одного запроса. <strong>RESULT_CACHE</strong> — между сессиями.</p>"}, {"id": 36, "topic": "Oracle PL/SQL", "subtopic": "Хранимые процедуры PL/SQL — проектирование и реализация сложных процедур для загрузки данных в слои Data Vault (Hub, Link, Satellite)", "question": "При загрузке данных в Hub таблицу Data Vault через PL/SQL процедуру необходимо избежать дублирования бизнес-ключей при параллельном запуске нескольких потоков — какой механизм Oracle следует применить?", "answers": ["Применить SEQUENCE для генерации HASH_KEY — уникальные значения последовательности исключают коллизии между потоками", "Использовать SELECT FOR UPDATE на Hub таблице перед INSERT — блокирует строки и предотвращает дубли при параллельной загрузке", "Использовать MERGE с уникальным индексом на HASH_KEY (хэш от бизнес-ключа) — обеспечивает атомарность без явных блокировок. Альтернатива: DBMS_LOCK для сериализации потоков.", "Добавить уникальный индекс на BUSINESS_KEY вместо HASH_KEY — прямая индексация ключа надёжнее хэша при параллельном MERGE 14. Хранимые процедуры PL/SQL - разработка процедур загрузки данных в слои Data Vault с обработкой входных параметров и возвратом статуса выполнения Процедура загрузки хаба в Data Vault завершается с ошибкой ORA-00001 на уникальном индексе business key — какое решение правильно применить?"], "correct": 2, "explanation": "🔒 MERGE — как 'зарегистрировать или обновить' на сайте: если логин существует — ничего не делаем (WHEN MATCHED), если нет — создаём (WHEN NOT MATCHED). Для Hub это идеально: дублей не будет, уникальный индекс — страховка, атомарность — гарантия при параллельной загрузке.", "explanation_html": "<p><em class=\"analogy\">🔒 <strong>MERGE</strong> — как 'зарегистрировать или обновить' на сайте: если логин существует — ничего не делаем (WHEN MATCHED), если нет — создаём (WHEN NOT MATCHED)</em>. Для Hub это идеально: дублей не будет, уникальный индекс — страховка, атомарность — гарантия при параллельной загрузке.</p>"}, {"id": 37, "topic": "Oracle PL/SQL", "subtopic": "Хранимые процедуры PL/SQL - разработка процедур загрузки данных в слои Data Vault с обработкой входных параметров и возвратом статуса выполнения", "question": "Процедура загрузки хаба в Data Vault завершается с ошибкой ORA-00001 на уникальном индексе business key — какое решение правильно применить?", "answers": ["Удалить уникальный индекс на business key в таблице хаба и заменить его на неуникальный, поскольку проверку дубликатов в Data Vault должна выполнять отдельная процедура контроля качества данных, а не индексы базы данных.", "Использовать INSERT с хинтом IGNORE_ROW_ON_DUPKEY_INDEX, указав имя уникального индекса — это стандартный Oracle-подход для хабов Data Vault, позволяющий движку автоматически пропускать дубли без изменения логики процедуры.", "Использовать INSERT с конструкцией MERGE или INSERT ... WHERE NOT EXISTS, чтобы пропускать уже существующие бизнес-ключи и избегать дублирования.", "Добавить блок EXCEPTION WHEN DUP_VAL_ON_INDEX THEN NULL в процедуру загрузки хаба, чтобы при нарушении уникального индекса ошибка подавлялась и загрузка продолжалась для всех записей без остановки. 15. Представления (VIEW) - разработка представлений на слоях Business Vault и Information Mart с инкапсуляцией логики преобразования данных Data Vault В слое Business Vault вам нужно создать VIEW, которое вычисляет «активную» запись из satellite-таблицы (историчные данные с LOAD_DATE и LOAD_END_DATE). Какое условие WHERE следует использовать для получения только текущей записи?"], "correct": 2, "explanation": "🚧 INSERT...WHERE NOT EXISTS — как проверка очереди: 'если тебя нет в списке, добавляю'. MERGE делает то же самое атомарно. Это безопаснее простого INSERT при параллельной загрузке, когда несколько потоков могут одновременно попытаться вставить одну запись.", "explanation_html": "<p>🚧 INSERT...WHERE NOT EXISTS — как проверка очереди: 'если тебя нет в списке, добавляю'. <strong>MERGE</strong> делает то же самое атомарно. Это безопаснее простого INSERT при параллельной загрузке, когда несколько потоков могут одновременно попытаться вставить одну запись.</p>"}, {"id": 38, "topic": "Oracle PL/SQL", "subtopic": "Представления (VIEW) - разработка представлений на слоях Business Vault и Information Mart с инкапсуляцией логики преобразования данных Data Vault", "question": "В слое Business Vault вам нужно создать VIEW, которое вычисляет «активную» запись из satellite-таблицы (историчные данные с LOAD_DATE и LOAD_END_DATE). Какое условие WHERE следует использовать для получения только текущей записи?", "answers": ["WHERE LOAD_DATE = (SELECT MAX(LOAD_DATE) FROM satellite) — текущей считается запись с самой поздней датой загрузки", "WHERE LOAD_END_DATE = TO_DATE('9999-12-31', 'YYYY-MM-DD') — неверно, так как в Data Vault 2.0 активные записи всегда имеют NULL вместо sentinel-даты, а значение 9999-12-31 означает архивную запись", "WHERE LOAD_END_DATE IS NOT NULL — записи с указанной датой окончания являются актуальными, а NULL-значения относятся к архивным или удалённым версиям", "WHERE LOAD_END_DATE IS NULL — это стандартный паттерн в Data Vault: открытая запись (без даты окончания) считается текущей активной версией. 16. Процедуры PL/SQL - создание хранимых процедур с входными и выходными параметрами для загрузки данных в хабы и сателлиты Data Vault Почему при загрузке в хаб Data Vault хранимая процедура должна проверять существование записи перед вставкой?"], "correct": 3, "explanation": "🟢 WHERE LOAD_END_DATE IS NULL — универсальный признак актуальной записи в Data Vault. NULL означает 'открытая запись, неизвестно когда закончится'. Как договор без даты истечения — действует прямо сейчас. Когда придёт обновление, NULL заменится реальной датой.", "explanation_html": "<p><em class=\"analogy\">🟢 WHERE LOAD_END_DATE IS NULL — универсальный признак актуальной записи в Data Vault</em>. NULL означает 'открытая запись, неизвестно когда закончится'. Как договор без даты истечения — действует прямо сейчас. Когда придёт обновление, NULL заменится реальной датой.</p>"}, {"id": 39, "topic": "Oracle PL/SQL", "subtopic": "Процедуры PL/SQL - создание хранимых процедур с входными и выходными параметрами для загрузки данных в хабы и сателлиты Data Vault", "question": "Почему при загрузке в хаб Data Vault хранимая процедура должна проверять существование записи перед вставкой?", "answers": ["Хаб хранит только уникальные бизнес-ключи, повторная вставка нарушит уникальность и целостность данных", "Хаб допускает дубли, но проверка нужна для корректного обновления метаданных загрузки", "Без проверки сателлиты не смогут найти родительский хаб по хэш-ключу", "Проверка нужна для обновления существующих бизнес-ключей новыми значениями атрибутов из источника 17. Процедуры PL/SQL - создание хранимых процедур с входными и выходными параметрами для загрузки данных в хабы и сателлиты Data Vault Вы создаёте хранимую процедуру для загрузки данных в хаб Data Vault. Какой OUT-параметр необходимо добавить, чтобы вызывающий процесс мог получить количество успешно загруженных записей?"], "correct": 0, "explanation": "🏦 Hub — как реестр уникальных клиентов банка. Если клиент уже есть в реестре, повторно добавлять нельзя — нарушится уникальность. Поэтому перед INSERT проверяют: EXISTS в Hub? Если да — пропускаем, если нет — добавляем. MERGE делает это атомарно и элегантно.", "explanation_html": "<p><em class=\"analogy\">🏦 Hub — как реестр уникальных клиентов банка</em>. Если клиент уже есть в реестре, повторно добавлять нельзя — нарушится уникальность. Поэтому перед INSERT проверяют: EXISTS в Hub? Если да — пропускаем, если нет — добавляем. <strong>MERGE</strong> делает это атомарно и элегантно.</p>"}, {"id": 40, "topic": "Oracle PL/SQL", "subtopic": "Процедуры PL/SQL - создание хранимых процедур с входными и выходными параметрами для загрузки данных в хабы и сателлиты Data Vault", "question": "Вы создаёте хранимую процедуру для загрузки данных в хаб Data Vault. Какой OUT-параметр необходимо добавить, чтобы вызывающий процесс мог получить количество успешно загруженных записей?", "answers": ["Параметр типа NUMBER с модификатором IN OUT, так как количество строк нужно передавать в процедуру и получать обратно после загрузки.", "Параметр типа VARCHAR2 с модификатором OUT: p_status OUT VARCHAR2, которому присваивают значение 'SUCCESS' или 'ERROR' после INSERT.", "Параметр типа NUMBER с модификатором OUT: p_rows_loaded OUT NUMBER, которому присваивают значение ROWNUM после завершения INSERT, поскольку именно ROWNUM отражает общее число обработанных строк в текущей транзакции.", "Параметр типа NUMBER с модификатором OUT: p_rows_loaded OUT NUMBER, которому присваивают SQL%ROWCOUNT после INSERT. 18. Курсоры PL/SQL - явные курсоры и курсорные FOR-циклы для построчной обработки данных при реализации несложных трансформаций Вы пишете трансформацию: нужно перебрать строки таблицы ORDERS и для каждой строки обновить статус — какую конструкцию PL/SQL использовать?"], "correct": 2, "explanation": "📊 SQL%ROWCOUNT — встроенный счётчик Oracle: после INSERT он автоматически содержит количество вставленных строк. Присвой его в OUT-параметр: p_rows_loaded := SQL%ROWCOUNT. Вызывающий процесс (Informatica) получит цифру и узнает, сколько строк реально загружено.", "explanation_html": "<p><em class=\"analogy\">📊 SQL%ROWCOUNT — встроенный счётчик Oracle: после INSERT он автоматически содержит количество вставленных строк</em>. Присвой его в OUT-параметр: p_rows_loaded := SQL%ROWCOUNT. Вызывающий процесс (Informatica) получит цифру и узнает, сколько строк реально загружено.</p>"}, {"id": 41, "topic": "Oracle PL/SQL", "subtopic": "Курсоры PL/SQL - явные курсоры и курсорные FOR-циклы для построчной обработки данных при реализации несложных трансформаций", "question": "Вы пишете трансформацию: нужно перебрать строки таблицы ORDERS и для каждой строки обновить статус — какую конструкцию PL/SQL использовать?", "answers": ["Нужно использовать явный курсор с ручным управлением: OPEN cur; FETCH cur INTO rec; CLOSE cur; — только так PL/SQL гарантирует корректное построчное обновление без риска пропустить строки.", "Курсорный FOR-цикл: FOR rec IN (SELECT * FROM orders) LOOP UPDATE ... WHERE id = rec.id; END LOOP; — он автоматически открывает, читает и закрывает курсор.", "Курсорный FOR-цикл подходит только для SELECT-запросов и чтения данных, но для UPDATE внутри цикла необходимо явно объявить курсор через CURSOR cur IS ..., открыть его командой OPEN и после каждого FETCH вручную вызывать COMMIT, иначе изменения не сохранятся.", "FOR-цикл здесь избыточен — правильнее написать один UPDATE orders SET status = ... WHERE условие, это быстрее и не требует курсора вовсе."], "correct": 3, "explanation": "🎯 Один UPDATE orders SET status='X' WHERE condition заменяет 10 000 строк за один SQL-вызов. Цикл с курсором делает 10 000 отдельных вызовов. Принцип: всегда предпочитай один мощный SQL-оператор тысячам маленьких. Курсор нужен только когда логика слишком сложна для одного SQL.", "explanation_html": "<p><em class=\"analogy\">🎯 Один UPDATE orders SET status='X' WHERE condition заменяет 10 000 строк за один SQL-вызов</em>. Цикл с курсором делает 10 000 отдельных вызовов. Принцип: всегда предпочитай один мощный SQL-оператор тысячам маленьких. Курсор нужен только когда логика слишком сложна для одного SQL.</p>"}, {"id": 42, "topic": "SQL", "subtopic": "WHERE и HAVING — корректная фильтрация строк и агрегатов в одном аналитическом запросе", "question": "В DWH-запросе нужно отобрать только активные источники (status = 'active') и оставить лишь те, у которых суммарная загрузка превышает 1 000 000 записей — в каком месте запроса разместить каждое из условий?", "answers": ["WHERE — для агрегата, HAVING — для статуса.", "status = 'active' нужно поместить в HAVING, чтобы фильтрация происходила после группировки и не исключала источники, которые могли менять статус; SUM(records) > 1000000 — тоже в HAVING для корректного подсчёта итогов по всем строкам.", "Оба условия можно разместить в HAVING — он фильтрует и строки, и агрегаты, а WHERE в таком запросе избыточен.", "status = 'active' — в WHERE (фильтрует строки до агрегации), SUM(records) > 1000000 — в HAVING (фильтрует уже вычисленные агрегаты)."], "correct": 3, "explanation": "🍽️ WHERE — кухня (фильтруешь до готовки), HAVING — поднос (отбираешь готовые блюда). status='active' фильтрует строки до группировки — значит в WHERE. SUM(records) > 1000000 считается из агрегата — значит его ещё нет до GROUP BY, поэтому только в HAVING.", "explanation_html": "<p>🍽️ <strong>WHERE</strong> — кухня (фильтруешь до готовки), <strong>HAVING</strong> — поднос (отбираешь готовые блюда). status='active' фильтрует строки до группировки — значит в <strong>WHERE</strong>. <strong>SUM</strong>(records) > 1000000 считается из агрегата — значит его ещё нет до <strong>GROUP BY</strong>, поэтому только в <strong>HAVING</strong>.</p>"}, {"id": 43, "topic": "SQL", "subtopic": "Коррелированные подзапросы — механика выполнения, стоимость повторных вычислений и переписывание на JOIN или оконные функции с обоснованием выбора", "question": "Почему коррелированный подзапрос выполняется многократно, а не один раз?", "answers": ["Потому что SQL-движок не кэширует результаты подзапросов по соображениям безопасности транзакций: каждый повторный вызов гарантирует актуальность данных на момент чтения строки внешнего запроса, даже если значения в таблице не изменились.", "Потому что он ссылается на столбец внешнего запроса: для каждой строки внешнего запроса подзапрос вычисляется заново с новым значением этого столбца, не имея возможности быть материализованным заранее.", "Потому что подзапрос не имеет собственного индекса.", "Потому что оптимизатор намеренно избегает материализации подзапросов, содержащих агрегатные функции или JOIN, так как их результат зависит от статистики таблиц, которая может устареть между итерациями внешнего цикла, что делает однократное вычисление ненадёжным."], "correct": 1, "explanation": "🔄 Коррелированный подзапрос — как спросить у каждого прохожего: 'А ваш сосед дома?' Для каждой строки внешнего запроса он бегает в подзапрос с новым значением. 1 млн строк = 1 млн запусков подзапроса. Замена на JOIN или ROW_NUMBER() делает это одним проходом.", "explanation_html": "<p><em class=\"analogy\">🔄 Коррелированный подзапрос — как спросить у каждого прохожего: 'А ваш сосед дома?' Для каждой строки внешнего запроса он бегает в подзапрос с новым значением</em>. 1 млн строк = 1 млн запусков подзапроса. Замена на <strong>JOIN</strong> или <strong>ROW_NUMBER</strong>() делает это одним проходом.</p>"}, {"id": 44, "topic": "SQL", "subtopic": "CTE рекурсивные — обход иерархических структур данных при трансформации в рамках DWH-слоёв", "question": "В слое Staging DWH есть таблица с иерархией сотрудников (employee_id, manager_id). Какой SQL-конструкцией вы обойдёте всю иерархию от корневого менеджера до листовых узлов, сохранив уровень вложенности?", "answers": ["Рекурсивным CTE: в anchor-части выбираем корень (manager_id IS NULL), в рекурсивной части джойним CTE на исходную таблицу по условию cte.manager_id = employees.employee_id, то есть идём от потомков к родителям, инкрементируя счётчик уровня (level + 1).", "Рекурсивным CTE: в anchor-части выбираем листовые узлы (employee_id NOT IN SELECT manager_id), в рекурсивной части джойним по manager_id = employee_id, двигаясь снизу вверх, уровень уменьшаем на 1 (level - 1) на каждой итерации.", "Рекурсивным CTE: в anchor-части выбираем корень (manager_id IS NULL), в рекурсивной части джойним таблицу на саму CTE по employee_id = manager_id, добавляя счётчик уровня (level + 1).", "Обычным self-join через серию последовательных JOIN таблицы на саму себя: каждый дополнительный JOIN добавляет один уровень иерархии, а уровень вложенности считается номером джойна — это стандартный подход для иерархий фиксированной глубины в Staging-слое DWH."], "correct": 2, "explanation": "🌳 Рекурсивный CTE — обход дерева компании: начинаешь с CEO (manager_id IS NULL), потом находишь его прямых подчинённых (JOIN по employee_id = manager_id), потом их подчинённых и т.д. Счётчик уровня (+1 на каждом шаге) показывает, насколько глубоко в иерархии находится сотрудник.", "explanation_html": "<p><em class=\"analogy\">🌳 Рекурсивный <strong>CTE</strong> — обход дерева компании: начинаешь с CEO (manager_id IS <strong>NULL</strong>), потом находишь его прямых подчинённых (<strong>JOIN</strong> по employee_id = manager_id), потом их подчинённых и т.д</em>. Счётчик уровня (+1 на каждом шаге) показывает, насколько глубоко в иерархии находится сотрудник.</p>"}, {"id": 45, "topic": "SQL", "subtopic": "Индексы в запросах разработчика — понимание того, как условия в WHERE, JOIN ON и ORDER BY используют или не используют индексы, и переписывание запроса для их задействования", "question": "Почему применение функции к индексированному столбцу в WHERE делает индекс бесполезным?", "answers": ["Функция меняет тип данных столбца, что приводит к несовместимости с индексом: оптимизатор отказывается от его использования из соображений безопасности типов, предпочитая полный скан для гарантии корректного результата. Поэтому нужно явное приведение типов.", "Функция вычисляется для каждой строки, и оптимизатор не может сопоставить результат с заранее построенными индексными значениями — индекс хранит исходные значения столбца, а не результаты преобразований, поэтому движок вынужден выполнять полный скан таблицы.", "Индекс теряет избирательность при функциях.", "Индекс становится бесполезным потому, что база данных блокирует доступ к индексным страницам во время выполнения функции — это техническое ограничение менеджера блокировок, которое защищает от грязного чтения промежуточных результатов вычислений. После завершения функции индекс снова становится доступным. 5. CTE и вложенные подзапросы — архитектура многоуровневых WITH-выражений, материализация CTE и влияние на производительность сложных аналитических SELECT В Data Vault ETL-процессе на PostgreSQL 11 CTE используется трижды в одном SELECT: для хаба, сателлита и линка. Как принудительная материализация каждого CTE повлияет на производительность по сравнению с инлайн-подзапросами?"], "correct": 1, "explanation": "📚 Индекс — это алфавитный указатель в конце книги. Но если ты ищешь слово через YEAR(date), ты не ищешь по страницам указателя — ты перелистываешь всю книгу. Индекс хранит исходные значения дат, а не результаты функций. Решение: range-условие (date >= ... AND date < ...) или функциональный индекс.", "explanation_html": "<p><em class=\"analogy\">📚 Индекс — это алфавитный указатель в конце книги</em>. Но если ты ищешь слово через YEAR(date), ты не ищешь по страницам указателя — ты перелистываешь всю книгу. Индекс хранит исходные значения дат, а не результаты функций. Решение: range-условие (date >= ... AND date < ...) или функциональный индекс.</p>"}, {"id": 46, "topic": "SQL", "subtopic": "CTE и вложенные подзапросы — архитектура многоуровневых WITH-выражений, материализация CTE и влияние на производительность сложных аналитических SELECT", "question": "В Data Vault ETL-процессе на PostgreSQL 11 CTE используется трижды в одном SELECT: для хаба, сателлита и линка. Как принудительная материализация каждого CTE повлияет на производительность по сравнению с инлайн-подзапросами?", "answers": ["Материализованные CTE и инлайн-подзапросы в PostgreSQL 11 идентичны по производительности — оптимизатор автоматически выбирает наилучший план в обоих случаях, поэтому выбор между ними определяется только читаемостью кода.", "Инлайн-подзапросы блокируют predicate pushdown сильнее, чем материализованные CTE, поскольку каждый подзапрос создаёт отдельный контекст выполнения без доступа к внешним предикатам.", "Каждый CTE вычисляется ровно один раз, результат сохраняется во временное хранилище, predicate pushdown блокируется. Инлайн-подзапросы позволяют оптимизатору строить единый план с проталкиванием предикатов, что эффективнее при больших объёмах.", "Принудительная материализация CTE в PostgreSQL 11 ускоряет выполнение, так как каждый результат кешируется и переиспользуется без повторных вычислений, а оптимизатор получает статистику по промежуточным наборам данных для построения более точного плана соединений хаба, сателлита и линка. 6. Работа с историческими данными в Data Vault — написание SELECT для извлечения актуальных записей из сателлитов через оконные функции ROW_NUMBER/RANK без коррелированных подзапросов Напишите SELECT-запрос для извлечения актуальных записей из сателлита SAT_CUSTOMER (поля: HK_CUSTOMER, LOAD_DATE, NAME, EMAIL) на текущую дату, используя ROW_NUMBER без коррелированных подзапросов?"], "correct": 2, "explanation": "📦 В PostgreSQL 11 CTE — барьер оптимизации: результат материализуется во временном хранилище, предикаты не проталкиваются внутрь. Инлайн-подзапросы позволяют оптимизатору построить единый план. Для трёх CTE в Data Vault ETL это может означать три отдельных лишних прохода по данным.", "explanation_html": "<p><em class=\"analogy\">📦 В PostgreSQL 11 <strong>CTE</strong> — барьер оптимизации: результат материализуется во временном хранилище, предикаты не проталкиваются внутрь</em>. Инлайн-подзапросы позволяют оптимизатору построить единый план. Для трёх <strong>CTE</strong> в Data Vault ETL это может означать три отдельных лишних прохода по данным.</p>"}, {"id": 47, "topic": "SQL", "subtopic": "Работа с историческими данными в Data Vault — написание SELECT для извлечения актуальных записей из сателлитов через оконные функции ROW_NUMBER/RANK без коррелированных подзапросов", "question": "Напишите SELECT-запрос для извлечения актуальных записей из сателлита SAT_CUSTOMER (поля: HK_CUSTOMER, LOAD_DATE, NAME, EMAIL) на текущую дату, используя ROW_NUMBER без коррелированных подзапросов?", "answers": ["SELECT HK_CUSTOMER, NAME, EMAIL FROM (SELECT HK_CUSTOMER, LOAD_DATE, NAME, EMAIL, ROW_NUMBER() OVER (PARTITION BY HK_CUSTOMER ORDER BY LOAD_DATE ASC) AS rn FROM SAT_CUSTOMER WHERE LOAD_DATE <= CURRENT_DATE) t WHERE rn = 1 — партиционируем по хаш-ключу, но сортируем по возрастанию даты загрузки, получая первую загруженную запись вместо актуальной, что является типичной ошибкой при работе с историческими данными в Data Vault", "SELECT HK_CUSTOMER, NAME, EMAIL FROM (SELECT HK_CUSTOMER, LOAD_DATE, NAME, EMAIL, ROW_NUMBER() OVER (PARTITION BY HK_CUSTOMER ORDER BY LOAD_DATE DESC) AS rn FROM SAT_CUSTOMER) t WHERE rn = 1 AND LOAD_DATE = CURRENT_DATE — переносим фильтр по дате во внешний SELECT и меняем условие на точное совпадение с текущей датой, что исключает все записи кроме загруженных именно сегодня и ломает логику получения актуальной версии на любую произвольную дату", "SELECT HK_CUSTOMER, NAME, EMAIL FROM (SELECT HK_CUSTOMER, LOAD_DATE, NAME, EMAIL, ROW_NUMBER() OVER (PARTITION BY HK_CUSTOMER ORDER BY LOAD_DATE DESC) AS rn FROM SAT_CUSTOMER WHERE LOAD_DATE <= CURRENT_DATE) t WHERE rn = 1 — партиционируем по хаш-ключу, берём строку с максимальной датой загрузки (rn=1), фильтр выносим во внешний SELECT.", "SELECT HK_CUSTOMER, NAME, EMAIL FROM (SELECT HK_CUSTOMER, LOAD_DATE, NAME, EMAIL, ROW_NUMBER() OVER (PARTITION BY NAME ORDER BY LOAD_DATE DESC) AS rn FROM SAT_CUSTOMER WHERE LOAD_DATE <= CURRENT_DATE) t WHERE rn = 1 — партиционируем по полю NAME вместо хаш-ключа HK_CUSTOMER, что приводит к некорректной группировке записей: клиенты с одинаковыми именами будут объединены в одну партицию, и актуальные данные будут определяться неверно, нарушая целостность исторических данных 7. Оконные функции RANK и ROW_NUMBER — дедупликация записей и выбор актуальной версии данных при загрузке в сателлиты Data Vault Почему при дедупликации в сателлитах Data Vault используют ROW_NUMBER, а не RANK?"], "correct": 2, "explanation": "🥇 ROW_NUMBER() OVER(PARTITION BY HK_CUSTOMER ORDER BY LOAD_DATE DESC) = 1 берёт строку с самой поздней датой загрузки для каждого клиента. Это как взять последнее письмо из папки для каждого отправителя. Фильтр WHERE LOAD_DATE <= CURRENT_DATE ограничивает только прошлыми загрузками.", "explanation_html": "<p><em class=\"analogy\">🥇 <strong>ROW_NUMBER</strong>() OVER(<strong>PARTITION BY</strong> HK_CUSTOMER <strong>ORDER BY</strong> LOAD_DATE DESC) = 1 берёт строку с самой поздней датой загрузки для каждого клиента</em>. Это как взять последнее письмо из папки для каждого отправителя. Фильтр <strong>WHERE</strong> LOAD_DATE <= CURRENT_DATE ограничивает только прошлыми загрузками.</p>"}, {"id": 48, "topic": "SQL", "subtopic": "Оконные функции RANK и ROW_NUMBER — дедупликация записей и выбор актуальной версии данных при загрузке в сателлиты Data Vault", "question": "Почему при дедупликации в сателлитах Data Vault используют ROW_NUMBER, а не RANK?", "answers": ["RANK присваивает одинаковый номер дублям, оставляя несколько строк с рангом 1, тогда как ROW_NUMBER гарантирует уникальный номер каждой строке, позволяя выбрать ровно одну запись.", "ROW_NUMBER работает быстрее RANK при обработке больших объёмов данных в Data Vault, так как не выполняет сравнение значений между строками, что критично при загрузке миллионов записей в сателлиты.", "RANK корректно обрабатывает NULL-значения в ключевых полях сателлита, тогда как ROW_NUMBER игнорирует NULL и может случайно выбрать неактуальную версию записи, что нарушает историчность данных.", "RANK не поддерживает секционирование по хаб-ключам в конструкции PARTITION BY, поэтому при загрузке сателлитов Data Vault его применение ограничено, а ROW_NUMBER работает корректно с любыми разделами. 8. Оконные функции LAG и LEAD — вычисление разницы между текущим и предыдущим значением показателя в разрезе клиентских счетов Почему LAG без явного указания PARTITION BY может давать некорректные результаты при анализе показателей по клиентским счетам?"], "correct": 0, "explanation": "🏆 RANK — как соревнование: двое с одинаковым результатом получают оба 1-е место, следующий — 3-е. ROW_NUMBER — как нумерация в очереди: каждый получает уникальный номер, никаких ничьих. Для дедупликации нужен ровно один победитель → только ROW_NUMBER гарантирует это.", "explanation_html": "<p><em class=\"analogy\">🏆 <strong>RANK</strong> — как соревнование: двое с одинаковым результатом получают оба 1-е место, следующий — 3-е</em>. <strong>ROW_NUMBER</strong> — как нумерация в очереди: каждый получает уникальный номер, никаких ничьих. Для дедупликации нужен ровно один победитель → только <strong>ROW_NUMBER</strong> гарантирует это.</p>"}, {"id": 49, "topic": "SQL", "subtopic": "Оконные функции LAG и LEAD — вычисление разницы между текущим и предыдущим значением показателя в разрезе клиентских счетов", "question": "Почему LAG без явного указания PARTITION BY может давать некорректные результаты при анализе показателей по клиентским счетам?", "answers": ["Без PARTITION BY функция LAG берёт предыдущую строку по всему результирующему набору, игнорируя границы между счетами разных клиентов, что приводит к сравнению значений разных счетов вместо значений внутри одного счёта.", "Без PARTITION BY функция LAG не работает с датами, поэтому временные ряды по счетам вычисляются неверно — нужно явно указывать столбец с датой в секции PARTITION BY.", "Без PARTITION BY LAG использует глобальную сортировку, из-за чего для первой строки каждого нового счёта возвращается случайное значение вместо NULL.", "Без PARTITION BY LAG возвращает NULL для всех строк, кроме первой, так как не может определить порядок строк внутри каждого счёта без явного разбиения. 9. CTE рекурсивные — обход иерархических структур данных при трансформации в рамках DWH-слоёв Почему рекурсивный CTE требует наличия двух обязательных частей — якоря и рекурсивного шага?"], "correct": 0, "explanation": "📊 LAG без PARTITION BY — как смотреть на предыдущую строку в общем списке, игнорируя, чьи это данные. Если список отсортирован по дате, последняя строка клиента А может быть рядом с первой строкой клиента Б — и LAG сравнит их как будто они одного счёта. Нужен PARTITION BY account_id!", "explanation_html": "<p><em class=\"analogy\">📊 <strong>LAG</strong> без <strong>PARTITION BY</strong> — как смотреть на предыдущую строку в общем списке, игнорируя, чьи это данные</em>. Если список отсортирован по дате, последняя строка клиента А может быть рядом с первой строкой клиента Б — и <strong>LAG</strong> сравнит их как будто они одного счёта. Нужен <strong>PARTITION BY</strong> account_id!</p>"}, {"id": 50, "topic": "SQL", "subtopic": "CTE рекурсивные — обход иерархических структур данных при трансформации в рамках DWH-слоёв", "question": "Почему рекурсивный CTE требует наличия двух обязательных частей — якоря и рекурсивного шага?", "answers": ["Якорь задаёт начальную точку обхода, рекурсивный шаг многократно присоединяет дочерние узлы, пока не останется новых строк — без якоря рекурсия не имеет точки старта и уходит в бесконечный цикл.", "Якорь задаёт условие остановки рекурсии, без него запрос зациклится.", "Две части обязательны, так как SQL-стандарт требует явного разделения базового набора данных и преобразующей логики — якорь фильтрует строки верхнего уровня, а рекурсивный шаг применяет агрегатные функции для вычисления итоговых метрик по каждому узлу иерархии.", "Якорь нужен только для оптимизации запроса — без него рекурсия всё равно выполнится, но значительно медленнее, поскольку планировщик не сможет построить эффективный план выполнения и будет сканировать всю таблицу на каждом шаге. 10. JOIN-операции - применение INNER JOIN для соединения таблицы фактов с таблицей измерений при выгрузке данных Почему INNER JOIN между таблицей фактов и измерений возвращает только совпадающие записи, исключая факты без соответствующего измерения?"], "correct": 0, "explanation": "🌿 Рекурсивный CTE без якоря — как лестница без первой ступеньки: не знаешь откуда начинать подниматься. Якорь (anchor) = корень дерева (manager_id IS NULL). Рекурсивный шаг = повторное присоединение дочерних узлов. Без якоря — бесконечный цикл или ошибка.", "explanation_html": "<p><em class=\"analogy\">🌿 Рекурсивный <strong>CTE</strong> без якоря — как лестница без первой ступеньки: не знаешь откуда начинать подниматься</em>. Якорь (anchor) = корень дерева (manager_id IS <strong>NULL</strong>). Рекурсивный шаг = повторное присоединение дочерних узлов. Без якоря — бесконечный цикл или ошибка.</p>"}, {"id": 51, "topic": "SQL", "subtopic": "JOIN-операции - применение INNER JOIN для соединения таблицы фактов с таблицей измерений при выгрузке данных", "question": "Почему INNER JOIN между таблицей фактов и измерений возвращает только совпадающие записи, исключая факты без соответствующего измерения?", "answers": ["INNER JOIN исключает несовпадающие записи, потому что автоматически применяет фильтрацию NULL-значений: если ключ в таблице фактов равен NULL или отсутствует в индексе измерения, оптимизатор базы данных отбрасывает такие строки ещё до выполнения соединения, оставляя только валидные записи.", "INNER JOIN возвращает только совпадающие строки, так как таблица измерений является главной (driving table) и задаёт границы выборки — факты без измерения исключаются, потому что движок SQL сначала сканирует измерение и только затем ищет соответствующие факты, игнорируя всё лишнее.", "INNER JOIN возвращает только строки, где ключ соединения существует в обеих таблицах одновременно — факты без соответствующего значения в измерении отсутствуют в результате, так как условие соединения не выполняется.", "INNER JOIN фильтрует данные через условие WHERE. 11. Агрегатные функции - использование COUNT и SUM для подсчёта транзакций и сумм в разрезе клиентов Напишите SQL-запрос, который подсчитывает количество транзакций и общую сумму по каждому клиенту из таблицы transactions (поля: client_id, amount)?"], "correct": 2, "explanation": "🤝 INNER JOIN — рукопожатие: работает только если ОБА человека протянули руку. Факт без измерения (нет пары в customer_dim) — рукопожатия нет, строка исчезает. Если нужны все факты даже без измерений — используй LEFT JOIN.", "explanation_html": "<p><em class=\"analogy\">🤝 <strong>INNER <strong>JOIN</strong> — рукопожатие: работает только если ОБА человека протянули руку</em>. Факт без измерения (нет пары в customer_dim) — рукопожатия нет, строка исчезает. Если нужны все факты даже без измерений — используй <strong>LEFT <strong>JOIN</strong>.</p>"}, {"id": 52, "topic": "SQL", "subtopic": "Агрегатные функции - использование COUNT и SUM для подсчёта транзакций и сумм в разрезе клиентов", "question": "Напишите SQL-запрос, который подсчитывает количество транзакций и общую сумму по каждому клиенту из таблицы transactions (поля: client_id, amount)?", "answers": ["SELECT client_id, COUNT(*) AS cnt_transactions, SUM(amount) AS total_amount FROM transactions GROUP BY client_id;", "SELECT client_id, COUNT(*) AS cnt_transactions, SUM(amount) AS total_amount FROM transactions GROUP BY amount;", "SELECT client_id, COUNT(amount) AS cnt_transactions, SUM(amount) AS total_amount FROM transactions;", "SELECT client_id, SUM(*) AS cnt_transactions, COUNT(amount) AS total_amount FROM transactions GROUP BY client_id; 12. Агрегатные функции - применение AVG, MIN, MAX для расчёта базовых метрик по группам данных Почему AVG игнорирует NULL-значения при расчёте среднего?"], "correct": 0, "explanation": "🧮 Классический запрос агрегации: SELECT client_id, COUNT(*) AS cnt, SUM(amount) AS total FROM transactions GROUP BY client_id. GROUP BY группирует строки по клиенту, COUNT считает количество, SUM суммирует. Это основа любой аналитики.", "explanation_html": "<p><em class=\"analogy\">🧮 Классический запрос агрегации: SELECT client_id, <strong>COUNT</strong>(*) AS cnt, <strong>SUM</strong>(amount) AS total FROM transactions <strong>GROUP BY</strong> client_id</em>. <strong>GROUP BY</strong> группирует строки по клиенту, <strong>COUNT</strong> считает количество, <strong>SUM</strong> суммирует. Это основа любой аналитики.</p>"}, {"id": 53, "topic": "SQL", "subtopic": "Агрегатные функции - применение AVG, MIN, MAX для расчёта базовых метрик по группам данных", "question": "Почему AVG игнорирует NULL-значения при расчёте среднего?", "answers": ["NULL-значения игнорируются функцией AVG по техническим причинам — движок базы данных не умеет складывать неопределённые значения, поэтому строки с NULL полностью исключаются из выборки, включая знаменатель и числитель", "AVG исключает NULL из расчёта только ради производительности: обработка пустых значений требует дополнительных ресурсов, а результат при их включении был бы идентичным, так как NULL равен 0", "AVG игнорирует NULL, потому что это стандартное поведение всех числовых функций SQL — любая арифметика с NULL даёт NULL, поэтому движок автоматически заменяет их нулями перед подсчётом", "NULL означает отсутствие данных, включение исказило бы среднее — SQL исключает их из подсчёта суммы и количества строк автоматически 13. Фильтрация данных - разница между WHERE и HAVING при фильтрации строк и агрегированных значений В таблице orders нужно найти клиентов, сделавших более 5 заказов, но только среди тех, у кого статус 'active' — где правильно разместить каждое условие?"], "correct": 3, "explanation": "⚖️ NULL — это 'неизвестно', а не ноль. Если у 3 студентов известна оценка (8, 9, 10) и у 2 неизвестна (NULL), среднее = (8+9+10)/3 = 9, а не (8+9+10+0+0)/5 = 7.2. SQL правильно исключает неизвестные значения, чтобы не исказить реальное среднее.", "explanation_html": "<p><em class=\"analogy\">⚖️ <strong>NULL</strong> — это 'неизвестно', а не ноль</em>. Если у 3 студентов известна оценка (8, 9, 10) и у 2 неизвестна (<strong>NULL</strong>), среднее = (8+9+10)/3 = 9, а не (8+9+10+0+0)/5 = 7.2. SQL правильно исключает неизвестные значения, чтобы не исказить реальное среднее.</p>"}, {"id": 54, "topic": "SQL", "subtopic": "Фильтрация данных - разница между WHERE и HAVING при фильтрации строк и агрегированных значений", "question": "В таблице orders нужно найти клиентов, сделавших более 5 заказов, но только среди тех, у кого статус 'active' — где правильно разместить каждое условие?", "answers": ["Оба условия нужно поместить в HAVING, так как оба относятся к фильтрации по клиентам, а HAVING работает со всеми условиями после GROUP BY.", "Оба в WHERE: WHERE status='active' AND count>5.", "Статус 'active' следует проверять через HAVING (он применяется ко всем строкам группы), а количество заказов >5 — через WHERE, поскольку WHERE обрабатывает числовые сравнения быстрее до агрегации.", "Статус 'active' фильтруется через WHERE (до агрегации), условие на количество заказов >5 — через HAVING (после агрегации GROUP BY). 14. Оконные функции - понимание конструкции OVER(PARTITION BY ... ORDER BY ...) при работе с данными хранилища Почему PARTITION BY в оконной функции не уменьшает количество строк в результате запроса, в отличие от GROUP BY?"], "correct": 3, "explanation": "🏷️ Двухэтапная фильтрация: WHERE отсеивает неактивных клиентов ДО подсчёта заказов (экономит вычисления). HAVING отбрасывает тех, у кого мало заказов ПОСЛЕ подсчёта (может работать только с агрегатом). Смешать их нельзя — WHERE не знает COUNT(*), HAVING не нужен для status.", "explanation_html": "<p><em class=\"analogy\">🏷️ Двухэтапная фильтрация: <strong>WHERE</strong> отсеивает неактивных клиентов ДО подсчёта заказов (экономит вычисления)</em>. <strong>HAVING</strong> отбрасывает тех, у кого мало заказов ПОСЛЕ подсчёта (может работать только с агрегатом). Смешать их нельзя — <strong>WHERE</strong> не знает <strong>COUNT</strong>(*), <strong>HAVING</strong> не нужен для status.</p>"}, {"id": 55, "topic": "SQL", "subtopic": "Оконные функции - понимание конструкции OVER(PARTITION BY ... ORDER BY ...) при работе с данными хранилища", "question": "Почему PARTITION BY в оконной функции не уменьшает количество строк в результате запроса, в отличие от GROUP BY?", "answers": ["PARTITION BY только разбивает строки на группы для вычисления, но сохраняет каждую строку в результате — агрегация происходит без схлопывания строк.", "PARTITION BY автоматически добавляет скрытую группировку, которая объединяет дублирующиеся строки внутри раздела, поэтому итоговое число строк зависит от уникальности значений в указанном столбце.", "PARTITION BY работает после GROUP BY, поэтому строки уже сгруппированы до применения оконной функции и их количество не меняется.", "PARTITION BY не уменьшает строки, потому что оконные функции запрещено применять без ORDER BY, и именно ORDER BY сохраняет исходный порядок и количество записей. 15. Агрегатные функции - применение AVG, MIN, MAX для расчёта базовых метрик по группам данных Напишите SQL-запрос, который вычисляет среднюю, минимальную и максимальную сумму заказа по каждому региону из таблицы orders (поля: region, order_amount)?"], "correct": 0, "explanation": "🎥 GROUP BY — режиссёрская склейка: из 10 кадров делает 1 финальный. PARTITION BY — как монтажная таблица: кадры остаются все, но для каждого рассчитывается результат в контексте его группы. Количество строк в результате не меняется.", "explanation_html": "<p>🎥 <strong>GROUP BY</strong> — режиссёрская склейка: из 10 кадров делает 1 финальный. <strong>PARTITION BY</strong> — как монтажная таблица: кадры остаются все, но для каждого рассчитывается результат в контексте его группы. Количество строк в результате не меняется.</p>"}, {"id": 56, "topic": "SQL", "subtopic": "Агрегатные функции - применение AVG, MIN, MAX для расчёта базовых метрик по группам данных", "question": "Напишите SQL-запрос, который вычисляет среднюю, минимальную и максимальную сумму заказа по каждому региону из таблицы orders (поля: region, order_amount)?", "answers": ["SELECT region, AVG(order_amount), MIN(order_amount), MAX(order_amount) FROM orders WHERE region IS NOT NULL ORDER BY region;", "SELECT region, AVG(order_amount), MIN(order_amount), MAX(order_amount) FROM orders GROUP BY region;", "SELECT AVG(order_amount), MIN(order_amount), MAX(order_amount) FROM orders;", "SELECT region, AVERAGE(order_amount), MINIMUM(order_amount), MAXIMUM(order_amount) FROM orders GROUP BY region HAVING COUNT(*) > 0; 16. Агрегирование и HAVING — разница между фильтрацией в WHERE и HAVING, поведение агрегатов при работе с большими объёмами данных хранилища В хранилище есть таблица фактов на 500 млн строк. Запрос с GROUP BY + HAVING COUNT(*) > 1000 выполняется 40 минут. Какое изменение в логике фильтрации даст наибольший прирост производительности?"], "correct": 1, "explanation": "📊 SELECT region, AVG(order_amount), MIN(order_amount), MAX(order_amount) FROM orders GROUP BY region — три агрегата в одном запросе с группировкой по региону. Запомни: каждое не-агрегированное поле в SELECT обязано быть в GROUP BY.", "explanation_html": "<p><em class=\"analogy\">📊 SELECT region, <strong>AVG</strong>(order_amount), MIN(order_amount), MAX(order_amount) FROM orders <strong>GROUP BY</strong> region — три агрегата в одном запросе с группировкой по региону</em>. Запомни: каждое не-агрегированное поле в SELECT обязано быть в <strong>GROUP BY</strong>.</p>"}, {"id": 57, "topic": "SQL", "subtopic": "Агрегирование и HAVING — разница между фильтрацией в WHERE и HAVING, поведение агрегатов при работе с большими объёмами данных хранилища", "question": "В хранилище есть таблица фактов на 500 млн строк. Запрос с GROUP BY + HAVING COUNT(*) > 1000 выполняется 40 минут. Какое изменение в логике фильтрации даст наибольший прирост производительности?", "answers": ["Заменить HAVING COUNT(*) > 1000 на подзапрос с WHERE в CTE — оптимизатор выполнит фильтрацию до агрегации, так как CTE материализуется отдельно и обрабатывает меньший объём данных, чем прямой HAVING.", "Добавить индекс на столбцы из GROUP BY — это позволит движку использовать index scan вместо full table scan при агрегации, и HAVING будет применяться уже к предварительно отсортированным данным индекса, минуя сортировку всей таблицы.", "Наибольший прирост даст замена COUNT(*) на COUNT(1) — COUNT(*) сканирует все столбцы строки, тогда как COUNT(1) работает только с константой, что на таблицах в 500 млн строк сокращает I/O и время агрегации в несколько раз.", "Добавить предварительную фильтрацию через WHERE до агрегации — WHERE отсекает строки до GROUP BY, уменьшая объём данных для агрегирования. HAVING фильтрует уже после агрегации всего набора, поэтому движок всё равно обрабатывает все 500 млн строк. Если бизнес-логика позволяет заранее ограничить диапазон (например, по дате или статусу), WHERE-условие сократит объём агрегируемых данных на порядки и кардинально снизит время выполнения. 6. Агрегирование и HAVING — разница между фильтрацией в WHERE и HAVING, поведение агрегатов при работе с большими объёмами данных хранилища Почему фильтрация через HAVING выполняется медленнее, чем аналогичная фильтрация через WHERE?"], "correct": 3, "explanation": "⚡ HAVING COUNT(*) > 1000 работает ПОСЛЕ того как сгруппировались все 500 млн строк. WHERE до GROUP BY — фильтрует строки ДО группировки. Если можно отсечь данные по дате или статусу через WHERE — движок обрабатывает гораздо меньший объём. Это самый мощный способ ускорить такие запросы.", "explanation_html": "<p><em class=\"analogy\">⚡ <strong>HAVING</strong> <strong>COUNT</strong>(*) > 1000 работает ПОСЛЕ того как сгруппировались все 500 млн строк</em>. <strong>WHERE</strong> до <strong>GROUP BY</strong> — фильтрует строки ДО группировки. Если можно отсечь данные по дате или статусу через <strong>WHERE</strong> — движок обрабатывает гораздо меньший объём. Это самый мощный способ ускорить такие запросы.</p>"}, {"id": 58, "topic": "SQL", "subtopic": "Индексы — принципы работы B-tree индексов и влияние на план выполнения SELECT-запросов при разработке трансформаций", "question": "Почему B-tree индекс не используется оптимизатором при выборке более 10–20% строк таблицы?", "answers": ["B-tree индекс не используется при выборке более 10–20% строк из-за ограничений блокировочного механизма: при массовом чтении через индекс возникает конкуренция за блокировки на листовых страницах индекса, и оптимизатор предпочитает Full Scan, чтобы снизить нагрузку на менеджер блокировок.", "При выборке более 10–20% строк B-tree индекс перестаёт помещаться в буферный кэш базы данных, и оптимизатор автоматически переключается на Full Scan, чтобы избежать вытеснения горячих страниц из памяти и сохранить производительность других запросов.", "При большом проценте выбираемых строк оптимизатор отказывается от B-tree индекса, потому что глубина дерева становится слишком большой для эффективного обхода: каждый дополнительный уровень узлов увеличивает количество сравнений, что делает обход медленнее последовательного чтения.", "Полное сканирование таблицы (Full Scan) становится дешевле: чтение индексных блоков плюс случайный доступ к блокам данных даёт больше I/O-операций, чем последовательное чтение всей таблицы подряд. 18. Работа с историческими данными в Data Vault — написание SELECT для извлечения актуальных записей из сателлитов через оконные функции ROW_NUMBER/RANK без коррелированных подзапросов Почему использование ROW_NUMBER() предпочтительнее коррелированного подзапроса при извлечении актуальных записей из сателлита Data Vault?"], "correct": 3, "explanation": "📚 Индекс помогает найти 100 строк из миллиона (как указатель в книге). Но если нужно прочитать 200 тыс. строк из миллиона (20%+) — быстрее просто пролистать всю книгу подряд. Чтение подряд (Sequential Scan) эффективнее хаотичных прыжков по индексу при большом % выборки.", "explanation_html": "<p><em class=\"analogy\">📚 Индекс помогает найти 100 строк из миллиона (как указатель в книге)</em>. Но если нужно прочитать 200 тыс. строк из миллиона (20%+) — быстрее просто пролистать всю книгу подряд. Чтение подряд (Sequential Scan) эффективнее хаотичных прыжков по индексу при большом % выборки.</p>"}, {"id": 59, "topic": "SQL", "subtopic": "Работа с историческими данными в Data Vault — написание SELECT для извлечения актуальных записей из сателлитов через оконные функции ROW_NUMBER/RANK без коррелированных подзапросов", "question": "Почему использование ROW_NUMBER() предпочтительнее коррелированного подзапроса при извлечении актуальных записей из сателлита Data Vault?", "answers": ["ROW_NUMBER() вычисляется за один проход по данным (single scan), тогда как коррелированный подзапрос выполняется повторно для каждой строки внешнего запроса — это даёт кратный выигрыш в производительности на больших объёмах исторических данных сателлита.", "Коррелированный подзапрос создаёт временную таблицу для каждой группы хабов, а ROW_NUMBER() работает в памяти без дисковых операций, поэтому потребляет меньше I/O.", "ROW_NUMBER() предпочтительнее, потому что поддерживается всеми СУБД без исключений, а коррелированные подзапросы имеют ограничения в синтаксисе некоторых диалектов SQL, используемых в хранилищах данных.", "ROW_NUMBER() автоматически использует индексы по ключевым полям сателлита, тогда как коррелированный подзапрос обходит индексы и читает данные последовательно, что критично при больших объёмах. Sokolov vyacheslav"], "correct": 0, "explanation": "🚂 ROW_NUMBER() — как товарный поезд: все вагоны просматриваются за один рейс. Коррелированный подзапрос — как курьер, который за каждым письмом едет на склад отдельно. При 50 млн строк курьер делает 50 млн поездок. Разница в производительности — в десятки раз.", "explanation_html": "<p><em class=\"analogy\">🚂 <strong>ROW_NUMBER</strong>() — как товарный поезд: все вагоны просматриваются за один рейс</em>. Коррелированный подзапрос — как курьер, который за каждым письмом едет на склад отдельно. При 50 млн строк курьер делает 50 млн поездок. Разница в производительности — в десятки раз.</p>"}, {"id": 60, "topic": "SQL", "subtopic": "Surrogate Key в Data Vault - принципы формирования и использование в hub, link и satellite", "question": "В Data Vault Hub для сущности 'Клиент' поступают записи из двух источников. На основе чего генерируется Surrogate Key?", "answers": ["Surrogate Key генерируется хэшем (MD5/SHA-1) только от Business Key, обеспечивая уникальность бизнес-сущности независимо от источника.", "Surrogate Key вычисляется хэшем от Business Key совместно с датой загрузки записи, поскольку одна бизнес-сущность может иметь разные ключи в разные периоды времени.", "Surrogate Key генерируется хэшем от комбинации Business Key и названия источника данных, что гарантирует уникальность записи в разрезе каждой системы-источника отдельно.", "Surrogate Key формируется как автоинкрементный числовой идентификатор на основе последовательности базы данных, что обеспечивает уникальность и высокую производительность при загрузке данных."], "correct": 0, "explanation": "🎭 Surrogate Key = хэш от BK + название источника. Зачем включать источник? Потому что CRM и ERP могут иметь одинаковые business key для разных объектов. Хэш только от BK без источника вызвал бы коллизии. Включение источника гарантирует уникальность в разрезе каждой системы.", "explanation_html": "<p><em class=\"analogy\">🎭 Surrogate Key = хэш от BK + название источника</em>. Зачем включать источник? Потому что CRM и ERP могут иметь одинаковые business key для разных объектов. Хэш только от BK без источника вызвал бы коллизии. Включение источника гарантирует уникальность в разрезе каждой системы.</p>"}, {"id": 61, "topic": "SQL", "subtopic": "Satellite-таблицы Data Vault - структура, назначение атрибутов и связь с родительским hub", "question": "Вы создаёте Satellite для Hub_Customer. Какой внешний ключ должен присутствовать в таблице Satellite для связи с родительским Hub?", "answers": ["Поле Hub_Customer_HashKey (хэш-ключ родительского Hub) — внешний ключ в Satellite, ссылающийся на первичный ключ Hub_Customer.", "Satellite не содержит внешних ключей на Hub — связь обеспечивается через Load_Date и Record_Source, которые однозначно идентифицируют запись и её происхождение.", "Поле Satellite_HashKey — собственный первичный ключ таблицы Satellite, который одновременно служит внешним ключом для Hub_Customer и формируется как хэш от атрибутов самого Satellite.", "Поле Customer_ID (натуральный бизнес-ключ клиента) — внешний ключ в Satellite, напрямую ссылающийся на исходный идентификатор из источника данных."], "correct": 0, "explanation": "🔗 Satellite не существует сам по себе — он 'прикреплён' к Hub через внешний ключ Hub_Customer_HashKey. Это как папка с документами, на которой написано 'Клиент #12345'. Без этой ссылки непонятно, чьи это данные. HashKey Hub'а = FK в Satellite.", "explanation_html": "<p><em class=\"analogy\">🔗 Satellite не существует сам по себе — он 'прикреплён' к Hub через внешний ключ Hub_Customer_HashKey</em>. Это как папка с документами, на которой написано 'Клиент #12345'. Без этой ссылки непонятно, чьи это данные. HashKey Hub'а = FK в Satellite.</p>"}, {"id": 62, "topic": "SQL", "subtopic": "Составной business key — обоснование и формирование ключа из нескольких атрибутов источника при сложной логике уникальности", "question": "В источнике заказы идентифицируются комбинацией region_code + order_type + order_number, причём order_number уникален только внутри region_code и order_type — как правильно сформировать business key для Hub в Data Vault?", "answers": ["Конкатенировать все три атрибута в единый BK: например, region_code || '~' || order_type || '~' || order_number, используя разделитель, исключающий коллизии. Хэш вычисляется от этой строки целиком.", "Хэш считается от каждого атрибута отдельно, потом хэши XOR-ятся в один HK.", "Для составного ключа следует создать три отдельных Hub — по одному на каждый атрибут (HubRegion, HubOrderType, HubOrder), а затем связать их через Link, поскольку Data Vault предписывает хранить каждый бизнес-объект в собственном Hub без смешивания атрибутов в одном ключе.", "Достаточно использовать только order_number как BK, а region_code и order_type вынести в сателлит — они описывают контекст заказа, но не участвуют в уникальности на уровне Hub. 6. Link-таблицы Data Vault — правила проектирования связей между hub-сущностями без атрибутивной нагрузки Почему Link-таблица в Data Vault не должна содержать описательных атрибутов бизнес-сущностей?"], "correct": 0, "explanation": "📍 order_number='42' уникален только внутри region='KZ' И order_type='RETAIL'. Значит, ключ клиента — комбинация всех трёх: 'KZ~RETAIL~42'. Конкатенируешь с разделителем (чтобы 'K'+'Z42' не совпало с 'KZ'+'42'), хэшируешь — получаешь уникальный Hub Hash Key.", "explanation_html": "<p><em class=\"analogy\">📍 order_number='42' уникален только внутри region='KZ' И order_type='RETAIL'</em>. Значит, ключ клиента — комбинация всех трёх: 'KZ~RETAIL~42'. Конкатенируешь с разделителем (чтобы 'K'+'Z42' не совпало с 'KZ'+'42'), хэшируешь — получаешь уникальный Hub Hash Key.</p>"}, {"id": 63, "topic": "SQL", "subtopic": "Link-таблицы Data Vault — правила проектирования связей между hub-сущностями без атрибутивной нагрузки", "question": "Почему Link-таблица в Data Vault не должна содержать описательных атрибутов бизнес-сущностей?", "answers": ["Link хранит только факт связи между Hub-ами через их суррогатные ключи; описательные атрибуты относятся к Satellite-таблицам, что обеспечивает неизменность структуры Link при изменении бизнес-правил и позволяет версионировать атрибуты независимо от самой связи.", "Описательные атрибуты исключаются из Link, потому что они относятся исключительно к Hub-таблицам: каждый Hub хранит как бизнес-ключ, так и все описательные характеристики своей сущности, а Link лишь ссылается на уже обогащённые Hub-записи через суррогатные ключи, что и обеспечивает целостность модели.", "Link-таблица не должна содержать атрибутов, потому что это увеличивает объём хранимых данных и замедляет JOIN-операции. Все дополнительные поля выносятся в Hub-таблицы, где они хранятся рядом с бизнес-ключами для быстрого доступа.", "Link не содержит описательных атрибутов, так как Data Vault запрещает любые поля кроме суррогатных ключей и дат загрузки — это жёсткое техническое ограничение движков ETL, которые не умеют обрабатывать атрибуты в таблицах связей при параллельной загрузке. 7. Добавление атрибутов в существующую satellite-таблицу - порядок действий, типы данных и соблюдение стандартов Вы добавляете атрибут arrival_date в существующую satellite-таблицу SAT_CLIENT. Какой тип данных следует использовать для хранения даты прибытия без временной метки?"], "correct": 0, "explanation": "🏠 Link — это запись в книге актов: 'Клиент 123 купил Товар 456'. В книге актов нет места для суммы покупки — это отдельный документ (Satellite к Link). Link хранит только ФАКТ связи (кто с кем), а атрибуты этой связи — в Satellite.", "explanation_html": "<p><em class=\"analogy\">🏠 Link — это запись в книге актов: 'Клиент 123 купил Товар 456'</em>. В книге актов нет места для суммы покупки — это отдельный документ (Satellite к Link). Link хранит только ФАКТ связи (кто с кем), а атрибуты этой связи — в Satellite.</p>"}, {"id": 64, "topic": "Модели данных DWH", "subtopic": "Добавление атрибутов в существующую satellite-таблицу - порядок действий, типы данных и соблюдение стандартов", "question": "Вы добавляете атрибут arrival_date в существующую satellite-таблицу SAT_CLIENT. Какой тип данных следует использовать для хранения даты прибытия без временной метки?", "answers": ["TIMESTAMP — универсальный тип, который автоматически обрезает время при сохранении, поэтому подходит для хранения только дат.", "VARCHAR(10) — гибкий формат 'YYYY-MM-DD' позволяет хранить дату без времени и упрощает интеграцию с источниками.", "DATETIME — стандартный тип для дат в Data Vault, DATE устарел и не рекомендуется в современных DWH.", "DATE — хранит только дату (год, месяц, день) без времени, что соответствует требованию и стандартам именования атрибутов в Data Vault. 17. Разграничение компонентов Data Vault — логика разделения ключей, связей и атрибутов между hub, link и satellite В системе есть сущность «Клиент» с полями: customer_id, name, email, phone, created_date — в какой компонент Data Vault поместить поле email?"], "correct": 3, "explanation": "⚠️ Важно: DATE в Oracle — правильный выбор. VARCHAR(10) — плохо, потому что строки не сортируются как даты, нет валидации формата, нельзя делать арифметику. TIMESTAMP содержит лишнее время. DATE хранит год-месяц-день без времени и поддерживает все операции с датами.", "explanation_html": "<p><em class=\"analogy\">⚠️ Важно: DATE в Oracle — правильный выбор</em>. VARCHAR(10) — плохо, потому что строки не сортируются как даты, нет валидации формата, нельзя делать арифметику. TIMESTAMP содержит лишнее время. DATE хранит год-месяц-день без времени и поддерживает все операции с датами.</p>"}, {"id": 65, "topic": "Модели данных DWH", "subtopic": "Satellite-таблицы — структура и назначение полей для хранения атрибутов hub и link сущностей", "question": "Почему satellite-таблица содержит технический атрибут load_end_date, и что означает NULL в этом поле?", "answers": ["load_end_date заполняется при первичной загрузке и содержит NULL только для исторических записей, которые были удалены из источника.", "NULL в поле load_end_date указывает на ошибку загрузки: запись не получила временную метку окончания из-за сбоя в ETL-процессе.", "NULL в load_end_date означает, что запись ещё не прошла валидацию и будет заполнена после успешной проверки данных системой контроля качества.", "NULL означает актуальную запись; поле заполняется системой при появлении новой версии."], "correct": 3, "explanation": "📖 NULL в load_end_date = 'действует прямо сейчас'. Это НЕ ошибка загрузки — это проектное решение. Когда придёт новая версия записи, ETL-процесс обновит load_end_date текущей записи (закроет её) и вставит новую с NULL. Паттерн SCD Type 2 в исполнении Data Vault.", "explanation_html": "<p><em class=\"analogy\">📖 NULL в load_end_date = 'действует прямо сейчас'</em>. Это НЕ ошибка загрузки — это проектное решение. Когда придёт новая версия записи, ETL-процесс обновит load_end_date текущей записи (закроет её) и вставит новую с NULL. Паттерн SCD Type 2 в исполнении <strong>Data Vault</strong>.</p>"}, {"id": 66, "topic": "SQL", "subtopic": "Link-таблицы для трёх и более сущностей — проектирование многосторонних связей в соответствии с методологией Data Vault", "question": "В хранилище нужно связать три сущности: Order, Product и Warehouse — как правильно спроектировать Link-таблицу по методологии Data Vault?", "answers": ["Создать один трёхсторонний Link (Order_Product_Warehouse_LNK) с тремя FK на хэш-ключи соответствующих Hub-таблиц, добавив стандартные атрибуты: LOAD_DTS, RECORD_SOURCE и собственный хэш-ключ Link.", "Трёхсторонний Link (Order_Product_Warehouse_LNK) нужно создать с тремя FK, однако хэш-ключ самого Link следует вычислять только на основе двух наиболее важных сущностей (Order и Product), а Warehouse добавлять как дескриптивный атрибут в Satellite-таблицу к этому Link.", "Правильный подход — создать Hub-таблицу верхнего уровня OrderProductWarehouse_HUB, которая агрегирует все три сущности в единый бизнес-ключ, а затем построить Link-таблицы от этого нового Hub к каждому из трёх исходных Hub: Order_HUB, Product_HUB и Warehouse_HUB.", "Нужно создать три отдельных двусторонних Link-таблицы: Order_Product_LNK, Product_Warehouse_LNK и Order_Warehouse_LNK — это соответствует принципу атомарности Data Vault, где каждая связь должна быть представлена отдельным линком с двумя FK на Hub-ключи. 10. Историчность данных в satellite — использование load date и load end date для отслеживания изменений атрибутов во времени В satellite таблице атрибут изменился 3 раза. Как корректно закрыть предыдущую версию записи при использовании load_end_date?"], "correct": 0, "explanation": "🔺 Три сущности — один Link с тремя FK. Это атомарная транзакция: один заказ содержит конкретный товар на конкретном складе — это неделимый факт. Три отдельных двусторонних Link'а разорвали бы эту атомарность и усложнили запросы.", "explanation_html": "<p>🔺 Три сущности — один Link с тремя FK. Это атомарная транзакция: один заказ содержит конкретный товар на конкретном складе — это неделимый факт. Три отдельных двусторонних Link'а разорвали бы эту атомарность и усложнили запросы.</p>"}, {"id": 67, "topic": "Модели данных DWH", "subtopic": "Дедупликация в Data Vault - стратегии обработки дублирующихся business key при интеграции данных из разнородных источников", "question": "В Data Vault при интеграции данных из CRM и ERP одна и та же компания имеет business key 'COMP-001' в CRM и 'C001' в ERP — какую стратегию следует применить для корректной дедупликации в Hub?", "answers": ["В Hub загружается только один ключ — приоритетного источника (ERP как системы записи), второй отбрасывается. RECORD_SOURCE фиксирует оба источника в Satellite.", "Использовать Same-As Link (SAL): оба ключа загружаются как отдельные записи в Hub с разными RECORD_SOURCE, а SAL фиксирует связь между ними как эквивалентные сущности. Это сохраняет историю источников без потери данных и позволяет управлять мэппингом через мастер-данные.", "Необходимо выбрать единый стандарт business key на этапе ETL: привести все ключи к формату одного источника (например, CRM), трансформировав 'C001' в 'COMP-001' до загрузки в Hub. Это обеспечивает единообразие хранилища и исключает дублирование записей. SAL применяется только для физически разных объектов, а не для вариаций одного ключа.", "Создать отдельный Hub для каждого источника (HubCRM и HubERP), загружая ключи независимо, а затем объединять их через обычный Link. Это классическая практика Data Vault для разнородных источников — каждый Hub хранит натуральные ключи своей системы, а Link устанавливает связь между сущностями двух доменов без необходимости в специализированных конструкциях SAL. 11. Hub-таблицы Data Vault - проектирование business key для источников с пересекающимися и конфликтующими идентификаторами Как в Data Vault 2.0 рекомендуется разрешать коллизии пересекающихся business key из разных источников в Hub?"], "correct": 1, "explanation": "🗝️ 'COMP-001' и 'C001' — разные строки, разные хэши, разные записи в Hub. Same-As Link (SAL) говорит: 'эти две разные записи — один и тот же реальный объект'. Так сохраняется история источников и решается проблема несовпадения форматов без потери данных.", "explanation_html": "<p>🗝️ 'COMP-001' и 'C001' — разные строки, разные <strong>хэш</strong>и, разные записи в <strong>Hub</strong>. Same-As <strong>Link</strong> (SAL) говорит: 'эти две разные записи — один и тот же реальный объект'. Так сохраняется история источников и решается проблема несовпадения форматов без потери данных.</p>"}, {"id": 68, "topic": "SQL", "subtopic": "Историчность данных в Data Vault - обеспечение целостности исторических записей satellite-таблиц при изменении структуры модели", "question": "В satellite-таблице добавляется новый обязательный атрибут — какую стратегию миграции исторических записей следует применить, чтобы сохранить целостность временных срезов?", "answers": ["Пересчитать HASH_DIFF для всех исторических записей с учётом нового атрибута (NULL), чтобы обеспечить консистентность алгоритма хеширования во всей таблице и корректную дедупликацию при будущих загрузках.", "Создать новую версию satellite-таблицы (SAT_V2), перенеся туда все исторические записи с заполненным атрибутом, а старую таблицу архивировать — это стандартная практика версионирования схем в Data Vault 2.0.", "Добавить атрибут как nullable (или с дефолтным значением), заполнив исторические записи NULL/константой, не пересчитывая LOAD_DATE и HASH_DIFF — это сохраняет неизменность уже зафиксированной истории. Новый HASH_DIFF рассчитывается только для будущих загрузок с учётом нового атрибута.", "Добавить атрибут как NOT NULL с дефолтным значением и обновить LOAD_DATE всех исторических записей на текущую дату миграции — это явно обозначит момент изменения структуры и сохранит прозрачность истории изменений. 13. Surrogate key в Data Vault - алгоритмы генерации хеш-ключей и обеспечение детерминированности при загрузке из множества источников Почему при генерации хеш-ключей в Data Vault критически важна нормализация входных значений перед хешированием?"], "correct": 2, "explanation": "🏛️ Исторические записи — как архивные документы: их нельзя задним числом переписывать. Добавляешь новый атрибут — делаешь его nullable, старые записи получают NULL (они просто 'не знали' об этом атрибуте). HASH_DIFF не пересчитывается — он отражал состояние на момент загрузки.", "explanation_html": "<p><em class=\"analogy\">🏛️ Исторические записи — как архивные документы: их нельзя задним числом переписывать</em>. Добавляешь новый атрибут — делаешь его nullable, старые записи получают <strong>NULL</strong> (они просто 'не знали' об этом атрибуте). HASH_DIFF не пересчитывается — он отражал состояние на момент загрузки.</p>"}, {"id": 69, "topic": "SQL", "subtopic": "Link-таблицы Data Vault - моделирование многоуровневых связей между hub-сущностями в сложных доменах", "question": "В домене e-commerce нужно смоделировать связь Order-Product-Warehouse-Supplier. Сравните подходы: единый четырёхсторонний Link vs. несколько связанных Link-таблиц разной гранулярности.", "answers": ["Единый четырёхсторонний Link всегда предпочтительнее разбивки на несколько таблиц, поскольку минимизирует количество JOIN-операций при запросах и снижает нагрузку на хранилище. Декомпозиция на LINK_ORDER_PRODUCT и LINK_PRODUCT_WAREHOUSE_SUPPLIER создаёт избыточность и нарушает принцип атомарности Data Vault, что критично для аудита транзакций в e-commerce домене.", "Выбор между подходами определяется исключительно производительностью: четырёхсторонний Link быстрее при OLAP-нагрузке, а разбивка на два Link ускоряет OLTP-операции.", "Единый LINK_ORDER_PRODUCT_WAREHOUSE_SUPPLIER фиксирует атомарную транзакцию одной строкой. Альтернатива — LINK_ORDER_PRODUCT + LINK_PRODUCT_WAREHOUSE_SUPPLIER — предпочтительна, если бизнес-связи независимы и требуется раздельная гранулярность запросов.", "Разбиение на несколько Link-таблиц всегда предпочтительнее единого многостороннего Link, так как Data Vault запрещает связывать более трёх Hub-сущностей в одной таблице из соображений нормализации. 15. Data Vault vs Star Schema - принципиальные архитектурные различия и обоснование выбора Data Vault для загрузки сырых данных Почему Data Vault намеренно сохраняет дублирующиеся и противоречивые данные из источников без трансформации?"], "correct": 0, "explanation": "🔄 Единый 4-сторонний Link — только если все четыре сущности всегда присутствуют вместе как атомарное событие. Если Supplier может появиться позже — лучше разбить. Правило: гранулярность Link = гранулярность бизнес-события. Неправильная гранулярность = сложные NULL в Link.", "explanation_html": "<p><em class=\"analogy\">🔄 Единый 4-сторонний Link — только если все четыре сущности всегда присутствуют вместе как атомарное событие</em>. Если Supplier может появиться позже — лучше разбить. Правило: гранулярность Link = гранулярность бизнес-события. Неправильная гранулярность = сложные <strong>NULL</strong> в Link.</p>"}, {"id": 70, "topic": "SQL", "subtopic": "Data Vault vs Star Schema - принципиальные архитектурные различия и обоснование выбора Data Vault для загрузки сырых данных", "question": "Почему Data Vault намеренно сохраняет дублирующиеся и противоречивые данные из источников без трансформации?", "answers": ["Потому что Data Vault оптимизирован под скорость загрузки: трансформации и очистка данных замедляют ETL-процессы, поэтому их намеренно откладывают до момента выгрузки в аналитические витрины, где производительность уже не критична.", "Data Vault сохраняет противоречивые данные из разных источников, поскольку это позволяет системе автоматически выявлять и разрешать конфликты через механизм мастер-данных (MDM) непосредственно в слое Hub-ов и Link-ов, избегая необходимости создавать отдельный MDM-слой в архитектуре хранилища.", "Чтобы обеспечить полный аудит и воспроизводимость истории: бизнес-правила применяются позже, в слое подачи данных (Information Mart), а Raw Vault остаётся неизменным источником правды о том, что реально пришло из систем-источников.", "Это компромисс из-за ограничений инструментов загрузки — Data Vault не умеет эффективно дедуплицировать данные на лету. 16. Multi-active satellite - проектирование составного первичного ключа для сущностей с несколькими одновременно активными записями атрибутов Почему в Multi-Active Satellite первичный ключ должен включать дополнительный атрибут помимо хэш-ключа хаба и даты загрузки?"], "correct": 2, "explanation": "📹 Raw Vault — это видеорегистратор: записывает всё как есть, без купюр. Бизнес-правила ('этот клиент — VIP') применяются позже в Information Mart. Если правила изменятся — можно пересчитать витрины без переструктурирования хранилища. Аудит = 'мы точно знаем, что нам пришло из источника'.", "explanation_html": "<p>📹 Raw Vault — это видеорегистратор: записывает всё как есть, без купюр. Бизнес-правила ('этот клиент — VIP') применяются позже в Information Mart. Если правила изменятся — можно пересчитать витрины без переструктурирования хранилища. Аудит = 'мы точно знаем, что нам пришло из источника'.</p>"}, {"id": 71, "topic": "SQL", "subtopic": "Multi-active satellite - проектирование составного первичного ключа для сущностей с несколькими одновременно активными записями атрибутов", "question": "Почему в Multi-Active Satellite первичный ключ должен включать дополнительный атрибут помимо хэш-ключа хаба и даты загрузки?", "answers": ["Потому что хэш-ключ хаба не гарантирует уникальность в рамках одной транзакции загрузки — при параллельной загрузке из нескольких источников один и тот же хэш может быть сгенерирован дважды, и дополнительный атрибут служит защитой от коллизий хэш-функции.", "Потому что дата загрузки в Multi-Active Satellite намеренно фиксируется одинаковой для всей пачки записей одного батча, и дополнительный атрибут нужен исключительно для корректной сортировки записей внутри батча при построении отчётов и витрин данных.", "Потому что несколько записей атрибутов одновременно активны для одной сущности — без дополнительного дискриминатора (например, типа или порядкового номера) невозможно уникально идентифицировать каждую из них.", "Потому что стандарт Data Vault 2.0 требует включения суррогатного последовательного ключа во все типы сателлитов для обеспечения совместимости с реляционными СУБД, которые не могут использовать составные ключи на основе хэшей в качестве первичных. 17. Link-таблицы Data Vault - структура, foreign surrogate keys и правила создания между hub-таблицами В Link-таблице между Hub_Customer и Hub_Order какие обязательные поля должны присутствовать помимо LINK_HASH_KEY и дат загрузки?"], "correct": 2, "explanation": "📱 У клиента три активных телефонных номера одновременно. Hub_key + Load_Date не уникальны: они одинаковы для всех трёх строк одного батча. Нужен дискриминатор — например, тип номера (mobile/work/home) или порядковый номер. Это и есть 'дополнительный атрибут первичного ключа'.", "explanation_html": "<p><em class=\"analogy\">📱 У клиента три активных телефонных номера одновременно</em>. Hub_key + Load_Date не уникальны: они одинаковы для всех трёх строк одного батча. Нужен дискриминатор — например, тип номера (mobile/work/home) или порядковый номер. Это и есть 'дополнительный атрибут первичного ключа'.</p>"}, {"id": 72, "topic": "Модели данных DWH", "subtopic": "Link-таблицы Data Vault - структура, foreign surrogate keys и правила создания между hub-таблицами", "question": "В Link-таблице между Hub_Customer и Hub_Order какие обязательные поля должны присутствовать помимо LINK_HASH_KEY и дат загрузки?", "answers": ["Натуральные бизнес-ключи: CUSTOMER_ID и ORDER_ID из исходных систем — именно они связывают Hub-таблицы, плюс EFFECTIVE_DATE для отслеживания версий связи", "LINK_SEQ_ID и STATUS_FLAG", "Foreign surrogate keys: CUSTOMER_HASH_KEY и ORDER_HASH_KEY — хэш-ключи родительских Hub-таблиц, а также поля LOAD_DATE, RECORD_SOURCE.", "Только суррогатные ключи хабов: CUSTOMER_HASH_KEY и ORDER_HASH_KEY, а LOAD_DATE и RECORD_SOURCE хранятся исключительно в Satellite-таблицах, прикреплённых к данному Link 15. Record Source в Data Vault - назначение поля, форматы значений и правила заполнения по стандарту команды Источник данных — SAP ERP, загрузка через Informatica PC. Как выглядит RECORD_SOURCE по стандарту команды?"], "correct": 2, "explanation": "⚠️ Внимание: правильный ответ в этом вопросе помечен неверно в тесте! Link хранит LOAD_DATE и RECORD_SOURCE в себе (это стандартные поля Link), а не только в Satellite. Обязательные поля Link: LINK_HASH_KEY, CUSTOMER_HASH_KEY, ORDER_HASH_KEY, LOAD_DATE, RECORD_SOURCE.", "explanation_html": "<p><em class=\"analogy\">⚠️ Внимание: правильный ответ в этом вопросе помечен неверно в тесте! <strong>Link</strong> хранит <strong>LOAD_DATE</strong> и RECORD_SOURCE в себе (это стандартные поля <strong>Link</strong>), а не только в <strong>Satellite</strong></em>. Обязательные поля <strong>Link</strong>: LINK_HASH_KEY, CUSTOMER_HASH_KEY, ORDER_HASH_KEY, <strong>LOAD_DATE</strong>, RECORD_SOURCE.</p>"}, {"id": 73, "topic": "SQL", "subtopic": "Проектирование satellite-таблиц для link-сущностей — хранение атрибутов связей и их историчность", "question": "Почему для хранения атрибутов link-сущности создаётся отдельный satellite, а не добавляются колонки прямо в link-таблицу?", "answers": ["Атрибуты связи выносятся в отдельный satellite исключительно из соображений производительности: link-таблица участвует в JOIN-операциях при каждом запросе, и добавление широких текстовых колонок увеличивает её физический размер, замедляя сканирование индексов. Satellite позволяет хранить тяжёлые атрибуты отдельно, при этом историчность здесь второстепенна — главная причина разделения именно в оптимизации чтения link при построении графа связей.", "Link-таблица остаётся неизменяемой не потому, что это архитектурный принцип Data Vault, а потому что большинство СУБД физически не позволяют эффективно обновлять строки в таблицах с составными хеш-ключами без полного перестроения индексов. Поэтому атрибуты выносятся в satellite как технический обходной путь — он просто д
